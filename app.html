          <span style="color:var(--text-muted)" class="text-xs">v${VERSION}</span>
        </div>
      </div>
      <button onclick="nextWeek()" class="hdr-nav-btn"><svg width="6" height="8" viewBox="0 0 6 8"><polygon points="0,0 6,4 0,8" fill="rgba(255,255,255,0.55)"/></svg></button>
      <div class="theme-menu-wrap">
        <button class="theme-menu-btn more-menu-btn" onclick="toggleThemeMenu(event)" title="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="menu-backdrop ${state.isMenuOpen ? 'show' : ''}" onclick="closeThemeMenu()"></div>
        <div class="theme-dropdown ${state.isMenuOpen ? 'open' : ''}" id="theme-dropdown" onclick="event.stopPropagation()">
          ${(() => {
          const u = state.currentUser;
          const displayName = u ? (u.displayName || u.email || 'there') : 'there';
          const photoURL = u ? (u.photoURL || '') : '';
          const initial = displayName[0].toUpperCase();
          const avatarHtml = photoURL
            ? `<img src="${esc(photoURL)}" class="menu-avatar-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="menu-avatar-initials" style="display:none">${initial}</div>`
            : `<div class="menu-avatar-initials">${initial}</div>`;
          const chev = `<span class="menu-row-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>`;
          return `
              <!-- Dark header block -->
              <div class="menu-header-block">
                <button class="menu-close-btn" onclick="closeThemeMenu()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <div class="menu-avatar-wrap">${avatarHtml}</div>
                <div class="menu-signed-in-label">Signed in as</div>
                <div class="menu-display-name">${esc(displayName)}</div>
                <button class="menu-signout-btn" onclick="signOutUser()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                  Sign Out
                </button>
              </div>

              <!-- Navigation section -->
              <div class="menu-section-wrap">
                <div class="menu-section-label">Navigation</div>
                <div class="menu-card">
                  <button class="menu-row" onclick="openDateModal();closeThemeMenu()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">Jump to Week</span><span class="menu-row-sub">Navigate to any date</span></span>
                    ${chev}
                  </button>
                  <button class="menu-row" onclick="sendWeeklyEmail();closeThemeMenu()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">Email / Export Week</span><span class="menu-row-sub">Send formatted summary</span></span>
                    ${chev}
                  </button>
                  ${state.view === 'week' && window.innerWidth >= 768 ? `
                  <button class="menu-row" onclick="toggleLayoutMode();closeThemeMenu()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">${state.layoutMode === 'table' ? 'Mobile View' : 'Spreadsheet View'}</span></span>
                    ${chev}
                  </button>` : ''}
                </div>
              </div>

              <!-- Snapshots section -->
              <div class="menu-section-wrap">
                <div class="menu-section-label">Recovery</div>
                <div class="menu-card">
                  <button class="menu-row" onclick="openSnapshotModal()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">Snapshots / Recover</span><span class="menu-row-sub">Browse and restore saved versions</span></span>
                    ${chev}
                  </button>
                </div>
              </div>

              <!-- Data Management section -->
              <div class="menu-section-wrap">
                <div class="menu-section-label danger">Data Management</div>
                <div class="menu-card">
                  <button class="menu-row danger" onclick="clearCurrentWeek();closeThemeMenu()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">Clear This Week</span></span>
                    ${chev}
                  </button>
                  <button class="menu-row danger" onclick="clearAllData();closeThemeMenu()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">Clear All My Data</span></span>
                    ${chev}
                  </button>
                  <button class="menu-row danger" onclick="deleteAccount();closeThemeMenu()">
                    <span class="menu-row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="17"/><line x1="23" y1="11" x2="17" y2="17"/></svg></span>
                    <span class="menu-row-body"><span class="menu-row-label">Delete Account</span><span class="menu-row-sub">Permanently removes all data</span></span>
                    ${chev}
                  </button>
                </div>
              </div>

              <div class="menu-spacer"></div>
              <div class="menu-version">Rian v${VERSION}</div>
            `;
        })()}
        </div>
      </div>
    </div>
    <div class="hdr-metrics${state.headerExpanded ? ' open' : ''}">
      <div class="hdr-metric-tile">
        <div class="hdr-metric-val">${_hdrOrd}</div>
        <div class="hdr-metric-lbl">Ord hrs</div>
      </div>
      <div class="hdr-metric-tile">
        <div class="hdr-metric-val ot">${_hdrOT}</div>
        <div class="hdr-metric-lbl">Overtime</div>
      </div>
      <div class="hdr-metric-tile">
        <div class="hdr-metric-val">${_hdrTasks}</div>
        <div class="hdr-metric-lbl">Tasks</div>
      </div>
    </div>
    <div class="flex" style="background:var(--bg-header-tab)">
      <button onclick="setView('week')" class="flex-1 py-2.5 text-[10px] font-bold tracking-widest uppercase relative" style="color:${state.view === 'week' ? '#F5A623' : 'var(--text-header-sub)'};${state.view === 'week' ? 'border-bottom:2.5px solid #F5A623' : ''}">
        Timesheet
      </button>
      <button onclick="setView('notes')" class="flex-1 py-2.5 text-[10px] font-bold tracking-widest uppercase relative" style="color:${state.view === 'notes' ? '#F5A623' : 'var(--text-header-sub)'};${state.view === 'notes' ? 'border-bottom:2.5px solid #F5A623' : ''}">
        Notes
        ${{ pending: '#f97316', syncing: '#3b82f6', error: '#ef4444' }[state.notesSyncStatus] ? `<span class="notes-sync-dot" style="background:${{ pending: '#f97316', syncing: '#3b82f6', error: '#ef4444' }[state.notesSyncStatus]}"></span>` : ''}
      </button>
      <button onclick="setView('exchanges')" class="flex-1 py-2.5 text-[10px] font-bold tracking-widest uppercase" style="color:${state.view === 'exchanges' ? '#F5A623' : 'var(--text-header-sub)'};${state.view === 'exchanges' ? 'border-bottom:2.5px solid #F5A623' : ''}">
        Finder
      </button>
    </div>
  </header>`;
    }

    function updateHeaderStatus() {
      const el = document.querySelector('header');
      if (el) el.outerHTML = renderHeader();
    }

    function renderWeekView() {
      if (!state.weekData) return `<div class="p-8 text-center" style="color:var(--text-muted)">Loading…</div>`;
      return state.layoutMode === 'table' ? renderTableView() : renderCardView();
    }

    function renderCardView() {
      const summary = calcSummary(state.weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);

      const daysHtml = state.weekData.days.map((day, di) => renderDaySection(day, di)).join('');

      const chevronSvg = `<svg class="sum-chevron-svg" width="14" height="14" viewBox="0 0 16 16" fill="none" style="transition:transform 0.22s;transform:${state.showSummary ? 'rotate(180deg)' : 'rotate(0deg)'}"><path d="M4 6l4 4 4-4" stroke="var(--text-muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

      const summaryHtml = `
  <div class="sum-section-hdr">
    <div class="sum-section-line"></div>
    <div class="sum-section-label">Weekly Summary</div>
    <div class="sum-section-line"></div>
  </div>
  <div class="sum-section">
    <button onclick="toggleSummary()" class="sum-new-head">
      <div class="sum-head-left">
        <div class="sum-sum-icon">📊</div>
        <div class="sum-new-title">Weekly Summary</div>
      </div>
      <div class="sum-head-right">
        <div class="sum-new-badge">${Math.round(totalOrd)}h</div>
        ${totalOT > 0 ? `<div class="sum-new-badge-ot">+${Math.round(totalOT)} OT</div>` : ''}
        ${chevronSvg}
      </div>
    </button>
    <div class="sum-table-wrap${state.showSummary ? ' open' : ''}">
      <div class="sum-new-col-head">
        <div class="sum-new-col-th">Code / Description</div>
        <div class="sum-new-col-th r">ORD</div>
        <div class="sum-new-col-th r">OT</div>
      </div>
      ${summary.map((row) => {
        const m = row.isUncategorized;
        const pct = totalOrd > 0 ? Math.round((row.ordinary / totalOrd) * 100) : 0;
        const pctOT = totalOrd > 0 ? Math.round((row.overtime / totalOrd) * 100) : 0;
        return `
      <div class="sum-new-row${m ? ' sum-missing' : ''}">
        <div>
          <div class="sum-row-code">${row.code}</div>
          <div class="sum-row-desc">${row.description}</div>
          <div class="sum-row-bar-wrap"><div class="sum-row-bar-fill" style="width:${pct}%"></div></div>
          ${row.overtime > 0 ? `<div class="sum-row-bar-ot-wrap"><div class="sum-row-bar-ot-fill" style="width:${pctOT}%"></div></div>` : ''}
        </div>
        <div class="sum-td-num${m ? ' missing' : ''}">${Math.round(row.ordinary)}</div>
        <div class="sum-td-num ${row.overtime > 0 ? (m ? 'missing' : 'ot') : 'dash'}">${row.overtime > 0 ? Math.round(row.overtime) : '—'}</div>
      </div>`;
      }).join('')}
      <div class="sum-new-footer">
        <div class="sum-footer-label">Total</div>
        <div class="sum-footer-totals">
          <div class="sum-footer-item">
            <div class="sum-footer-lbl">ORD</div>
            <div class="sum-footer-val">${Math.round(totalOrd)}</div>
          </div>
          <div class="sum-footer-div"></div>
          <div class="sum-footer-item">
            <div class="sum-footer-lbl">OT</div>
            <div class="sum-footer-val ot">${totalOT > 0 ? Math.round(totalOT) : 0}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

      return `<main class="pb-6"><div class="week-list">${daysHtml}</div>${summaryHtml}</main>`;
    }

    // ============================================================
    // DESKTOP SPREADSHEET TABLE VIEW
    // ============================================================
    function renderTableView() {
      const summary = calcSummary(state.weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);

      const rowsHtml = state.weekData.days.map((day, di) => renderTableDay(day, di)).join('');

      const summaryHtml = `
  <div class="tbl-summary-section">
    <button onclick="toggleSummary()" class="w-full flex items-center justify-between px-4 py-3" style="background:var(--bg-header);color:var(--text-header)">
      <span class="font-bold text-sm">Weekly Summary</span>
      <span style="color:var(--text-header-sub)" class="text-sm">
        <span class="font-mono" data-sum-ord>${Math.round(totalOrd)}</span> hrs &nbsp;
        <span class="font-mono" style="color:var(--tab-active)" data-sum-ot>${Math.round(totalOT)}</span> OT
        <span class="ml-2">${state.showSummary ? '▲' : '▼'}</span>
      </span>
    </button>
    ${state.showSummary ? `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr style="background:var(--bg-card-alt);color:var(--text-secondary)" class="text-xs uppercase">
            <th class="px-3 py-2 text-left">Code</th>
            <th class="px-3 py-2 text-left">Description</th>
            <th class="px-3 py-2 text-right">Ord</th>
            <th class="px-3 py-2 text-right">OT</th>
          </tr>
        </thead>
        <tbody>
          ${summary.map((row, i) => {
        const isUncat = row.isUncategorized;
        const bgStyle = isUncat ? 'background:rgba(239,68,68,0.1)' : (i % 2 === 0 ? '' : 'background:var(--summary-even)');
        const textColor = isUncat ? 'color:#ef4444' : 'color:var(--text-secondary)';
        const accentColor = isUncat ? 'color:#ef4444;font-weight:bold' : 'color:var(--accent)';

        return `
          <tr class="summary-row" style="${bgStyle}">
            <td class="px-3 py-2 font-mono text-xs whitespace-nowrap" style="${accentColor}">${row.code}</td>
            <td class="px-3 py-2 text-xs" style="${textColor}">${row.description}</td>
            <td class="px-3 py-2 text-right font-semibold" style="${isUncat ? 'color:#ef4444' : 'color:var(--text-primary)'}">${Math.round(row.ordinary)}</td>
            <td class="px-3 py-2 text-right font-semibold" style="${isUncat ? 'color:#ef4444' : 'color:var(--text-ot)'}">${row.overtime > 0 ? Math.round(row.overtime) : '—'}</td>
          </tr>`;
      }).join('')}
          <tr class="font-bold text-sm" style="background:var(--bg-day-header)">
            <td colspan="2" class="px-3 py-2" style="color:var(--text-day)">TOTAL</td>
            <td class="px-3 py-2 text-right" style="color:var(--text-day)">${Math.round(totalOrd)}</td>
            <td class="px-3 py-2 text-right" style="color:var(--text-ot)">${Math.round(totalOT)}</td>
          </tr>
        </tbody>
      </table>
    </div>` : ''}
  </div>`;

      return `
<main class="pb-6">
  <div class="table-view-wrap">
    <table class="timesheet-table">
      <colgroup>
        ${state.tableColWidths.map(w => `<col style="width:${w}px">`).join('')}
      </colgroup>
      <thead>
        <tr>
          <th>Day<div class="col-resize-handle" data-col="0"></div></th>
          <th>Date<div class="col-resize-handle" data-col="1"></div></th>
          <th>Description<div class="col-resize-handle" data-col="2"></div></th>
          <th>Location<div class="col-resize-handle" data-col="3"></div></th>
          <th>Work Codes<div class="col-resize-handle" data-col="4"></div></th>
          <th style="text-align:center">Ord<div class="col-resize-handle" data-col="5"></div></th>
          <th style="text-align:center">OT<div class="col-resize-handle" data-col="6"></div></th>
          <th style="text-align:center">Tasks<div class="col-resize-handle" data-col="7"></div></th>
          <th style="text-align:center">Hrs/Task<div class="col-resize-handle" data-col="8"></div></th>
          <th style="text-align:center">OT/Task<div class="col-resize-handle" data-col="9"></div></th>
          <th style="text-align:center">Notes</th>
          <th style="text-align:center"></th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>
  ${summaryHtml}
</main>`;
    }

    function renderTableDay(day, di) {
      const isWeekend = di === 1 || di === 2;
      const weClass = isWeekend ? 'tbl-we' : '';
      const activities = day.activities;
      const dateStr = formatDate(day.date);

      if (activities.length === 0) {
        return `
  <tr class="${weClass}">
    <td class="tbl-day-cell" rowspan="2">${day.dayName}</td>
    <td class="tbl-date-cell" rowspan="2">${dateStr}</td>
    <td colspan="10" style="color:var(--text-muted);font-size:12px;font-style:italic;">No activities</td>
  </tr>
  <tr class="tbl-add-row ${weClass}">
    <td colspan="10"><button class="tbl-add-activity-btn" onclick="addActivity(${di})">+ Add Task</button></td>
  </tr>`;
      }

      // rowspan = activities + 1 add-row
      const rowspan = activities.length + 1;
      let html = '';

      activities.forEach((act, ai) => {
        const isFirst = ai === 0;
        const hasDayError = day.activities.some(a => (parseFloat(a.ordinary) > 0 || parseFloat(a.overtime) > 0) && a.codes.length === 0);
        html += `
  <tr class="${weClass}">
    ${isFirst ? `
      <td class="tbl-day-cell" rowspan="${rowspan}">${day.dayName}</td>
      <td class="tbl-date-cell" rowspan="${rowspan}">
        <div class="flex items-center gap-1.5">
          ${dateStr}
          ${hasDayError ? `<span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse" title="Code required" style="box-shadow: 0 0 6px rgba(249,115,22,0.4)"></span>` : ''}
        </div>
      </td>` : ''}
    ${renderTableActivityCells(act, di)}
  </tr>`;
      });

      // Add activity row
      html += `
  <tr class="tbl-add-row ${weClass}">
    <td colspan="10"><button class="tbl-add-activity-btn" onclick="addActivity(${di})">+ Add Task</button></td>
  </tr>`;

      return html;
    }

    function renderTableActivityCells(act, di) {
      const numTasks = act.codes.length || 1;
      const ordinary = parseFloat(act.ordinary) || 0;
      const overtime = parseFloat(act.overtime) || 0;
      const hrsPerTask = ordinary > 0 ? Math.round(ordinary / numTasks) : '—';
      const otPerTask = overtime > 0 ? Math.round(overtime / numTasks) : '—';

      const isMissingCode = (ordinary > 0 || overtime > 0) && act.codes.length === 0;
      const isMissingHours = act.codes.length > 0 && ordinary === 0 && overtime === 0;
      const isInvalid = isMissingCode || isMissingHours;
      const codesHtml = `<div class="tbl-codes-inner">
        ${act.codes.map(c => `
          <span class="code-chip" style="font-size:11px;padding:2px 6px;">
            <span class="chip-desc">${esc(c.d)}</span>
            <span class="chip-code font-mono" style="opacity:0.75;font-size:10px;margin-left:4px;">${c.c}</span>
            <button class="chip-x" onclick="removeCode('${act.id}',${di},'${c.c}')" style="margin-left:4px;font-size:11px;line-height:1;color:var(--text-muted)">✕</button>
          </span>`).join('')}
        <div class="flex items-center gap-2">
          <button class="tbl-add-code-btn" onclick="openCodeModal(${di},'${act.id}')" style="${isMissingCode ? 'border-color:#f97316;color:#f97316' : ''}">+ Code</button>
          ${isInvalid ? `<span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse" title="${isMissingCode ? 'Code required' : 'Hours required'}" style="box-shadow: 0 0 6px rgba(249,115,22,0.4)"></span>` : ''}
        </div>
      </div>`;

      return `
      <td><input type="text" class="tbl-act-input" placeholder="Description…" value="${esc(act.description)}"
        data-field="description" data-act="${act.id}" data-day="${di}" oninput="updateField(this)"></td>
      <td>
        <div class="location-wrap">
          <input type="text" class="tbl-act-input" placeholder="Location…" value="${esc(act.location)}"
            data-field="location" data-act="${act.id}" data-day="${di}"
            readonly style="cursor:pointer"
            onclick="openLocationModal(${di}, '${act.id}')">
        </div>
      </td>
      <td class="tbl-codes-cell">${codesHtml}</td>
      <td style="text-align:center">
        <input type="number" step="1" min="0" class="tbl-num-input" value="${act.ordinary || ''}" placeholder="0"
          data-field="ordinary" data-act="${act.id}" data-day="${di}" oninput="updateField(this)" onchange="updateField(this)" onblur="updateField(this)">
      </td>
      <td style="text-align:center">
        <input type="number" step="1" min="0" class="tbl-num-input tbl-ot-input" value="${act.overtime || ''}" placeholder="0"
          data-field="overtime" data-act="${act.id}" data-day="${di}" oninput="updateField(this)" onchange="updateField(this)" onblur="updateField(this)">
      </td>
      <td class="tbl-calc">${numTasks}</td>
      <td class="tbl-calc">${hrsPerTask}</td>
      <td class="tbl-calc">${otPerTask}</td>
      <td style="text-align:center;padding:0;">
        <button class="tbl-note-btn ${act.notes ? 'has-note' : ''}"
          data-act="${act.id}" data-day="${di}"
          data-note="${esc(act.notes || '')}"
          onclick="openNotesModal(${di},'${act.id}')"
          onmouseenter="showNoteTooltip(event)"
          onmouseleave="hideNoteTooltip()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></button>
      </td>
      <td>
        <button class="tbl-del-btn" onclick="showConfirm('Delete task?','${esc(act.description || 'Unnamed')}',()=>removeActivity('${act.id}',${di}))" title="Delete"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </td>`;
    }

    function initTableResize() {
      const table = document.querySelector('.timesheet-table');
      if (!table) return;
      table.querySelectorAll('.col-resize-handle').forEach(handle => {
        handle.addEventListener('mousedown', e => {
          e.preventDefault();
          const colIdx = parseInt(handle.dataset.col);
          const cols = table.querySelectorAll('col');
          const col = cols[colIdx];
          if (!col) return;
          const startX = e.clientX;
          const startW = parseInt(col.style.width) || col.offsetWidth;
          handle.classList.add('col-resizing');
          function onMove(e) {
            const newW = Math.max(40, startW + (e.clientX - startX));
            col.style.width = newW + 'px';
            const total = Array.from(cols).reduce((s, c) => s + (parseInt(c.style.width) || 0), 0);
            table.style.width = Math.max(1280, total) + 'px';
          }
          function onUp() {
            handle.classList.remove('col-resizing');
            const widths = Array.from(cols).map(c => parseInt(c.style.width) || 0);
            // Notes(10) and Del(11) are fixed — never save user-resized values for them
            widths[10] = 64; widths[11] = 38;
            state.tableColWidths = widths;
            localStorage.setItem('tableColWidthsV2', JSON.stringify(widths));
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });
    }

    function calcDayTotals(day) {
      let ord = 0, ot = 0;
      day.activities.forEach(act => {
        ord += parseFloat(act.ordinary) || 0;
        ot += parseFloat(act.overtime) || 0;
      });
      return { ord, ot };
    }

    function toggleAllDays() {
      if (state.view === 'notes') {
        // In Notes view: expand or collapse all open notes
        const openNotes = state.notes.filter(n => n.status !== 'done');
        if (state.expandedNotes.size > 0) {
          state.expandedNotes.clear();
        } else {
          openNotes.forEach(n => state.expandedNotes.add(n.id));
        }
        render();
        return;
      }
      if (state.expandedDays.size > 0) {
        state.expandedDays.clear();
      } else {
        state.weekData.days.forEach((_, i) => state.expandedDays.add(i));
      }
      saveUiState();
      render();
    }

    function toggleDay(di) {
      const isExpanded = state.expandedDays.has(di);
      if (isExpanded) {
        state.expandedDays.delete(di);
      } else {
        state.expandedDays.add(di);
      }
      saveUiState();

      // Update DOM directly for smooth transition
      const card = document.querySelector(`.day-card[data-day-idx="${di}"]`);
      if (card) {
        const header = card.querySelector('.day-header');
        const chevron = card.querySelector('.chevron');
        const activities = card.querySelector('.day-activities');

        if (isExpanded) {
          activities.style.maxHeight = activities.scrollHeight + 'px';
          activities.offsetHeight; // force reflow
          activities.classList.remove('active');
          activities.classList.add('hidden');
          activities.style.maxHeight = '0px';
          if (chevron) chevron.style.transform = 'rotate(0deg)';
          syncTimelineAnimation();
          setTimeout(() => {
            if (!state.expandedDays.has(di)) activities.style.display = 'none';
            fixTimelineLines();
          }, ANIM_EXPAND_MS + 20);
        } else {
          activities.style.display = 'block';
          activities.style.maxHeight = '0px';
          activities.offsetHeight; // force reflow
          activities.classList.add('active');
          activities.classList.remove('hidden');
          activities.style.maxHeight = activities.scrollHeight + 'px';
          if (chevron) chevron.style.transform = 'rotate(90deg)';
          // Trigger autoGrow for all textareas within the expanded day
          activities.querySelectorAll('textarea').forEach(autoGrow);
          syncTimelineAnimation();
          setTimeout(() => {
            if (state.expandedDays.has(di)) activities.style.maxHeight = 'none';
            fixTimelineLines();
          }, ANIM_EXPAND_MS + 20);
        }
      }
    }

    function toggleActivityDetails(actId) {
      const isExpanded = state.activitiesExpanded.has(actId);
      if (isExpanded) {
        state.activitiesExpanded.delete(actId);
      } else {
        state.activitiesExpanded.add(actId);
      }
      saveUiState();

      // Surgical DOM update — no full re-render needed
      const card = document.querySelector(`.activity-card[data-act-id="${actId}"]`);
      if (!card) { render(); return; } // fallback if card not in DOM

      const detail = card.querySelector('.activity-detail');
      const chevron = card.querySelector('.chevron');
      const nowExpanded = !isExpanded;

      if (nowExpanded) {
        card.classList.add('expanded');
        // Clear any collapse-triggered red border while editing
        card.style.borderColor = '';
        card.style.boxShadow = '';
        if (detail) {
          detail.style.display = 'block';
          // Force reflow before adding class to trigger transition
          detail.offsetHeight;
          detail.classList.remove('hidden');
          detail.classList.add('open');
          detail.querySelectorAll('textarea').forEach(autoGrow);
        }
        if (chevron) chevron.style.transform = 'rotate(90deg)';
        syncTimelineAnimation();
      } else {
        card.classList.remove('expanded');
        if (detail) {
          detail.classList.remove('open');
          detail.classList.add('hidden');
          setTimeout(() => { detail.style.display = 'none'; }, ANIM_EXPAND_MS);
        }
        if (chevron) chevron.style.transform = 'rotate(0deg)';

        // Re-evaluate red border on collapse (renderActivity doesn't re-run here)
        let act = null;
        for (const day of state.weekData.days) {
          act = day.activities.find(a => a.id === actId);
          if (act) break;
        }
        if (act) {
          const ord = parseFloat(act.ordinary) || 0;
          const ot = parseFloat(act.overtime) || 0;
          const isMissingHours = act.codes.length > 0 && ord === 0 && ot === 0;
          if (isMissingHours) {
            card.style.borderColor = 'var(--btn-danger-color)';
            card.style.boxShadow = '0 0 8px rgba(232, 69, 60, 0.2)';
          }
        }
        syncTimelineAnimation();
      }
    }

    function toggleNotes(actId) {
      let hasNote = false;
      for (const day of state.weekData.days) {
        const act = day.activities.find(a => a.id === actId);
        if (act) { hasNote = !!act.notes; break; }
      }
      const currentOpen = state.notesOpen.has(actId) ? state.notesOpen.get(actId) : hasNote;
      const nextOpen = !currentOpen;
      state.notesOpen.set(actId, nextOpen);
      saveUiState();

      // Update DOM directly for transition
      const notesPanelBody = document.querySelector(`.notes-panel-body[data-notes-wrap="${actId}"]`);
      const notesChevron = document.querySelector(`.notes-chevron[data-notes-btn="${actId}"]`);

      if (notesPanelBody) {
        if (nextOpen) notesPanelBody.classList.add('open');
        else notesPanelBody.classList.remove('open');
      }
      if (notesChevron) {
        notesChevron.style.transform = nextOpen ? 'rotate(180deg)' : 'rotate(0deg)';
      }
    }

    function renderDaySection(day, di) {
      const isWeekend = di === 1 || di === 2;
      const isExpanded = state.expandedDays.has(di);
      const activitiesHtml = day.activities.map((act, ai) => renderActivity(act, di, ai)).join('');
      const { ord, ot } = calcDayTotals(day);

      // Count tasks that actually have content or hours
      const activeActivities = day.activities.filter(a => a.description || a.codes.length || (parseFloat(a.ordinary) > 0 || parseFloat(a.overtime) > 0));
      const actCount = activeActivities.length;

      // Check for missing codes in any activity with hours
      const hasMissingCode = day.activities.some(a => {
        const ord = parseFloat(a.ordinary) || 0;
        const ot = parseFloat(a.overtime) || 0;
        return ((ord > 0 || ot > 0) && a.codes.length === 0) || (a.codes.length > 0 && ord === 0 && ot === 0);
      });

      return `
<div class="day-card ${isWeekend ? 'day-weekend' : ''} ${isExpanded ? 'expanded' : ''}" data-day-idx="${di}">
  <div class="day-header" onclick="toggleDay(${di})">
    <div class="day-left">
      <div class="day-expand-btn"><svg class="chevron" width="8" height="8" viewBox="0 0 10 10" style="transition:transform 0.2s;transform:${isExpanded ? 'rotate(90deg)' : 'rotate(0deg)'}"><polygon points="0,0 10,5 0,10" fill="#b4b8cc"/></svg></div>
      <span class="day-name">${day.dayName}</span>
      <span class="day-date">${formatDate(day.date)}</span>
    </div>
    <div class="day-pills" data-day-pills="${di}">
      ${actCount > 0 ? `<span class="pill pill-slate">${actCount} task${actCount !== 1 ? 's' : ''}</span>` : (isWeekend ? '' : `<span style="font-size:11px;color:var(--border);font-weight:600">No entries</span>`)}
      ${ord > 0 ? `<span class="pill pill-blue">${Math.round(ord) === ord ? ord : ord.toFixed(1)}h</span>` : ''}
      ${ot > 0 ? `<span class="pill pill-amber">+${Math.round(ot) === ot ? ot : ot.toFixed(1)} OT</span>` : ''}
      ${hasMissingCode ? `<span class="dot-flash animate-pulse" title="Missing work code"></span>` : ''}
    </div>
  </div>
  <div class="day-activities ${isExpanded ? 'active' : 'hidden'}" id="day-${di}-activities" style="${isExpanded ? '' : 'display:none'}">
      ${activitiesHtml}
      <button onclick="addActivity(${di})" class="add-task-btn" style="margin: 4px 14px 14px; width: calc(100% - 28px); display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 10px; border: 1.5px dashed var(--border); background: transparent; font-size: 13px; font-weight: 700; color: var(--accent); cursor: pointer;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
  </div>
</div>`;
    }

    function renderActivity(act, di, actIndex) {
      const isExpanded = state.activitiesExpanded.has(act.id);
      const ordinary = parseFloat(act.ordinary) || 0;
      const overtime = parseFloat(act.overtime) || 0;
      const isMissingCode = (ordinary > 0 || overtime > 0) && act.codes.length === 0;
      const isMissingHours = act.codes.length > 0 && ordinary === 0 && overtime === 0;
      const isInvalid = isMissingCode || isMissingHours;
      // Hours with no code → red immediately
      // Code with no hours → red only on collapse (grace period while entering hours)
      const showRedBorder = isMissingCode || (isMissingHours && !isExpanded);
      const numTasks = act.codes.length || 1;
      const hrsPerTask = ordinary > 0 ? Math.round(ordinary / numTasks) : '—';
      const otPerTask = overtime > 0 ? Math.round(overtime / numTasks) : '—';
      const notesOpen = state.notesOpen.has(act.id) ? state.notesOpen.get(act.id) : !!act.notes;

      return `
      <div class="activity-card ${isExpanded ? 'expanded' : ''}" data-act-id="${act.id}" style="${showRedBorder ? 'border-color:var(--btn-danger-color); box-shadow: 0 0 8px rgba(232, 69, 60, 0.2)' : ''}">
        <div class="flex items-center gap-3 px-3.5 py-3 cursor-pointer" onclick="toggleActivityDetails('${act.id}')">
          <div class="task-num">${actIndex + 1}</div>
          <div class="flex-1 min-w-0 act-meta">
            <!-- Line 1: description, full width -->
            <div class="act-desc-txt" data-row-desc="${act.id}">${esc(act.description) || '<span style="opacity:0.4;font-weight:400;font-style:italic">No description</span>'}</div>
            <!-- Line 2: location left, hour pills right -->
            <div class="act-row2">
              <div class="act-loc-txt" data-row-loc="${act.id}">
                ${act.location ? `<span style="margin-right:2px">📍</span>${esc(act.location)}` : '<span style="opacity:0.4">No location</span>'}
              </div>
              <div class="act-pill-row">
                ${ordinary > 0 ? `<span data-row-hrs="${act.id}" class="pill-hrs">${ordinary}h</span>` : `<span data-row-hrs="${act.id}" style="display:none"></span>`}
                ${overtime > 0 ? `<span data-row-ot="${act.id}" class="pill-ot">+${overtime} OT</span>` : `<span data-row-ot="${act.id}" style="display:none"></span>`}
              </div>
            </div>
          </div>
          <span class="chevron" style="font-size:14px;color:var(--text-muted);transform:${isExpanded ? 'rotate(90deg)' : 'rotate(0deg)'};transition:transform 0.2s;flex-shrink:0;">›</span>
        </div>
        <div class="activity-detail ${isExpanded ? 'open' : ''}" style="${isExpanded ? '' : 'display:none'}">
          <div class="act-detail-inner">
            <div class="flex flex-col gap-1.5">
              <span class="act-field-label">Description</span>
              <textarea placeholder="Description of work" rows="1"
                class="act-textarea"
                data-field="description" data-act="${act.id}" data-day="${di}" oninput="updateField(this);autoGrow(this)">${esc(act.description)}</textarea>
            </div>

            <div class="flex flex-col gap-1.5">
              <span class="act-field-label">Location</span>
              <div class="location-wrap">
                <input type="text" placeholder="Town name or code…" value="${esc(act.location)}"
                  class="act-input"
                  data-field="location" data-act="${act.id}" data-day="${di}"
                  readonly style="cursor:pointer"
                  onclick="openLocationModal(${di}, '${act.id}')">
              </div>
            </div>

            <div class="flex flex-col gap-1.5">
              <span class="act-field-label">Work Codes</span>
              <div class="act-codes-wrap">
                ${act.codes.map(c => `
                  <div class="act-code-chip">
                    ${c.d}
                    <span class="act-code-mono">${c.c}</span>
                    <button onclick="removeCode('${act.id}',${di},'${c.c}')"
                      class="act-code-del">×</button>
                  </div>`).join('')}
                <button onclick="openCodeModal(${di},'${act.id}')"
                  class="act-add-code">
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                  Code
                </button>
              </div>
              ${isMissingCode ? `<div class="act-missing-warn">⚠️ Missing work code</div>` : ''}
              ${isMissingHours ? `<div class="act-missing-warn">⚠️ Missing hours</div>` : ''}
            </div>

            <div class="flex gap-3">
              <div class="hrs-box flex-1">
                <div class="act-field-label" style="margin-bottom: 8px;">Ordinary HRS</div>
                <div class="hrs-stepper flex items-center justify-between">
                  <button onclick="event.stopPropagation(); stepHrs('${act.id}',${di},'ordinary',-1)">−</button>
                  <span class="val" data-step-val="${act.id}-ordinary">${act.ordinary || 0}</span>
                  <button onclick="event.stopPropagation(); stepHrs('${act.id}',${di},'ordinary',1)">+</button>
                </div>
              </div>
              <div class="hrs-box ot-box flex-1">
                <div class="act-field-label act-field-label-ot" style="margin-bottom: 8px;">Overtime HRS</div>
                <div class="hrs-stepper flex items-center justify-between">
                  <button onclick="event.stopPropagation(); stepHrs('${act.id}',${di},'overtime',-1)">−</button>
                  <span class="val" data-step-val="${act.id}-overtime">${act.overtime || 0}</span>
                  <button onclick="event.stopPropagation(); stepHrs('${act.id}',${di},'overtime',1)">+</button>
                </div>
              </div>
            </div>

            <div class="flex items-center gap-3 px-1 pb-2 text-xs" style="color:var(--text-muted); margin-top: 4px;">
              <span>Tasks: <strong style="color:var(--text-secondary)">${numTasks}</strong></span>
              <span style="opacity:0.3">|</span>
              <span>Hrs/Task: <strong data-calc="hrsPerTask" data-act="${act.id}" style="color:var(--text-secondary)">${hrsPerTask}</strong></span>
              <span style="opacity:0.3">|</span>
              <span>OT/Task: <strong data-calc="otPerTask" data-act="${act.id}" style="color:var(--text-ot)">${otPerTask}</strong></span>
            </div>

            <div class="notes-panel">
              <div class="notes-panel-header" onclick="event.stopPropagation(); toggleNotes('${act.id}')">
                <svg width="15" height="15" viewBox="0 0 13 13" fill="none">
                  <path d="M2 10.5L3.5 9H11V1H2v9.5z" stroke="#BBBBB8" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M4 4.5h5M4 6.5h3" stroke="#BBBBB8" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                <div class="notes-panel-preview ${act.notes && act.notes.trim() ? 'has-note' : ''}">
                  ${act.notes && act.notes.trim() ? esc(act.notes).replace(/\n/g, ' ') : 'Add a note…'}
                </div>
                <svg class="notes-chevron" data-notes-btn="${act.id}" width="12" height="12" viewBox="0 0 12 12" fill="none"
                  style="flex-shrink:0; transition: transform 0.25s ease; transform: ${notesOpen ? 'rotate(90deg)' : 'rotate(0deg)'}">
                  <path d="M4.5 3l3 3-3 3" stroke="#D0D0CE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="notes-panel-body ${notesOpen ? 'open' : ''}" data-notes-wrap="${act.id}">
                <textarea placeholder="Notes…" rows="2"
                  class="act-notes-area"
                  data-field="notes" data-act="${act.id}" data-day="${di}" oninput="updateField(this);autoGrow(this)">${esc(act.notes || '')}</textarea>
              </div>
            </div>

            <button onclick="showConfirm('Delete task?','${esc(act.description || 'Unnamed')}',()=>removeActivity('${act.id}',${di}))"
              class="act-delete-btn">
              🗑 Delete task
            </button>
          </div>
        </div>
      </div>`;
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function stepHrs(actId, di, field, delta) {
      const day = state.weekData.days[di];
      if (!day) return;
      const act = day.activities.find(a => a.id === actId);
      if (!act) return;

      let val = (parseFloat(act[field]) || 0) + delta;
      if (val < 0) val = 0;
      act[field] = val;

      scheduleAutoSave();
      render(); // Guaranteed UI sync
    }

    function updateField(el) {
      const { field, act: actId, day: di } = el.dataset;
      const day = state.weekData.days[parseInt(di)];
      const act = day.activities.find(a => a.id === actId);
      if (!act) return;

      const val = el.value;
      act[field] = val;

      // Live-update description in collapsed header
      if (field === 'description') {
        const descEl = document.querySelector(`[data-row-desc="${actId}"]`);
        if (descEl) descEl.innerHTML = val ? esc(val) : '<span style="opacity:0.4;font-weight:400;font-style:italic">No description</span>';
      }

      // Live-update location (pin icon) in collapsed header
      if (field === 'location') {
        const locEl = document.querySelector(`[data-row-loc="${actId}"]`);
        if (locEl) locEl.innerHTML = val
          ? `<span style="margin-right:2px">📍</span>${esc(val)}`
          : '<span style="opacity:0.4">No location</span>';
      }

      // Live-update calculated displays when hours change
      if (field === 'ordinary' || field === 'overtime') {
        const numTasks = act.codes.length || 1;
        const ord = parseFloat(act.ordinary) || 0;
        const ot = parseFloat(act.overtime) || 0;
        const hrsEl = document.querySelector(`[data-calc="hrsPerTask"][data-act="${actId}"]`);
        const otEl = document.querySelector(`[data-calc="otPerTask"][data-act="${actId}"]`);
        if (hrsEl) hrsEl.textContent = ord > 0 ? Math.round(ord / numTasks) : '—';
        if (otEl) otEl.textContent = ot > 0 ? Math.round(ot / numTasks) : '—';
        // Live-update the collapsed row pills
        const rowHrsPill = document.querySelector(`[data-row-hrs="${actId}"]`);
        const rowOtPill = document.querySelector(`[data-row-ot="${actId}"]`);
        if (rowHrsPill) { rowHrsPill.textContent = ord > 0 ? `${ord}h` : ''; rowHrsPill.style.display = ord > 0 ? '' : 'none'; }
        if (rowOtPill) { rowOtPill.textContent = ot > 0 ? `+${ot} OT` : ''; rowOtPill.style.display = ot > 0 ? '' : 'none'; }
        updateSummaryDisplay();
      }
      scheduleAutoSave();
    }

    function adjHrs(btn, delta) {
      const { target, act: actId, day: di } = btn.dataset;
      const input = document.querySelector(`input[data-field="${target}"][data-act="${actId}"][data-day="${di}"]`);
      if (!input) return;

      let val = parseFloat(input.value) || 0;
      val = Math.max(0, val + delta);
      input.value = val;
      updateField(input);
    }

    function addActivity(di) {
      const newAct = createActivity();
      state.weekData.days[di].activities.push(newAct);
      state.activitiesExpanded.add(newAct.id); // Auto-expand new activities
      state.expandedDays.add(di); // Auto-expand the entire day so user sees the new activity
      render();
    }

    function removeActivity(actId, di) {
      const day = state.weekData.days[di];
      if (day.activities.length <= 1) {
        day.activities = [createActivity()];
      } else {
        day.activities = day.activities.filter(a => a.id !== actId);
      }
      scheduleAutoSave();
      render();
    }

    function removeCode(actId, di, code) {
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      if (!act) return;
      act.codes = act.codes.filter(c => c.c !== code);
      scheduleAutoSave();
      render();
    }

    function updateSummaryDisplay() {
      // lightweight re-render of just the summary header pills
      const summary = calcSummary(state.weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);
      const ordEl = document.querySelector('[data-sum-ord]');
      const otEl = document.querySelector('[data-sum-ot]');
      if (ordEl) { ordEl.textContent = Math.round(totalOrd) + 'h'; ordEl.style.display = totalOrd > 0 ? '' : 'none'; }
      if (otEl) { otEl.textContent = '+' + Math.round(totalOT) + ' OT'; otEl.style.display = totalOT > 0 ? '' : 'none'; }
    }

    function toggleHeader() {
      state.headerExpanded = !state.headerExpanded;
      // Update DOM directly without full re-render for smoothness
      const tiles = document.querySelector('.hdr-metrics');
      const chev = document.querySelector('.hdr-week-chevron');
      if (tiles) tiles.classList.toggle('open', state.headerExpanded);
      if (chev) chev.classList.toggle('open', state.headerExpanded);
    }

    function toggleSummary() {
      state.showSummary = !state.showSummary;
      if (state.layoutMode === 'table') {
        // Table view renders summary via template literal — needs full re-render
        render();
      } else {
        const tableWrap = document.querySelector('.sum-table-wrap');
        const chevron = document.querySelector('.sum-chevron-svg');
        if (tableWrap) tableWrap.classList.toggle('open', state.showSummary);
        if (chevron) chevron.style.transform = state.showSummary ? 'rotate(180deg)' : 'rotate(0deg)';
      }
    }

    function toggleLayoutMode() {
      state.layoutMode = state.layoutMode === 'table' ? 'card' : 'table';
      localStorage.setItem('layoutMode', state.layoutMode);
      render();
    }

    function prevWeek() {
      if (!state.weekStart) return;
      const d = strToDate(state.weekStart);
      d.setDate(d.getDate() - 7);
      loadWeek(dateToStr(d));
    }

    function nextWeek() {
      if (!state.weekStart) return;
      const d = strToDate(state.weekStart);
      d.setDate(d.getDate() + 7);
      loadWeek(dateToStr(d));
    }

    async function setView(v) {
      state.view = v;
      localStorage.setItem('lastView', v);
      window.scrollTo(0, 0);

      if (v === 'notes') await loadNotes();
      else if (v === 'exchanges') {
        if (!state.exchanges.length || !state.cabinets.length) {
          await Promise.all([loadTowns(), loadCabinets()]);
        }
        render();
      }
      else render();
    }

    // ============================================================
    // FIELD NOTES — sync, render, event handlers
    // ============================================================

    let notesSaveTimer = null;

    function scheduleNotesSave() {
      clearTimeout(notesSaveTimer);
      state.notesSyncStatus = 'pending';
      updateHeaderStatus();
      notesSaveTimer = setTimeout(async () => {
        const ts = Date.now();
        await dbPut('notes', { id: 'notes_all', userId: state.currentUser?.uid || null, data: state.notes, updatedAt: ts });
        if (state.currentUser) {
          try {
            await fsSetNotes(state.notes);
            state.notesSyncStatus = 'synced';
          } catch (e) {
            state.notesSyncStatus = 'error';
          }
          updateHeaderStatus();
        }
      }, 1000);
    }

    async function loadNotes() {
      state.notesSyncStatus = 'idle';

      // Unsubscribe from previous listener
      if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }

      const stored = await dbGet('notes', 'notes_all');
      if (state.notes.length === 0 && stored && stored.data.length > 0) {
        state.notes = stored.data;
      }
      render();

      if (!state.currentUser) return;

      // Subscribe to Firestore real-time updates for notes
      const ref = userDoc('data/notes');
      notesUnsubscribe = ref.onSnapshot({ includeMetadataChanges: true }, snap => {
        if (snap.metadata.hasPendingWrites) return;

        if (!snap.exists) {
          // No notes on server yet — push local
          fsSetNotes(state.notes).catch(() => { });
          state.notesSyncStatus = 'synced';
          updateHeaderStatus();
          return;
        }

        const remote = snap.data();
        if (!Array.isArray(remote.notes)) return;

        state.notes = deepCopy(remote.notes);
        dbPut('notes', { id: 'notes_all', userId: state.currentUser?.uid || null, data: state.notes, updatedAt: remote._updatedAt || Date.now() });

        const active = document.activeElement;
        const userEditing = active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
        if (state.view === 'notes' && !userEditing) render();

        state.notesSyncStatus = 'synced';
        updateHeaderStatus();
      }, () => {
        state.notesSyncStatus = 'error';
        updateHeaderStatus();
      });

      state.notesSyncStatus = 'synced';
      updateHeaderStatus();
    }

    // ---- Notes render ----
    // ---- Notes filter helper ----
    function getFilteredNotes() {
      const f = state.notesFilter;
      return state.notes.filter(n => {
        if (f === 'done') return n.status === 'done';
        if (f === 'all') return n.status !== 'done';
        return n.status !== 'done' && n.priority === f;
      }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    }

    // ---- Notes render ----
    function renderNotesView() {
      const TRASH_ICON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

      const filtered = getFilteredNotes();
      const f = state.notesFilter;

      const openNotes = state.notes.filter(n => n.status !== 'done');
      const doneNotes = state.notes.filter(n => n.status === 'done');
      const counts = { high: openNotes.filter(n => n.priority === 'high').length, medium: openNotes.filter(n => n.priority === 'medium').length, low: openNotes.filter(n => n.priority === 'low').length };

      const chips = [
        { key: 'all', label: `All (${openNotes.length})` },
        { key: 'high', label: `High (${counts.high})`, cls: 'high' },
        { key: 'medium', label: `Med (${counts.medium})`, cls: 'medium' },
        { key: 'low', label: `Low (${counts.low})`, cls: 'low' },
        { key: 'done', label: `Done (${doneNotes.length})`, cls: 'done' },
      ].map(c => `<div class="notes-chip ${c.key === f ? 'active' : (c.cls || '')}" onclick="setNotesFilter('${c.key}')">${c.label}</div>`).join('');

      const renderNote = (note) => {
        const isExpanded = state.expandedNotes.has(note.id);
        const isNew = !note.description && !note.location;
        const dotCls = { high: 'note-dot-high', medium: 'note-dot-medium', low: 'note-dot-low' }[note.priority] || 'note-dot-none';
        const metaParts = [note.location, note.date ? formatDate(note.date) : ''].filter(Boolean);
        const titleText = note.description || (isNew ? 'New note…' : 'Untitled');

        const priChips = ['high', 'medium', 'low'].map(p =>
          `<div class="note-pri-chip ${note.priority === p ? 'sel-' + p : ''}" onclick="setNotePriority('${note.id}', '${p}')">${p[0].toUpperCase() + p.slice(1)}</div>`
        ).join('');

        const header = `
          <div class="note-row ${state.selectionMode ? 'selectable' : ''}"
            onpointerdown="notePressStart(event,'${note.id}')"
            onpointerup="notePressEnd(event)"
            onpointercancel="notePressEnd(event)"
            oncontextmenu="event.preventDefault()"
            onclick="notePressClick(event,'${note.id}')"
            style="${isExpanded ? 'background:transparent' : ''}">
            ${state.selectionMode ? `
              <div class="note-selection-check">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
            ` : ''}
            <div class="note-dot ${dotCls}"></div>
            <div style="flex:1;min-width:0;">
              <div class="note-row-title" style="${note.status === 'done' ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">${esc(titleText)}</div>
              ${metaParts.length ? `<div class="note-row-meta">${esc(metaParts.join(' · '))}</div>` : ''}
            </div>
            <span class="note-expand-arrow ${isExpanded ? 'open' : ''}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          </div>`;

        const detail = `
          <div class="note-detail">
            <div class="note-detail-row">
              <span class="field-label" style="display:block; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Description</span>
              <textarea data-note-id="${note.id}" data-note-field="description" rows="1"
                style="resize:none;overflow:hidden"
                oninput="updateNoteField(this);autoGrow(this)">${esc(note.description)}</textarea>
            </div>
            <div class="note-detail-row">
              <span class="field-label" style="display:block; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Location</span>
              <input type="text" data-note-id="${note.id}" data-note-field="location"
                value="${esc(note.location)}"
                placeholder="Town name or code…"
                readonly style="cursor:pointer;width:100%"
                onclick="openLocationModal(null, null, '${note.id}')" />
            </div>
            <div class="note-detail-row">
              <span class="field-label" style="display:block; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Date</span>
              <div class="note-date-row" style="position:relative;">
                <input type="date" data-note-id="${note.id}" data-note-field="date"
                  value="${note.date || ''}" oninput="updateNoteField(this)" />
              </div>
            </div>
            <div class="note-detail-row">
              <span class="field-label" style="display:block; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Priority</span>
              <div class="note-priority-row">${priChips}</div>
            </div>
            <div class="note-footer">
              <button class="note-action-btn note-action-done" onclick="markNoteDone('${note.id}')">
                ${note.status === 'done'
            ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg> Reopen`
            : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Mark Done`}
              </button>
              <button class="note-action-btn note-action-delete" onclick="deleteNote('${note.id}')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Delete
              </button>
            </div>
          </div>`;

        return header + detail;
      };

      const visibleOpen = f === 'done' ? [] : filtered;
      const visibleDone = (f === 'done' || f === 'all') ? doneNotes : [];

      const allIds = [...visibleOpen, ...visibleDone].map(n => n.id);
      const isAllSelected = allIds.length > 0 && allIds.every(id => state.selectedNotes.has(id));


      const headerRow = `<div style="margin-top:14px"></div>`;

      const openSection = visibleOpen.length
        ? `<div class="notes-section-label">Open</div>` +
        visibleOpen.map(n => `<div class="note-card ${state.expandedNotes.has(n.id) ? 'expanded' : ''} ${state.selectedNotes.has(n.id) ? 'selected' : ''}" data-note-id="${n.id}">${renderNote(n)}</div>`).join('')
        : (f !== 'done' ? `<div class="notes-empty">No ${f === 'all' ? 'open' : f} notes yet.</div>` : '');

      const doneSection = visibleDone.length
        ? `<div class="notes-section-label">Done</div>` +
        visibleDone.map(n => `<div class="note-card done-card ${state.expandedNotes.has(n.id) ? 'expanded' : ''} ${state.selectedNotes.has(n.id) ? 'selected' : ''}" data-note-id="${n.id}">${renderNote(n)}</div>`).join('')
        : '';

      // Smart bulk action label — context-aware
      const selIds = Array.from(state.selectedNotes);
      const selNotes = state.notes.filter(n => selIds.includes(n.id));
      const selAllDone = selNotes.length > 0 && selNotes.every(n => n.status === 'done');
      const selAllOpen = selNotes.length > 0 && selNotes.every(n => n.status === 'open');
      const bulkStatusLabel = selAllDone ? 'Reopen' : selAllOpen ? 'Mark Done' : 'Toggle Status';
      const bulkStatusIcon = selAllDone
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

      // Add Note card (normal mode) OR selection banner (selection mode)
      const addCard = state.selectionMode
        ? `<div class="notes-selection-banner">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:14px;font-weight:700;color:var(--text-primary);">${state.selectedNotes.size} selected</span>
              <button onclick="toggleSelectAll()" style="background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;padding:0;font-family:inherit;">${isAllSelected ? 'Deselect all' : 'Select all'}</button>
            </div>
            <button onclick="toggleSelectionMode()" style="background:none;border:none;color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;padding:0;font-family:inherit;">Cancel</button>
          </div>`
        : `<div class="add-note-dashed" onclick="addNote()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Note
          </div>`;

      const noSel = state.selectedNotes.size === 0;
      const bulkBar = `
        <div class="bulk-action-bar ${state.selectionMode ? 'show' : ''}">
          <div class="bulk-action-btns" style="width:100%;">
            <button class="bulk-btn done" onclick="toggleStatusSelected()" ${noSel ? 'disabled' : ''}>
              ${bulkStatusIcon}${bulkStatusLabel}
            </button>
            <button class="bulk-btn delete" onclick="deleteSelected()" ${noSel ? 'disabled' : ''}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Delete
            </button>
          </div>
        </div>`;

      return `<div class="notes-view" style="${state.selectionMode ? 'padding-bottom:120px' : ''}">${headerRow}<div class="notes-chips">${chips}</div>${addCard}${openSection}${doneSection}${bulkBar}</div>`;
    }

    // ---- Notes event handlers ----
    let _notePressTimer = null;
    let _notePressLocked = false;

    function notePressStart(e, id) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      _notePressLocked = false;
      _notePressTimer = setTimeout(() => {
        _notePressTimer = null;
        _notePressLocked = true;
        if (!state.selectionMode) {
          state.selectionMode = true;
          state.selectedNotes.clear();
        }
        state.selectedNotes.add(id);
        if (navigator.vibrate) navigator.vibrate(30);
        render();
      }, 500);
    }

    function notePressEnd(e) {
      if (_notePressTimer) { clearTimeout(_notePressTimer); _notePressTimer = null; }
    }

    function notePressClick(e, id) {
      if (_notePressLocked) { _notePressLocked = false; return; }
      if (state.selectionMode) { toggleNoteSelection(id); } else { toggleNote(id); }
    }

    function toggleSelectionMode() {
      state.selectionMode = !state.selectionMode;
      if (!state.selectionMode) {
        state.selectedNotes.clear();
      }
      render();
    }

    function toggleNoteSelection(id) {
      if (state.selectedNotes.has(id)) {
        state.selectedNotes.delete(id);
      } else {
        state.selectedNotes.add(id);
      }
      render();
    }

    function toggleSelectAll() {
      // Build visible sets matching exactly what renderNotesView shows
      const f = state.notesFilter;
      const allOpen = state.notes.filter(n => n.status !== 'done');
      const allDone = state.notes.filter(n => n.status === 'done');
      // Open: filtered by priority if needed, excluded on 'done' tab
      const visibleOpen = f === 'done' ? [] :
        f === 'all' ? allOpen : allOpen.filter(n => n.priority === f);
      // Done: shown on 'all' and 'done' tabs only
      const visibleDone = (f === 'done' || f === 'all') ? allDone : [];
      const allVisibleIds = [...visibleOpen, ...visibleDone].map(note => note.id);

      const allSelected = allVisibleIds.every(id => state.selectedNotes.has(id));

      if (allSelected) {
        allVisibleIds.forEach(id => state.selectedNotes.delete(id));
      } else {
        allVisibleIds.forEach(id => state.selectedNotes.add(id));
      }
      render();
    }

    function deleteSelected() {
      if (state.selectedNotes.size === 0) return;
      const count = state.selectedNotes.size;
      showConfirm('Delete notes?', `Delete ${count} selected ${count === 1 ? 'note' : 'notes'}?`, () => {
        const toDelete = Array.from(state.selectedNotes);
        state.notes = state.notes.filter(n => !toDelete.includes(n.id));
        toDelete.forEach(id => state.expandedNotes.delete(id));
        state.selectedNotes.clear();
        state.selectionMode = false;
        scheduleNotesSave();
        render();
        showToast(`${toDelete.length} ${toDelete.length === 1 ? 'note' : 'notes'} deleted`);
      });
    }

    async function toggleStatusSelected() {
      if (state.selectedNotes.size === 0) return;
      const toToggle = Array.from(state.selectedNotes);
      const selNotes = state.notes.filter(n => toToggle.includes(n.id));
      const allDone = selNotes.every(n => n.status === 'done');
      const allOpen = selNotes.every(n => n.status === 'open');
      let markedDone = 0, reopened = 0;
      state.notes.forEach(note => {
        if (!toToggle.includes(note.id)) return;
        if (allDone) {
          note.status = 'open'; reopened++;
        } else if (allOpen) {
          note.status = 'done'; markedDone++;
          state.expandedNotes.delete(note.id);
        } else {
          // mixed — toggle each individually
          if (note.status === 'done') { note.status = 'open'; reopened++; }
          else { note.status = 'done'; markedDone++; state.expandedNotes.delete(note.id); }
        }
        note.updatedAt = Date.now();
      });
      state.selectedNotes.clear();
      state.selectionMode = false;
      scheduleNotesSave();
      render();
      const parts = [];
      if (markedDone) parts.push(`${markedDone} marked done`);
      if (reopened) parts.push(`${reopened} reopened`);
      showToast(parts.join(', '));
    }

    function addNote() {
      const note = createNote();
      state.notes.unshift(note);
      state.expandedNotes.add(note.id);
      state.notesFilter = 'all';
      render();
      // focus description textarea
      setTimeout(() => {
        const ta = document.querySelector(`textarea[data-note-id="${note.id}"]`);
        if (ta) ta.focus();
      }, 80);
    }

    function toggleNote(id) {
      const isExpanded = state.expandedNotes.has(id);
      if (isExpanded) {
        state.expandedNotes.delete(id);
      } else {
        state.expandedNotes.add(id);
      }

      // Update DOM directly for smooth transition
      const card = document.querySelector(`.note-card[data-note-id="${id}"]`);
      if (card) {
        const row = card.querySelector('.note-row');
        const arrow = card.querySelector('.note-expand-arrow');

        if (isExpanded) {
          card.classList.remove('expanded');
          row.style.background = 'transparent';
          arrow.classList.remove('open');
        } else {
          card.classList.add('expanded');
          row.style.background = 'var(--bg-day-header)';
          arrow.classList.add('open');
        }
      } else {
        render();
      }
    }

    function updateNoteField(input) {
      const id = input.dataset.noteId;
      const field = input.dataset.noteField;
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      note[field] = input.value;
      note.updatedAt = Date.now();
      // update row title/meta live without full re-render
      const card = document.querySelector(`.note-card[data-note-id="${id}"]`);
      if (card) {
        const titleEl = card.querySelector('.note-row-title');
        const metaEl = card.querySelector('.note-row-meta');
        if (field === 'description' && titleEl) titleEl.textContent = input.value || 'Untitled';
        if (field === 'location' && metaEl) metaEl.textContent = [input.value, note.date ? formatDate(note.date) : ''].filter(Boolean).join(' · ');
      }
      scheduleNotesSave();
    }

    function setNotePriority(id, priority) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      note.priority = priority;
      note.updatedAt = Date.now();
      scheduleNotesSave();
      // re-render just the expanded card
      const card = document.querySelector(`.note-card[data-note-id="${id}"]`);
      if (card) {
        const dotEl = card.querySelector('.note-dot');
        if (dotEl) { dotEl.className = 'note-dot ' + ({ high: 'note-dot-high', medium: 'note-dot-medium', low: 'note-dot-low' }[priority] || 'note-dot-none'); }
        card.querySelectorAll('.note-pri-chip').forEach((el, i) => {
          const p = ['high', 'medium', 'low'][i];
          el.className = 'note-pri-chip' + (p === priority ? ' sel-' + p : '');
        });
      }
    }

    function setNoteToday(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      note.date = dateToStr(new Date());
      note.updatedAt = Date.now();
      const input = document.querySelector(`input[data-note-id="${id}"][data-note-field="date"]`);
      if (input) input.value = note.date;
      const card = document.querySelector(`.note-card[data-note-id="${id}"]`);
      if (card) {
        const metaEl = card.querySelector('.note-row-meta');
        if (metaEl) metaEl.textContent = [note.location, formatDate(note.date)].filter(Boolean).join(' · ');
      }
      scheduleNotesSave();
    }

    function markNoteDone(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      note.status = note.status === 'done' ? 'open' : 'done';
      note.updatedAt = Date.now();
      state.expandedNotes.delete(id);
      scheduleNotesSave();
      render();
    }

    function deleteNote(id) {
      const note = state.notes.find(n => n.id === id);
      const title = note?.description?.trim() || 'Untitled note';
      showConfirm('Delete note?', title, () => {
        state.notes = state.notes.filter(n => n.id !== id);
        state.expandedNotes.delete(id);
        scheduleNotesSave();
        render();
      });
    }

    function saveNewNote(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      state.expandedNotes.delete(id);
      scheduleNotesSave();
      render();
    }

    function cancelNewNote(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      if (!note.description && !note.location) {
        // blank note — discard
        state.notes = state.notes.filter(n => n.id !== id);
      }
      state.expandedNotes.delete(id);
      render();
    }

    function setNotesFilter(f) {
      state.notesFilter = f;
      render();
    }

    // Notes location search — reuses towns list, parallel to townSearch
    function noteLocationSearch(input) {
      const id = input.dataset.noteId;
      const dd = document.getElementById('ntd-' + id);
      if (!dd) return;
      const q = input.value.trim().toLowerCase();

    function handleSearchKey(e) {
      const isEx = state.exchangeTab === 'exchanges';
      const results = isEx ? getFilteredExchanges(state.exchangeSearch.toLowerCase()) : getFilteredCabinets(state.cabinetSearch.toLowerCase());

      if (!results.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        state.searchHighlightIndex = Math.min(state.searchHighlightIndex + 1, results.length - 1);
        refreshSearchResults();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        state.searchHighlightIndex = Math.max(state.searchHighlightIndex - 1, -1);
        refreshSearchResults();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (state.searchHighlightIndex >= 0 && state.searchHighlightIndex < results.length) {
          const item = results[state.searchHighlightIndex];
          if (isEx) setSelectedExchange(item.code);
          else setSelectedCabinet(item.ipid);
        }
      }
    }

    function getFilteredExchanges(query) {
      if (!query) return [];
      return state.exchanges.filter(t =>
        t.name.toLowerCase().startsWith(query) || t.code.toLowerCase().startsWith(query)
      ).sort((a, b) => {
        const aName = a.name.toLowerCase(), bName = b.name.toLowerCase();
        const aCode = a.code.toLowerCase(), bCode = b.code.toLowerCase();
        const aStarts = aName.startsWith(query) || aCode.startsWith(query);
        const bStarts = bName.startsWith(query) || bCode.startsWith(query);
        if (aStarts && !bStarts) return -1;
        if (!aStarts && bStarts) return 1;
        return aName.localeCompare(bName);
      }).slice(0, 30);
    }

    function getFilteredCabinets(query) {
      if (!query) return [];
      return state.cabinets.filter(c =>
        c.mdf.toLowerCase().startsWith(query) || c.ccp.toLowerCase().startsWith(query) || String(c.ipid).startsWith(query)
      ).sort((a, b) => {
        const aM = a.mdf.toLowerCase(), bM = b.mdf.toLowerCase();
        const aStarts = aM.startsWith(query) || a.ccp.toLowerCase().startsWith(query);
        const bStarts = bM.startsWith(query) || b.ccp.toLowerCase().startsWith(query);
        if (aStarts && !bStarts) return -1;
        if (!aStarts && bStarts) return 1;
        return aM.localeCompare(bM);
      }).slice(0, 30);
    }

    function positionNoteTooltip(e, tip) {
      const margin = 12;
      const rect = e.currentTarget.getBoundingClientRect();
      let top = rect.bottom + margin;
      let left = rect.left;
      // Keep within viewport
      if (left + 320 > window.innerWidth) left = window.innerWidth - 324;
      if (top + 200 > window.innerHeight) top = rect.top - 200 - margin;
      tip.style.top = top + 'px';
      tip.style.left = left + 'px';
    }

    // Flush any pending saves when the tab is hidden or the page is unloaded.
    // This covers: switching tabs, closing the tab, closing the browser,
    // and navigating away — all cases where the debounce timer would otherwise
    // be silently cancelled by the browser before it fires.
    async function flushPendingSaves() {
      const flushWeek = saveTimer && state.weekStart && state.weekData && state.currentUser;
      const flushNotes = notesSaveTimer && state.notes && state.currentUser;
      if (!flushWeek && !flushNotes) return;
      if (flushWeek) {

        saveTimer = null;
        await dbPut('weeks', { weekStart: state.weekStart, userId: state.currentUser.uid, data: state.weekData, updatedAt: state.weekData._updatedAt || Date.now() });

      if (flushNotes) {
        clearTimeout(notesSaveTimer);
        notesSaveTimer = null;
        const ts = Date.now();
        await dbPut('notes', { id: 'notes_all', userId: state.currentUser.uid, data: state.notes, updatedAt: ts });
        await fsSetNotes(state.notes).catch(() => { });
      }
    }
