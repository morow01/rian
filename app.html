    // ============================================================
    // SNAPSHOTS
    // ============================================================
    const SNAPSHOT_MAX = 20;          // max snapshots kept per week
    const SNAPSHOT_THROTTLE_MS = 10 * 60 * 1000; // auto-snapshot at most once per 10 min
    const _lastSnapshotAt = {};       // weekStart → timestamp of last auto-snapshot

    // ---- Device name ----
    // Auto-detected once per session from browser UA, stored in localStorage so it
    // persists across sessions. Users can rename via the snapshot modal if needed.
    function _detectDeviceName() {
      const ua = navigator.userAgent;
      let browser = 'Browser';
      if (/Edg\//.test(ua)) browser = 'Edge';
      else if (/OPR\/|Opera/.test(ua)) browser = 'Opera';
      else if (/Chrome\//.test(ua)) browser = 'Chrome';
      else if (/Firefox\//.test(ua)) browser = 'Firefox';
      else if (/Safari\//.test(ua)) browser = 'Safari';
      let os = 'Device';
      if (/Windows/.test(ua)) os = 'Windows';
      else if (/Android/.test(ua)) os = 'Android';
      else if (/iPhone|iPad/.test(ua)) os = 'iOS';
      else if (/Mac OS/.test(ua)) os = 'Mac';
      else if (/Linux/.test(ua)) os = 'Linux';
      return `${browser} · ${os}`;
    }

    function getDeviceName() {
      let name = localStorage.getItem('deviceName');
      if (!name) {
        name = _detectDeviceName();
        localStorage.setItem('deviceName', name);
      }
      return name;
    }

    function _snapshotSummary(weekData) {
      if (!weekData || !weekData.days) return { totalOrd: 0, totalOt: 0, entries: 0 };
      let totalOrd = 0, totalOt = 0, entries = 0;
      weekData.days.forEach(d => {
        (d.activities || []).forEach(a => {
          totalOrd += parseFloat(a.ordinary) || 0;
          totalOt += parseFloat(a.overtime) || 0;
          if (a.description || a.ordinary || a.overtime) entries++;
        });
      });
      return { totalOrd, totalOt, entries };
    }

    async function maybeTakeAutoSnapshot(weekStart, weekData) {
      if (!state.currentUser || !weekStart || !weekData) return;
      const now = Date.now();
      if (_lastSnapshotAt[weekStart] && now - _lastSnapshotAt[weekStart] < SNAPSHOT_THROTTLE_MS) return;
      _lastSnapshotAt[weekStart] = now;
      await _writeSnapshot(weekStart, weekData, 'auto');
    }

    async function takeManualSnapshot() {
      if (!state.currentUser || !state.weekStart || !state.weekData) return;
      showToast('Saving snapshot…');
      // Flush any pending save first so the snapshot reflects latest edits
      if (saveTimer && state.weekStart && state.weekData) {
        clearTimeout(saveTimer);
        saveTimer = null;
        await dbPut('weeks', { weekStart: state.weekStart, userId: state.currentUser.uid, data: state.weekData, updatedAt: state.weekData._updatedAt || Date.now() });
        await fsSetWeek(state.weekStart, state.weekData).catch(() => { });
      }
      await _writeSnapshot(state.weekStart, state.weekData, 'manual');
      showToast('Snapshot saved.');
      await renderSnapshotList(state.weekStart);
    }

    async function _writeSnapshot(weekStart, weekData, label) {
      try {
        const uid = state.currentUser.uid;
        const ts = Date.now();
        const summary = _snapshotSummary(weekData);
        const colRef = db_fs.collection(`users/${uid}/weeks/${weekStart}/snapshots`);
        await colRef.doc(String(ts)).set({
          weekStart,
          days: weekData.days,
          _savedAt: ts,
          _label: label,
          _summary: summary,
          _device: getDeviceName()
        });
        // Prune oldest if over limit
        const all = await colRef.orderBy('_savedAt', 'asc').get();
        if (all.size > SNAPSHOT_MAX) {
          const batch = db_fs.batch();
          const toDelete = all.docs.slice(0, all.size - SNAPSHOT_MAX);
          toDelete.forEach(d => batch.delete(d.ref));
          await batch.commit();
        }
      } catch (e) { /* non-critical — silently ignore */ }
    }

    async function listSnapshots(weekStart) {
      if (!state.currentUser || !weekStart) return [];
      try {
        const uid = state.currentUser.uid;
        const snap = await db_fs
          .collection(`users/${uid}/weeks/${weekStart}/snapshots`)
          .orderBy('_savedAt', 'desc')
          .get();
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) { return []; }
    }

    // Returns an object { relative, exact } for display
    function _formatSnapTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const exact = d.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' }) + ' ' + timeStr;
      let relative;
      if (diffMins < 1) relative = 'Just now';
      else if (diffMins < 60) relative = `${diffMins}m ago`;
      else if (diffHours < 24) relative = `${diffHours}h ago · ${timeStr}`;
      else if (diffDays === 1) relative = `Yesterday · ${timeStr}`;
      else relative = exact;
      return { relative, exact };
    }

    async function renderSnapshotList(weekStart) {
      const el = document.getElementById('snapshot-list');
      if (!el) return;
      el.innerHTML = '<div class="snap-empty">Loading…</div>';
      const snaps = await listSnapshots(weekStart);
      if (!snaps.length) {
        el.innerHTML = '<div class="snap-empty">No snapshots yet for this week.<br>Snapshots are taken automatically as you save.</div>';
        return;
      }
      el.innerHTML = snaps.map(s => {
        const sum = s._summary || {};
        const ordH = sum.totalOrd || 0;
        const otH = sum.totalOt || 0;
        const ent = sum.entries || 0;
        const label = s._label === 'manual' ? '<span class="snap-tag">manual</span>'
          : s._label === 'pre-restore' ? '<span class="snap-tag" style="background:rgba(251,146,60,0.15);color:#f97316;">pre-restore</span>'
            : '';
        const { relative, exact } = _formatSnapTime(s._savedAt);
        const device = s._device ? `<span style="opacity:0.7">· ${esc(s._device)}</span>` : '';
        return `
          <div class="snap-row">
            <div class="snap-row-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
            </div>
            <div class="snap-row-body">
              <div class="snap-row-time" title="${exact}">${relative}${label}</div>
              <div class="snap-row-summary">${ent} ${ent === 1 ? 'entry' : 'entries'} · ${ordH}h ordinary${otH ? ' · ' + otH + 'h OT' : ''} ${device}</div>
            </div>
            <button class="snap-restore-btn" onclick="confirmRestoreSnapshot('${s.id}', ${s._savedAt})">Restore</button>
          </div>`;
      }).join('');
    }

    function confirmRestoreSnapshot(snapId, savedAt) {

      closeSnapshotModal();
      showConfirm(

          showToast('Restoring…');
          try {
            // Snapshot current state before overwriting
            await _writeSnapshot(state.weekStart, state.weekData, 'pre-restore');
            // Fetch the chosen snapshot
            const uid = state.currentUser.uid;
            const doc = await db_fs
              .doc(`users/${uid}/weeks/${state.weekStart}/snapshots/${snapId}`)
              .get();
            if (!doc.exists) { showToast('Snapshot not found.'); return; }
            const snapData = doc.data();
            const restored = { weekStart: state.weekStart, days: snapData.days, _updatedAt: Date.now() };
            // Write restored data as the live week
            await dbPut('weeks', { weekStart: state.weekStart, userId: uid, data: restored, updatedAt: restored._updatedAt });
            await fsSetWeek(state.weekStart, restored);
            state.weekData = deepCopy(restored);
            render();
            showToast('Week restored.');
          } catch (e) { showToast('Restore failed: ' + (e.message || e)); }
        }
      );

    // DATA MANAGEMENT (GDPR)
    // ============================================================
    function clearCurrentWeek() {
      if (!state.currentUser || !state.weekStart) return;
      showConfirm(
        'Clear this week?',
        `All entries for ${formatWeekRange(state.weekStart)} will be permanently deleted.`,
        async () => {
          showToast('Clearing week…');
          try {
            const ws = state.weekStart;
            const emptyWeek = { ...createEmptyWeek(ws), _updatedAt: Date.now() };
            // Write empty week to Firestore — all connected clients receive the
            // snapshot and update to empty (avoids the !snap.exists push-back bug)
            await userDoc(`weeks/${ws}`).set(emptyWeek);
            await dbPut('weeks', { weekStart: ws, userId: state.currentUser.uid, data: emptyWeek, updatedAt: emptyWeek._updatedAt });
            state.weekData = emptyWeek;

    async function _deleteAllFirestoreData(currentWeekStart) {
      const uid = state.currentUser.uid;
      const weeksSnap = await db_fs.collection(`users/${uid}/weeks`).get().catch(() => null);
      if (weeksSnap) {
        const batch = db_fs.batch();
        weeksSnap.docs.forEach(d => {
          if (d.id === currentWeekStart) {
            // SET current week to empty so all active listeners update cleanly
            const emptyWeek = { ...createEmptyWeek(currentWeekStart), _updatedAt: Date.now() };
            batch.set(d.ref, emptyWeek);
          } else {
            // Delete all other weeks (no listener watching them)
            batch.delete(d.ref);
          }
        });
        await batch.commit().catch(() => { });
      }
      // Delete notes and user profile
      await userDoc('data/notes').delete().catch(() => { });
      await db_fs.doc(`users/${uid}`).delete().catch(() => { });
    }

    function clearAllData() {
      if (!state.currentUser) return;
      showConfirm(
        'Clear ALL data?',
        'This permanently deletes all your timesheets and notes from every device. This cannot be undone.',
        async () => {
          showToast('Deleting all data…');
          try {
            const ws = state.weekStart || dateToStr(getCurrentFriday());
            // 1. Kill notes listener (week listener must stay alive to receive
            //    the empty-week snapshot that clears other devices)
            if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }
            state.notes = [];
            // 2. Write empty current week + delete all others in one batch.
            //    The active onSnapshot will receive the empty week and update
            //    all connected clients automatically — no cache clear needed.
            await _deleteAllFirestoreData(ws);
            await Promise.allSettled([dbClear('weeks'), dbClear('notes')]);
            // 3. Notes: reload (listener was unsubscribed above)
            if (state.view === 'notes') loadNotes();
            showToast('All data deleted.');
          } catch (e) { showToast('Error: ' + e.message); }
        }
      );
    }

    function deleteAccount() {
      if (!state.currentUser) return;
      showConfirm(
        'Delete account?',
        'Your account and all data will be permanently deleted. You will be signed out immediately. This cannot be undone.',
        async () => {
          showToast('Deleting account…');
          try {
            // Pass null so _deleteAllFirestoreData deletes ALL weeks (no empty-set)
            await _deleteAllFirestoreData(null);
            await Promise.allSettled([dbClear('weeks'), dbClear('notes')]);
            if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
            if (notesSaveTimer) { clearTimeout(notesSaveTimer); notesSaveTimer = null; }
            state.weekData = null; state.notes = [];
            if (weekUnsubscribe) { weekUnsubscribe(); weekUnsubscribe = null; }
            if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }

            // Firebase requires a recent sign-in for account deletion.
            // If the session is stale, re-authenticate silently then retry.
            const user = auth_fb.currentUser;
            try {
              await user.delete();
            } catch (e) {
              if (e.code === 'auth/requires-recent-login') {
                showToast('Re-authenticating…');
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                await auth_fb.signInWithPopup(provider);
                await auth_fb.currentUser.delete();
              } else {
                throw e;
              }
            }
            // onAuthStateChanged fires after delete → automatically shows login screen
          } catch (e) {
            showToast('Could not delete account: ' + (e.message || e.code));
          }
        }
      );
    }

    async function signOutUser() {
      // Flush any pending saves to Firestore BEFORE clearing state or signing out.
      // Cancelling the timers without flushing first would permanently lose any
      // edits that hadn't yet been written (this was the confirmed data-loss bug).
      if (saveTimer && state.weekStart && state.weekData && state.currentUser) {
        clearTimeout(saveTimer);
        saveTimer = null;
        await dbPut('weeks', { weekStart: state.weekStart, userId: state.currentUser.uid, data: state.weekData, updatedAt: state.weekData._updatedAt || Date.now() });
        await fsSetWeek(state.weekStart, state.weekData).catch(() => { });
      } else if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = null;
      }
      if (notesSaveTimer && state.notes && state.currentUser) {
        clearTimeout(notesSaveTimer);
        notesSaveTimer = null;
        const ts = Date.now();
        await dbPut('notes', { id: 'notes_all', userId: state.currentUser.uid, data: state.notes, updatedAt: ts });
        await fsSetNotes(state.notes).catch(() => { });
      } else if (notesSaveTimer) {
        clearTimeout(notesSaveTimer);
        notesSaveTimer = null;
      }
      state.weekData = null;
      state.notes = [];
      // Wipe local IDB so the next user never sees this user's cached data
      await Promise.allSettled([dbClear('weeks'), dbClear('notes')]);
      if (weekUnsubscribe) { weekUnsubscribe(); weekUnsubscribe = null; }
      if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }
      await auth_fb.signOut();
      window.location.href = './index.html';
    }

      initTheme();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      }

      const lastView = localStorage.getItem('lastView');
      if (lastView === 'notes' || lastView === 'history' || lastView === 'exchanges') state.view = lastView;

      await Promise.all([initDB(), loadCodes(), loadTowns(), loadCabinets()]);

      // Show login screen immediately while waiting for auth state
      renderLogin();

      // Firebase auth state observer — drives the whole app lifecycle
      auth_fb.onAuthStateChanged(async user => {
        state.currentUser = user;
        if (!user) {
          // Signed out — tear down listeners and show login
          if (weekUnsubscribe) { weekUnsubscribe(); weekUnsubscribe = null; }
          if (notesUnsubscribe) { notesUnsubscribe(); notesUnsubscribe = null; }
          renderLogin();
          return;
        }

        // Store user profile in Firestore so admin can identify users by name
        db_fs.doc(`users/${user.uid}`).set({
          displayName: user.displayName || '',
          email: user.email || '',
          lastSeen: Date.now(),
        }, { merge: true }).catch(() => { });

        // Signed in — load local data first for instant display
        // Only use cached notes if they belong to this user
        if (state.view === 'notes') {
          const storedNotes = await dbGet('notes', 'notes_all');
          if (storedNotes && storedNotes.data && (!storedNotes.userId || storedNotes.userId === user.uid)) {
            state.notes = storedNotes.data;
          }
        }

        const friday = getCurrentFriday();
        await loadWeek(dateToStr(friday));

        if (state.view === 'notes') loadNotes();
      });
    }

    async function forcePullWeek() {
      showToast('Re-subscribing to week…');
      await loadWeek(state.weekStart);
    }

    async function forcePullNotes() {
      showToast('Re-subscribing to notes…');
      await loadNotes();
    }

    init();
  </script>

</body>

</html>
