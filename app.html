    // ============================================================
    // INDEXEDDB
    // ============================================================
    function initDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('weeks')) d.createObjectStore('weeks', { keyPath: 'weekStart' });
          if (!d.objectStoreNames.contains('notes')) d.createObjectStore('notes', { keyPath: 'id' });
        };
        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror = rej;
      });
    }

    function dbGet(store, key) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    function dbPut(store, val) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).put(val);
        req.onsuccess = res;
        req.onerror = rej;
      });
    }

    function dbGetAll(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    function dbClear(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).clear();
        req.onsuccess = res;
        req.onerror = rej;
      });
    }

    // ============================================================
    // FIREBASE SYNC HELPERS
    // ============================================================
    function userDoc(path) {
      if (!state.currentUser) return null;
      return db_fs.doc(`users/${state.currentUser.uid}/${path}`);
    }

    async function fsSetWeek(weekStart, weekData) {
      const ref = userDoc(`weeks/${weekStart}`);
      if (!ref) return;
      // Use serverTimestamp for _updatedAt to ensure cross-device consistency
      await ref.set({ ...weekData, _updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      // After a successful Firestore write, opportunistically take an auto-snapshot
      // (throttled to once per 10 min so it doesn't spam the subcollection).
      maybeTakeAutoSnapshot(weekStart, weekData).catch(() => { });
    }

    async function fsSetNotes(notes) {
      const ref = userDoc('data/notes');
      if (!ref) return;
      await ref.set({ notes, _updatedAt: Date.now() });
    }

    // ============================================================
    // DATE UTILS
    // ============================================================
    function dateToStr(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function strToDate(s) {
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function getCurrentFriday() {
      const today = new Date();
      const day = today.getDay(); // 0=Sun..6=Sat
      const back = [2, 3, 4, 5, 6, 0, 1][day];
      const d = new Date(today);
      d.setDate(d.getDate() - back);
      return d;
    }

    function getNearestFriday(dateStr) {
      const d = strToDate(dateStr);
      const day = d.getDay();
      if (day === 5) return dateStr;
      const back = [2, 3, 4, 5, 6, 0, 1][day];
      const fri = new Date(d);
      fri.setDate(d.getDate() - back);
      return dateToStr(fri);
    }

    function formatDate(dateStr) {
      const d = strToDate(dateStr);
      return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' });
    }

    function formatWeekRange(weekStart) {
      const start = strToDate(weekStart);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      return `${formatDate(weekStart)} – ${formatDate(dateToStr(end))}`;
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ============================================================
    // WEEK DATA
    // ============================================================
    function createEmptyWeek(weekStart) {
      const days = DAY_NAMES.map((name, i) => {
        const d = new Date(weekStart + 'T00:00:00');
        d.setDate(d.getDate() + i);
        return { date: dateToStr(d), dayName: name, activities: [createActivity()] };
      });
      return { weekStart, days };
    }

    function enforceCorrectDates(weekStart, weekData) {
      if (!weekStart || !weekData || !weekData.days) return;
      weekData.days.forEach((day, i) => {
        const d = new Date(weekStart + 'T00:00:00');
        d.setDate(d.getDate() + i);
        day.date = dateToStr(d);
        day.dayName = DAY_NAMES[i];
      });
    }

    // Persist day-expanded and notes-open state to localStorage (per week)
    function saveUiState() {
      if (!state.weekStart) return;
      localStorage.setItem('ui_' + state.weekStart, JSON.stringify({
        expanded: [...state.expandedDays],
        notes: Object.fromEntries(state.notesOpen),
        activitiesExpanded: [...state.activitiesExpanded], // Save expanded activities
      }));
    }

    // Restore UI state from localStorage; returns true if something was restored
    function loadUiState() {
      if (!state.weekStart) return false;
      try {
        const saved = JSON.parse(localStorage.getItem('ui_' + state.weekStart));
        if (saved) {
          state.expandedDays = new Set(saved.expanded || []);
          state.notesOpen = new Map(Object.entries(saved.notes || {}));
          state.activitiesExpanded = new Set(saved.activitiesExpanded || []); // Load expanded activities
          return true;
        }
      } catch (e) { }
      return false;
    }

    function autoExpandToday() {
      // Restore persisted UI state first; only auto-expand when visiting this week for the first time
      if (loadUiState()) return;
      state.expandedDays.clear();
      state.notesOpen = new Map();
      state.activitiesExpanded.clear(); // Clear expanded activities on first visit
      if (!state.weekData) return;
      const today = dateToStr(new Date());
      const idx = state.weekData.days.findIndex(d => d.date === today);
      if (idx >= 0) {
        state.expandedDays.add(idx);
      } else {
        state.expandedDays.add(0); // default expand first day
      }
    }

    function createActivity() {
      return { id: uid(), description: '', location: '', codes: [], ordinary: '', overtime: '', tasks: '', timePerTask: '', otPerTask: '', notes: '' };
    }

    function createNote() {
      const now = Date.now();
      return { id: uid(), description: '', location: '', date: dateToStr(new Date()), priority: 'medium', status: 'open', createdAt: now, updatedAt: now };
    }

    function calcSummary(weekData) {
      const map = {};
      if (!weekData) return [];
      weekData.days.forEach(day => {
        day.activities.forEach(act => {
          const ordinary = parseFloat(act.ordinary) || 0;
          const overtime = parseFloat(act.overtime) || 0;

          if (!act.codes || act.codes.length === 0) {
            // Handle activities with hours but no codes
            if (ordinary > 0 || overtime > 0) {
              const key = "__uncategorized__";
              if (!map[key]) map[key] = {
                code: "MISSING",
                description: "(No Work Code selected)",
                ordinary: 0,
                overtime: 0,
                isUncategorized: true,
                sorting: 999
              };
              map[key].ordinary += ordinary;
              map[key].overtime += overtime;
            }
            return;
          }

          const n = act.codes.length;
          const timePerTask = parseFloat(act.timePerTask) || (n > 0 ? ordinary / n : 0);
          const otPerTask = parseFloat(act.otPerTask) || (n > 0 ? overtime / n : 0);

          act.codes.forEach(code => {
            const key = code.c;
            if (!map[key]) map[key] = { code: code.c, description: code.d, ordinary: 0, overtime: 0, sorting: 0 };
            if (n === 1) {
              map[key].ordinary += ordinary;
              map[key].overtime += overtime;
            } else {
              map[key].ordinary += timePerTask;
              map[key].overtime += otPerTask;
            }
          });
        });
      });
      return Object.values(map).sort((a, b) => (a.sorting - b.sorting) || (b.ordinary - a.ordinary));
    }

    // ============================================================
    // LOAD / SAVE
    // ============================================================
    function deepCopy(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    async function loadWeek(weekStart) {
      // Flush any pending save for the current week before switching
      if (saveTimer && state.weekStart && state.weekData) {
        clearTimeout(saveTimer);
        saveTimer = null;
        const flushTs = state.weekData._updatedAt || Date.now();
        await dbPut('weeks', { weekStart: state.weekStart, userId: state.currentUser?.uid || null, data: state.weekData, updatedAt: flushTs });
        if (state.currentUser) await fsSetWeek(state.weekStart, state.weekData).catch(() => { });
      }

      // Unsubscribe from previous week listener
      if (weekUnsubscribe) { weekUnsubscribe(); weekUnsubscribe = null; }

      state.weekStart = weekStart;
      state.syncStatus = 'idle';

      // Load from local DB first (for instant display)
      // Only use cached data if it belongs to the current user — prevents
      // another account's cached data from overwriting this user's Firestore data
      const local = await dbGet('weeks', weekStart);
      const uid = state.currentUser?.uid || null;
      const localIsOwn = local && local.userId === uid;
      state.weekData = localIsOwn ? deepCopy(local.data) : createEmptyWeek(weekStart);
      enforceCorrectDates(weekStart, state.weekData);
      autoExpandToday();
      render();

      if (!state.currentUser) return;

      // Subscribe to Firestore real-time updates for this week
      const ref = userDoc(`weeks/${weekStart}`);
      weekUnsubscribe = ref.onSnapshot({ includeMetadataChanges: true }, snap => {
        // Ignore snapshots that are just echoing our own pending writes
        if (snap.metadata.hasPendingWrites) return;

        if (!snap.exists) {
          // No data on server yet. We DO NOT push local data here anymore.
          // This prevents a "push-back" bug where an empty local cache overwrites
          // fresh data from another device during initial load/offline-sync.
          // Data will be pushed naturally during the first edit or scheduleAutoSave.
          state.syncStatus = 'synced';
          updateHeaderStatus();
          return;
        }

        const remote = snap.data();
        if (!remote.days) return;

        // Convert Firestore Timestamp to JS number for comparison if needed
        const remoteTs = (remote._updatedAt && remote._updatedAt.toMillis)
          ? remote._updatedAt.toMillis()
          : (remote._updatedAt || 0);

        const localTs = state.weekData._updatedAt || 0;

        // Skip stale snapshots — if the remote data is older than our local
        // state, ignore it to prevent overwriting unsaved changes.
        if (remoteTs > 0 && localTs > 0 && remoteTs < localTs) return;

        enforceCorrectDates(weekStart, remote);
        state.weekData = deepCopy(remote);
        // Ensure the local updatedAt reflects the server time (as a number)
        state.weekData._updatedAt = remoteTs;

        dbPut('weeks', { weekStart, userId: state.currentUser?.uid || null, data: state.weekData, updatedAt: remoteTs || Date.now() });

        const active = document.activeElement;
        const userEditing = active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
        if (!userEditing) render();

        state.syncStatus = 'synced';
        updateHeaderStatus();
      }, () => {
        state.syncStatus = 'error';
        updateHeaderStatus();
      });

      state.syncStatus = 'synced';
      updateHeaderStatus();
    }

    function scheduleAutoSave() {
      clearTimeout(saveTimer);
      state.syncStatus = 'pending';
      state.weekData._updatedAt = Date.now();
      const capturedWeekStart = state.weekStart;
      updateHeaderStatus();
      // Capture weekData alongside weekStart so a week switch mid-debounce
      // never causes us to silently drop the edit or save the wrong data.
      const capturedWeekData = state.weekData;
      saveTimer = setTimeout(async () => {
        // If the week has changed, loadWeek() should have already flushed this
        // save — but if not (e.g. unexpected state), save to the captured week
        // rather than silently dropping the edit.
        const dataToSave = (state.weekStart === capturedWeekStart) ? state.weekData : capturedWeekData;
        const uid = state.currentUser?.uid || null;
        await dbPut('weeks', { weekStart: capturedWeekStart, userId: uid, data: dataToSave, updatedAt: dataToSave._updatedAt });
        if (state.currentUser) {
          try {
            await fsSetWeek(capturedWeekStart, dataToSave);
            if (state.weekStart === capturedWeekStart) { state.syncStatus = 'synced'; updateHeaderStatus(); }
          } catch (e) {
            if (state.weekStart === capturedWeekStart) { state.syncStatus = 'error'; updateHeaderStatus(); }
          }
        }
      }, 1000);
    }

    function buildEmailPlain(weekData) {
      if (!weekData) return 'No data for this week.';
      const range = formatWeekRange(weekData.weekStart);
      const summary = calcSummary(weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);
      let lines = ['WEEKLY TIMESHEET SUMMARY', 'Week: ' + range, ''];
      weekData.days.forEach(day => {
        const acts = day.activities.filter(a => a.description || a.codes.length || parseFloat(a.ordinary) > 0);
        if (!acts.length) return;
        lines.push(day.dayName.toUpperCase() + ' ' + formatDate(day.date));
        acts.forEach((act, i) => {
          lines.push('  ' + (i + 1) + '. ' + (act.description || '(no description)') + (act.location ? ' — ' + act.location : ''));
          if (act.codes.length) lines.push('     Codes: ' + act.codes.map(c => c.c).join(', '));
          lines.push('     Ordinary: ' + Math.round(parseFloat(act.ordinary) || 0) + 'h  |  OT: ' + Math.round(parseFloat(act.overtime) || 0) + 'h');
        });
        lines.push('');
      });
      lines.push('TOTALS', 'Ordinary: ' + Math.round(totalOrd) + ' hrs   Overtime: ' + Math.round(totalOT) + ' hrs');
      return lines.join('\n');
    }

    async function sendWeeklyEmail() {
      if (!state.weekData) { showToast('No week data to send.'); return; }
      if (!state.currentUser) { showToast('Please sign in to send email.'); return; }
      showConfirm(
        'Email weekly timesheet?',
        `Sends a formatted summary of this week — tasks, codes, hours and notes — to ${state.currentUser.email}.`,
        async () => {
          showToast('Sending email…', 6000);
          try {
            await db_fs.collection('mail').add({
              to: state.currentUser.email,
              message: {
                subject: 'Weekly Timesheet — ' + formatWeekRange(state.weekStart),
                html: buildEmailHtml(state.weekData)
              }
            });
            showToast('✓ Email sent to ' + state.currentUser.email);
          } catch (e) {
            showToast('Failed to send email: ' + e.message);
          }
        }
      );
    }

    function showToast(msg, duration = TOAST_DURATION_MS) {
      let el = document.getElementById('toast-msg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'toast-msg';
        el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;z-index:9999;pointer-events:none;transition:opacity 0.3s';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.opacity = '1';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.style.opacity = '0'; }, duration);
    }

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      // Update bottom nav active state
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const activeNav = document.getElementById('nav-' + (state.view === 'notes' ? 'history' : state.view));
      if (activeNav) activeNav.classList.add('active');

      // Capture scroll position before DOM wipe so we can restore it
      const savedScroll = parseInt(sessionStorage.getItem('scrollPos_' + state.view) || '0');

      let viewBody = '';
      if (state.view === 'exchanges') {
        viewBody = renderExchangesView();
      } else if (state.view === 'notes') {
        viewBody = renderNotesView();
      } else { // Default to 'week' view
        // In table mode break out of the narrow max-w-2xl container
        app.classList.toggle('tbl-mode', state.view === 'week' && state.layoutMode === 'table');
        viewBody = renderWeekView();
      }

      app.innerHTML = renderHeader() + viewBody;
      attachEvents();
      // Auto-grow textareas that have existing content
      app.querySelectorAll('textarea[data-field="notes"], textarea[data-field="description"], textarea[data-note-field="description"]').forEach(autoGrow);
      // Restore scroll position after DOM is painted
      if (savedScroll > 0) requestAnimationFrame(() => window.scrollTo(0, savedScroll));
      // Fix timeline lines so they end exactly at the last task node
      requestAnimationFrame(fixTimelineLines);
    }

    function fixTimelineLines() {
      document.querySelectorAll('.day-activities.active').forEach(container => {
        const cards = container.querySelectorAll('.activity-card');
        if (!cards.length) { container.style.setProperty('--tl-height', '0px'); return; }
        const lastCard = cards[cards.length - 1];
        // circle is at top:20px (nodeCenter relative to card top = 25px). 
        // We start line at top:-28px relative to container.
        // offsetTop is relative to container (which has 14px padding).
        // totalHeight = (offsetTop + nodeCenter) + absoluteTopOffset
        const totalHeight = lastCard.offsetTop + 25 + 28;
        container.style.setProperty('--tl-height', totalHeight + 'px');
      });
    }

    // Helper to keep timeline in sync during CSS transitions (max-height)
    function syncTimelineAnimation() {
      const start = performance.now();
      const duration = ANIM_EXPAND_MS + 50;
      function step(now) {
        fixTimelineLines();
        if (now - start < duration) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
