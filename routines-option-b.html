<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option B — Enhanced Full-Width Grid</title>
<style>
  :root {
    --bg-page: #F0F4F8;
    --bg-card: #fff;
    --bg-card-alt: #F4F7FA;
    --bg-input: #F4F7FA;
    --bg-header: #0f1624;
    --border: #E2E8F0;
    --border-subtle: #F1F5F9;
    --accent: #2D6BE4;
    --accent-rgb: 45, 107, 228;
    --accent-light: rgba(45, 107, 228, 0.08);
    --text-primary: #1E293B;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); }

  .top-nav { display:flex; justify-content:center; gap:40px; padding:12px 0; background:var(--bg-header); border-bottom:1px solid var(--border); }
  .top-nav button { background:none; border:none; color:#64748b; font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; padding:6px 12px; font-family:var(--font-body); }
  .top-nav button.active { color:#4d94ff; }

  .page { max-width:1400px; margin:0 auto; padding:0 24px 40px; }

  .top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 0; }
  .year-nav { display:flex; align-items:center; gap:12px; }
  .year-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px; padding:6px 10px; border-radius:8px; font-weight:700; }
  .year-btn:hover { background:var(--accent-light); }
  .year-label { font-size:20px; font-weight:800; }
  .actions { display:flex; gap:8px; }
  .edit-btn { background:var(--accent-light); color:var(--accent); border:none; border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-body); }

  .stats-row { display:flex; gap:10px; margin-bottom:16px; }
  .stat { flex:1; background:var(--bg-card); border-radius:12px; padding:14px 10px; text-align:center; border:1px solid var(--border); }
  .stat-val { font-size:22px; font-weight:800; }
  .stat-lbl { font-size:11px; color:var(--text-muted); font-weight:500; margin-top:2px; }

  /* Grid card */
  .grid-card { background:var(--bg-card); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
  .grid-scroll { overflow-x:auto; }

  table { width:100%; border-collapse:collapse; }

  /* Header */
  th { padding:14px 4px; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--border); text-align:center; background:var(--bg-card-alt); }
  th.th-site { text-align:left; padding-left:20px; width:200px; min-width:200px; position:sticky; left:0; background:var(--bg-card-alt); z-index:2; }
  th.th-bar { width:80px; text-align:center; }
  th.cur { color:var(--accent); font-weight:800; }

  /* Rows */
  tr:hover td { background:rgba(45,107,228,0.02); }
  tr:hover td.td-site { background:var(--bg-card); }

  td { text-align:center; padding:6px 4px; border-bottom:1px solid var(--border-subtle); height:64px; vertical-align:middle; }
  td.td-site { text-align:left; padding:8px 16px 8px 20px; font-size:14px; font-weight:600; background:var(--bg-card); position:sticky; left:0; z-index:1; white-space:nowrap; }
  td.td-site .pin { color:#ef4444; font-size:11px; margin-left:5px; }
  td.td-site .site-sub { font-size:11px; color:var(--text-muted); font-weight:400; margin-top:1px; }
  td.cur-col { background:rgba(45,107,228,0.04); }

  td.td-bar { padding:8px 10px; }
  .bar-wrap { display:flex; align-items:center; gap:6px; }
  .bar { flex:1; height:6px; border-radius:3px; background:var(--border); overflow:hidden; }
  .bar-fill { height:100%; border-radius:3px; transition:width 0.3s; }
  .bar-fill.green { background:#22c55e; }
  .bar-fill.amber { background:#f59e0b; }
  .bar-fill.red { background:#ef4444; }
  .bar-pct { font-size:11px; font-weight:700; width:30px; text-align:right; }

  /* Cells */
  .cell { width:52px; height:52px; border-radius:12px; border:none; cursor:pointer; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; background:rgba(45,107,228,0.03); transition:all 0.12s; font-family:var(--font-body); }
  .cell:hover { background:rgba(45,107,228,0.1); transform:scale(1.1); }
  .cell.v { background:rgba(34,197,94,0.12); }
  .cell.v:hover { background:rgba(34,197,94,0.22); }
  .cell .dot { width:7px; height:7px; border-radius:50%; background:var(--text-muted); opacity:0.18; }
  .cell .day { font-size:15px; font-weight:700; color:#15803d; line-height:1; }
  .cell .auto { font-size:7px; font-weight:800; color:#15803d; opacity:0.7; }

  /* Totals */
  tr.totals td { background:var(--bg-card-alt); border-top:2px solid var(--border); font-weight:700; font-size:13px; color:var(--text-secondary); height:48px; }
  tr.totals td.td-site { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); }
</style>
</head>
<body>
<div class="top-nav">
  <button>Timesheet</button><button>Notes</button><button>Journal</button>
  <button class="active">Routines</button><button>Finder</button>
</div>

<div class="page">
  <div class="top-bar">
    <div class="year-nav">
      <button class="year-btn">&lsaquo;</button>
      <span class="year-label">2026</span>
      <button class="year-btn">&rsaquo;</button>
    </div>
    <div class="actions">
      <button class="edit-btn">&#x21bb; Refresh</button>
      <button class="edit-btn">Edit Sites</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" style="color:var(--accent)">30</div><div class="stat-lbl">Sites</div></div>
    <div class="stat"><div class="stat-val" style="color:#15803d">37</div><div class="stat-lbl">Visits</div></div>
    <div class="stat"><div class="stat-val" style="color:#D97706">10%</div><div class="stat-lbl">Coverage</div></div>
    <div class="stat"><div class="stat-val" style="color:#8B5CF6">Apr</div><div class="stat-lbl">Current Month</div></div>
  </div>

  <div class="grid-card">
    <div class="grid-scroll">
      <table>
        <thead><tr>
          <th class="th-site">Site</th>
          <th>Jan</th><th>Feb</th><th>Mar</th><th class="cur">Apr</th>
          <th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
          <th class="th-bar">Coverage</th>
        </tr></thead>
        <tbody id="grid-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const sites=["Ballinagar","Ballinakill","Ballycumber","Ballydaly","Clara","Clonaslee","Clonygowan","Collins Lane","Daingean","Dunmurry Hill","Five Alley","Geashill","Gracefield","Horseleap","Kilbeggan","Kilcormac","Kildare","Killeigh","Killenard","Kinnity","Leabeg","Mount Bolus","Mountmellick","Mucklagh","Pollagh","Portarlington","Rahan","Rosenallis","Tullamore","Walsh Island"];
const auto={"Horseleap__1":12,"Mountmellick__1":14,"Walsh Island__1":18,"Dunmurry Hill__2":3,"Kilbeggan__2":5,"Kildare__2":9,"Ballinakill__2":11,"Tullamore__2":14,"Portarlington__2":20,"Clonaslee__2":24,"Daingean__3":2,"Portarlington__3":4,"Kilcormac__3":31,"Tullamore__3":8,"Five Alley__3":11,"Kinnity__3":11,"Ballinakill__3":12,"Rahan__3":18,"Geashill__3":30,"Killeigh__3":18,"Mount Bolus__3":18,"Mountmellick__3":19,"Mucklagh__3":20,"Ballinagar__3":30,"Gracefield__4":1,"Kilbeggan__4":1,"Ballydaly__4":2,"Clara__4":2,"Clonygowan__4":8,"Killenard__4":8,"Rosenallis__4":9,"Ballycumber__4":13,"Horseleap__4":13,"Kildare__4":16,"Pollagh__4":10,"Collins Lane__4":20};
const manual={"Clara__1":15};

const gb=document.getElementById('grid-body');
let totals=new Array(12).fill(0);

sites.forEach(s=>{
  let v=0;
  let cells=`<td class="td-site">${s} <span class="pin">📍</span></td>`;
  for(let m=1;m<=12;m++){
    const isCur=m===4;
    const mk=s+'__'+m;
    const d=manual[mk]||auto[mk];
    const isAuto=!manual[mk]&&!!auto[mk];
    if(d){v++;totals[m-1]++;}
    let inner=d?`<span class="day">${d}</span>${isAuto?'<span class="auto">AUTO</span>':''}`:`<span class="dot"></span>`;
    cells+=`<td${isCur?' class="cur-col"':''}><button class="cell${d?' v':''}">${inner}</button></td>`;
  }
  const pct=Math.round(v/12*100);
  const barColor=pct>=50?'green':pct>=25?'amber':'red';
  const pctColor=pct>=50?'#15803d':pct>=25?'#D97706':'#ef4444';
  cells+=`<td class="td-bar"><div class="bar-wrap"><div class="bar"><div class="bar-fill ${barColor}" style="width:${pct}%"></div></div><span class="bar-pct" style="color:${pctColor}">${pct}%</span></div></td>`;
  gb.innerHTML+=`<tr>${cells}</tr>`;
});

// Totals row
let tc=`<td class="td-site" style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);font-weight:800">Totals</td>`;
totals.forEach((t,i)=>{tc+=`<td class="${i===3?'cur-col':''}" style="font-weight:700;font-size:14px;color:${t>0?'#15803d':'var(--text-muted)'}">${t}</td>`;});
tc+=`<td></td>`;
gb.innerHTML+=`<tr class="totals">${tc}</tr>`;
</script>
</body>
</html>
