<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routines — Verify v5.8.40</title>
<style>
  :root {
    --bg-page: #F0F4F8;
    --bg-card: #fff;
    --bg-card-alt: #F4F7FA;
    --bg-header: #0f1624;
    --border: #E2E8F0;
    --border-subtle: #F1F5F9;
    --accent: #2D6BE4;
    --accent-rgb: 45, 107, 228;
    --accent-light: rgba(45, 107, 228, 0.08);
    --text-primary: #1E293B;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); }

  .top-nav { display:flex; justify-content:center; gap:40px; padding:12px 0; background:var(--bg-header); }
  .top-nav button { background:none; border:none; color:#64748b; font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; padding:6px 12px; font-family:var(--font-body); }
  .top-nav button.active { color:#4d94ff; }

  .page { max-width:1400px; margin:0 auto; padding:0 24px 40px; }
  .top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 0; }
  .year-nav { display:flex; align-items:center; gap:12px; }
  .year-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px; padding:6px 10px; border-radius:8px; font-weight:700; }
  .year-label { font-size:20px; font-weight:800; }
  .edit-btn { background:var(--accent-light); color:var(--accent); border:none; border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-body); }

  .dash { display:grid; grid-template-columns:1fr 340px; gap:16px; align-items:start; }

  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stat { background:var(--bg-card); border-radius:12px; padding:14px 10px; text-align:center; border:1px solid var(--border); }
  .stat-val { font-size:22px; font-weight:800; }
  .stat-lbl { font-size:11px; color:var(--text-muted); font-weight:500; margin-top:2px; }

  .card { background:var(--bg-card); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
  .card-hdr { padding:14px 18px; font-size:13px; font-weight:700; color:var(--text-primary); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:6px; background:var(--accent-light); color:var(--accent); }

  .grid-scroll { overflow:visible; }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }
  th { padding:10px 4px; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--border); text-align:center; position:sticky; top:0; background:var(--bg-card-alt); z-index:2; }
  th.th-site { text-align:left; padding-left:16px; width:120px; min-width:120px; max-width:120px; position:sticky; left:0; z-index:3; background:var(--bg-card-alt); }
  th.cur { color:var(--accent); }

  td { text-align:center; padding:3px 2px; border-bottom:1px solid var(--border-subtle); height:44px; vertical-align:middle; }
  td.td-site { text-align:left; padding-left:16px; font-size:13px; font-weight:600; background:var(--bg-card); position:sticky; left:0; z-index:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:120px; min-width:120px; max-width:120px; }
  td.cur-col { background:rgba(45,107,228,0.04); }
  tr:hover td { background:rgba(45,107,228,0.02); }
  tr:hover td.td-site { background:var(--bg-card); }

  .cell { width:42px; height:38px; border-radius:10px; border:none; cursor:pointer; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:0; background:rgba(45,107,228,0.03); transition:all 0.12s; font-family:var(--font-body); }
  .cell:hover { background:rgba(45,107,228,0.1); transform:scale(1.1); }
  .cell.v { background:rgba(34,197,94,0.12); }
  .cell.v:hover { background:rgba(34,197,94,0.22); }
  .cell .dot { width:6px; height:6px; border-radius:50%; background:var(--text-muted); opacity:0.25; }
  .cell .day { font-size:13px; font-weight:800; color:#15803d; line-height:1; }
  .cell .auto { font-size:7px; font-weight:800; color:#15803d; opacity:0.7; }

  .sidebar { display:flex; flex-direction:column; gap:16px; }

  /* Alert items */
  .alert-item { display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid var(--border-subtle); }
  .alert-item:last-child { border-bottom:none; }
  .alert-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:#ef4444; }
  .alert-dot.amber { background:#f59e0b; }
  .alert-name { font-size:13px; font-weight:600; flex:1; }
  .alert-detail { font-size:11px; color:var(--text-muted); }

  /* Due visits scroll */
  .due-scroll { max-height:280px; overflow-y:auto; }

  /* Recent visits - fixed height with scroll */
  .recent-card { display:flex; flex-direction:column; grid-column: 1 / -1; }
  .recent-scroll { max-height:280px; overflow-y:auto; }
  .recent-item { display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid var(--border-subtle); }
  .recent-item:last-child { border-bottom:none; }
  .recent-badge { width:32px; height:32px; border-radius:8px; background:rgba(34,197,94,0.12); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#15803d; flex-shrink:0; }
  .recent-info { flex:1; }
  .recent-name { font-size:13px; font-weight:600; }
  .recent-date { font-size:11px; color:var(--text-muted); }

  /* Month bar — ALL green */
  .month-bar { display:flex; gap:2px; padding:12px 16px; }
  .month-col { flex:1; text-align:center; }
  .month-col-bar { height:60px; display:flex; align-items:flex-end; justify-content:center; }
  .month-col-fill { width:20px; border-radius:4px 4px 0 0; background:rgba(34,197,94,0.3); min-height:2px; }
  .month-col-fill.cur { background:rgba(34,197,94,0.5); }
  .month-col-label { font-size:9px; color:var(--text-muted); font-weight:600; margin-top:4px; }
  .month-col-val { font-size:10px; font-weight:700; color:var(--text-secondary); margin-top:1px; }
</style>
</head>
<body>
<div class="top-nav">
  <button>Timesheet</button><button>Notes</button><button>Journal</button>
  <button class="active">Routines</button><button>Finder</button>
</div>

<div class="page">
  <div class="top-bar">
    <div class="year-nav">
      <button class="year-btn">&lsaquo;</button>
      <span class="year-label">2026</span>
      <button class="year-btn">&rsaquo;</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="edit-btn">&#x21bb; Refresh</button>
      <button class="edit-btn">Edit Sites</button>
    </div>
  </div>

  <div class="dash">
    <div class="card">
      <div class="card-hdr">Routine Visits <span class="badge">30 sites &times; 12 months</span></div>
      <div class="grid-scroll">
        <table>
          <thead><tr>
            <th class="th-site">Site</th>
            <th>Jan</th><th>Feb</th><th>Mar</th><th class="cur">Apr</th>
            <th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
          </tr></thead>
          <tbody id="grid-body"></tbody>
        </table>
      </div>
    </div>

    <div class="sidebar">
      <div class="stats-grid">
        <div class="stat"><div class="stat-val" style="color:#2D6BE4">30</div><div class="stat-lbl">Sites</div></div>
        <div class="stat"><div class="stat-val" style="color:#15803d">37</div><div class="stat-lbl">Visits</div></div>
        <div class="stat"><div class="stat-val" style="color:#D97706">10%</div><div class="stat-lbl">Coverage</div></div>
        <div class="stat"><div class="stat-val" style="color:#8B5CF6">Apr</div><div class="stat-lbl">Current Month</div></div>
      </div>
      <div class="card"><div class="card-hdr">Visits per Month</div><div class="month-bar" id="month-bar"></div></div>
      <div class="card"><div class="card-hdr">Never Visited <span class="badge" style="background:rgba(239,68,68,0.1);color:#ef4444" id="never-count">0</span></div><div id="never-list"></div></div>
      <div class="card"><div class="card-hdr">Due Visits <span class="badge" style="background:rgba(245,158,11,0.1);color:#f59e0b" id="due-count">0</span></div><div class="due-scroll" id="due-list"></div></div>
    </div>
    <div class="card recent-card"><div class="card-hdr">Recent Visits <span class="badge" style="background:rgba(34,197,94,0.1);color:#15803d">Latest</span></div><div class="recent-scroll" id="recent-list"></div></div>
  </div>
</div>

<script>
const sites=["Ballinagar","Ballinakill","Ballycumber","Ballydaly","Clara","Clonaslee","Clonygowan","Collins Lane","Daingean","Dunmurry Hill","Five Alley","Geashill","Gracefield","Horseleap","Kilbeggan","Kilcormac","Kildare","Killeigh","Killenard","Kinnity","Leabeg","Mount Bolus","Mountmellick","Mucklagh","Pollagh","Portarlington","Rahan","Rosenallis","Tullamore","Walsh Island"];
const auto={"Horseleap__1":12,"Mountmellick__1":14,"Walsh Island__1":18,"Dunmurry Hill__2":3,"Kilbeggan__2":5,"Kildare__2":9,"Ballinakill__2":11,"Tullamore__2":14,"Portarlington__2":20,"Clonaslee__2":24,"Daingean__3":2,"Portarlington__3":4,"Kilcormac__3":31,"Tullamore__3":8,"Five Alley__3":11,"Kinnity__3":11,"Ballinakill__3":12,"Rahan__3":18,"Geashill__3":30,"Killeigh__3":18,"Mount Bolus__3":18,"Mountmellick__3":19,"Mucklagh__3":20,"Ballinagar__3":30,"Gracefield__4":1,"Kilbeggan__4":1,"Ballydaly__4":2,"Clara__4":2,"Clonygowan__4":8,"Killenard__4":8,"Rosenallis__4":9,"Ballycumber__4":13,"Horseleap__4":13,"Kildare__4":16,"Pollagh__4":10,"Collins Lane__4":20};
const manual={"Clara__1":15};
const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const curMonth = 4;

const gb=document.getElementById('grid-body');
let totals=new Array(12).fill(0);
let neverVisited=[];
let recentVisits=[];
let dueVisits=[];

sites.forEach(s=>{
  let v=0, lastMonth=0, lastDay=0;
  let cells='<td class="td-site" title="'+s+'">'+s+'</td>';
  for(let m=1;m<=12;m++){
    const isCur=m===4, mk=s+'__'+m;
    const d=manual[mk]||auto[mk];
    const isAuto=!manual[mk]&&!!auto[mk];
    if(d){v++;totals[m-1]++;if(m>lastMonth||(m===lastMonth&&d>lastDay)){lastMonth=m;lastDay=d;}}
    let inner=d?'<span class="day">'+d+'</span>'+(isAuto?'<span class="auto">AUTO</span>':''):'<span class="dot"></span>';
    cells+='<td'+(isCur?' class="cur-col"':'')+'><button class="cell'+(d?' v':'')+'">' +inner+'</button></td>';
  }
  gb.innerHTML+='<tr>'+cells+'</tr>';
  if(v===0) neverVisited.push(s);
  if(lastMonth>0) recentVisits.push({site:s, month:lastMonth, day:lastDay});
  // Due: last visit 3+ months before current month
  const monthsSince = lastMonth===0 ? curMonth : (curMonth - lastMonth);
  if(monthsSince >= 3) dueVisits.push({site:s, lastMonth, monthsSince});
});

// Month bar
const mb=document.getElementById('month-bar');
const maxT=Math.max(...totals,1);
monthNames.forEach((mn,i)=>{
  const h=Math.round(totals[i]/maxT*60);
  mb.innerHTML+='<div class="month-col"><div class="month-col-bar"><div class="month-col-fill'+(i===3?' cur':'')+'" style="height:'+h+'px"></div></div><div class="month-col-label">'+mn+'</div><div class="month-col-val">'+totals[i]+'</div></div>';
});

// Never visited
const nl=document.getElementById('never-list');
document.getElementById('never-count').textContent=neverVisited.length;
if(neverVisited.length===0) nl.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">All sites visited!</div>';
else neverVisited.forEach(s=>{nl.innerHTML+='<div class="alert-item"><span class="alert-dot"></span><span class="alert-name">'+s+'</span><span class="alert-detail">0 visits</span></div>';});

// Due visits
dueVisits.sort((a,b)=>b.monthsSince-a.monthsSince);
const dl=document.getElementById('due-list');
document.getElementById('due-count').textContent=dueVisits.length;
if(dueVisits.length===0) dl.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">All sites up to date!</div>';
else dueVisits.forEach(d=>{
  const detail=d.lastMonth===0?'Never visited':d.monthsSince+' months ago';
  dl.innerHTML+='<div class="alert-item"><span class="alert-dot amber"></span><span class="alert-name">'+d.site+'</span><span class="alert-detail">'+detail+'</span></div>';
});

// Recent visits
recentVisits.sort((a,b)=>b.month-a.month||b.day-a.day);
const rl=document.getElementById('recent-list');
recentVisits.slice(0,20).forEach(v=>{
  rl.innerHTML+='<div class="recent-item"><div class="recent-badge">'+v.day+'</div><div class="recent-info"><div class="recent-name">'+v.site+'</div><div class="recent-date">'+monthNames[v.month-1]+' 2026</div></div></div>';
});
</script>
</body>
</html>
