  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TimeSheet">

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overscroll-behavior: none; }
    input, select, textarea { font-size: 16px !important; }
    .code-chip { display: inline-flex; align-items: center; gap: 4px; background: #dbeafe; color: #1e40af; border-radius: 9999px; padding: 3px 10px; font-size: 12px; margin: 2px; }

    .spin { animation: spin 1s linear infinite; }
    .activity-row { border-left: 3px solid #e5e7eb; padding-left: 8px; }
    .summary-row:nth-child(even) { background: #f9fafb; }

  </style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="app" class="max-w-2xl mx-auto"></div>

<!-- ===== CODE SEARCH MODAL ===== -->
<div id="code-modal" class="hidden fixed inset-0 z-50 bg-white flex flex-col">
  <div class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 safe-top">
    <button onclick="closeCodeModal()" class="text-white p-1 text-xl leading-none">✕</button>
    <h2 class="text-base font-semibold flex-1">Select Code(s)</h2>
    <button onclick="confirmCodeSelection()" class="bg-amber-500 text-white px-4 py-1.5 rounded-full text-sm font-bold">Done</button>
  </div>
  <div class="p-3 border-b bg-white sticky top-0 z-10">
    <input id="code-search" type="text" placeholder="Search description or code..."
      class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base bg-gray-50"
      oninput="filterCodes(this.value)">
    <p class="text-xs text-gray-500 mt-1.5 px-1">Tap to select. Multiple allowed for routines.</p>
  </div>
  <div id="code-list" class="flex-1 overflow-y-auto pb-6"></div>
</div>

<!-- ===== DATE PICKER MODAL ===== -->
<div id="date-modal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-60 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
    <h2 class="text-lg font-bold mb-1 text-gray-900">Set Week Start</h2>
    <p class="text-sm text-gray-500 mb-4">Pick the Friday that starts your week</p>
    <input id="week-date-input" type="date" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-base mb-4 focus:border-blue-500 outline-none">
    <div id="date-warning" class="hidden text-amber-600 text-sm mb-3 bg-amber-50 px-3 py-2 rounded-lg">⚠️ That's not a Friday. The week will start from the Friday before that date.</div>
    <div class="flex gap-3">
      <button onclick="closeDateModal()" class="flex-1 py-3 border-2 border-gray-200 rounded-xl text-gray-600 font-medium">Cancel</button>
      <button onclick="confirmDateSelection()" class="flex-1 py-3 bg-blue-900 text-white rounded-xl font-bold">Set Week</button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM MODAL ===== -->
<div id="confirm-modal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-60 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
    <h2 id="confirm-title" class="text-lg font-bold mb-2 text-gray-900"></h2>
    <p id="confirm-msg" class="text-gray-600 mb-6 text-sm"></p>
    <div class="flex gap-3">
      <button onclick="closeConfirm()" class="flex-1 py-3 border-2 border-gray-200 rounded-xl text-gray-600 font-medium">Cancel</button>
      <button id="confirm-ok" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Confirm</button>
    </div>
  </div>
</div>

// ============================================================
// INDEXEDDB
// ============================================================
function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('weeks')) d.createObjectStore('weeks', { keyPath: 'weekStart' });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = rej;
  });
}

function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}

function dbPut(store, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = res;
    req.onerror = rej;
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}

// ============================================================
// API
// ============================================================
async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    redirect: 'follow',
    body: JSON.stringify(body),
  });
  return res.json();
}

// ============================================================
// DATE UTILS
// ============================================================
function dateToStr(d) {
  return d.toISOString().split('T')[0];
}

function strToDate(s) {
  return new Date(s + 'T00:00:00');
}

function getCurrentFriday() {
  const today = new Date();
  const day = today.getDay(); // 0=Sun..6=Sat
  const back = [2, 3, 4, 5, 6, 0, 1][day];
  const d = new Date(today);
  d.setDate(d.getDate() - back);
  return d;
}

function getNearestFriday(dateStr) {
  const d = strToDate(dateStr);
  const day = d.getDay();
  if (day === 5) return dateStr;
  const back = [2, 3, 4, 5, 6, 0, 1][day];
  const fri = new Date(d);
  fri.setDate(d.getDate() - back);
  return dateToStr(fri);
}

function formatDate(dateStr) {
  const d = strToDate(dateStr);
  return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' });
}

function formatWeekRange(weekStart) {
  const start = strToDate(weekStart);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return `${formatDate(weekStart)} – ${formatDate(dateToStr(end))}`;
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ============================================================
// WEEK DATA
// ============================================================
function createEmptyWeek(weekStart) {
  const days = DAY_NAMES.map((name, i) => {
    const d = new Date(weekStart + 'T00:00:00');
    d.setDate(d.getDate() + i);
    return { date: dateToStr(d), dayName: name, activities: [createActivity()] };
  });
  return { weekStart, days };
}

function createActivity() {
  return { id: uid(), ticket: '', description: '', location: '', codes: [], ordinary: '', overtime: '', tasks: '', timePerTask: '', otPerTask: '' };
}

function calcSummary(weekData) {
  const map = {};
  if (!weekData) return [];
  weekData.days.forEach(day => {
    day.activities.forEach(act => {
      if (!act.codes.length) return;
      const ordinary = parseFloat(act.ordinary) || 0;
      const overtime = parseFloat(act.overtime) || 0;
      const n = act.codes.length || 1;
      const timePerTask = parseFloat(act.timePerTask) || (n > 0 ? ordinary / n : 0);
      const otPerTask = parseFloat(act.otPerTask) || (n > 1 ? overtime / n : overtime);
      act.codes.forEach(code => {
        const key = code.c;
        if (!map[key]) map[key] = { code: code.c, description: code.d, ordinary: 0, overtime: 0 };
        if (n === 1) {
          map[key].ordinary += ordinary;
          map[key].overtime += overtime;
        } else {
          map[key].ordinary += timePerTask;
          map[key].overtime += otPerTask;
        }
      });
    });
  });
  return Object.values(map).sort((a, b) => b.ordinary - a.ordinary);
}

  state.weekStart = weekStart;
  state.syncStatus = 'idle';

  // Load from local DB
  const local = await dbGet('weeks', weekStart);
  state.weekData = local ? local.data : createEmptyWeek(weekStart);

  render();

  // Try to sync from API (non-blocking)
  if (navigator.onLine) {
    try {
      const remote = await apiGet('getWeek', { date: weekStart });
      if (remote && remote.days) {
        const localTime = local ? (local.updatedAt || 0) : 0;
        const remoteTime = remote._updatedAt || 0;
        if (!local || remoteTime > localTime) {
          state.weekData = remote;
          await dbPut('weeks', { weekStart, data: remote, updatedAt: remoteTime });
          render();
        }
      }
      state.syncStatus = 'synced';
    } catch (e) {
      state.syncStatus = 'error';
    }
  }
  updateHeaderStatus();
}

function scheduleAutoSave() {
  clearTimeout(saveTimer);
  clearTimeout(syncTimer);
  state.syncStatus = 'pending';
  updateHeaderStatus();
  saveTimer = setTimeout(async () => {
    await dbPut('weeks', { weekStart: state.weekStart, data: state.weekData, updatedAt: Date.now() });
    if (navigator.onLine) {
      syncTimer = setTimeout(syncNow, 3000);
    }
  }, 500);
}

async function syncNow() {
  if (!navigator.onLine) { state.syncStatus = 'pending'; updateHeaderStatus(); return; }
  state.syncStatus = 'syncing';
  updateHeaderStatus();
  try {
    const payload = { ...state.weekData, _updatedAt: Date.now() };
    await apiPost({ action: 'saveWeek', weekStart: state.weekStart, weekData: payload });
    state.syncStatus = 'synced';
  } catch (e) {
    state.syncStatus = 'error';
  }
  updateHeaderStatus();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + (state.view === 'week' ? renderWeekView() : renderHistoryView());
  attachEvents();
}

function renderHeader() {
  const syncIcons = {
    idle: '',
    pending: '<span class="text-amber-300 text-xs">●</span>',
    syncing: '<span class="spin inline-block text-blue-300 text-xs">↻</span>',
    synced: '<span class="text-green-300 text-xs">✓</span>',
    error: '<span class="text-red-300 text-xs">✗</span>',
  };
  const syncTitles = { idle: '', pending: 'Unsaved changes', syncing: 'Syncing…', synced: 'Synced', error: 'Sync failed – tap to retry' };
  return `
  <header class="bg-blue-900 text-white sticky top-0 z-10 shadow-lg">
    <div class="flex items-center px-4 py-3 gap-2">
      <button onclick="prevWeek()" class="text-blue-200 text-xl px-1 py-1 min-w-[36px]">‹</button>
      <div class="flex-1 text-center">
        <div class="font-bold text-base leading-tight">${state.weekStart ? formatWeekRange(state.weekStart) : '—'}</div>
        <div class="text-blue-300 text-xs mt-0.5 flex items-center justify-center gap-2">
          ${syncIcons[state.syncStatus] || ''}
          <span title="${syncTitles[state.syncStatus]}">${syncTitles[state.syncStatus]}</span>
          <span class="text-blue-600 text-xs">v${VERSION}</span>
        </div>
      </div>
      <button onclick="nextWeek()" class="text-blue-200 text-xl px-1 py-1 min-w-[36px]">›</button>
      <button onclick="openDateModal()" class="text-blue-200 text-sm px-2 py-1 border border-blue-700 rounded-lg ml-1">📅</button>
    </div>
    <div class="flex border-t border-blue-800">
      <button onclick="setView('week')" class="flex-1 py-2 text-sm font-medium ${state.view==='week'?'text-white border-b-2 border-amber-400':'text-blue-300'}">Week</button>
      <button onclick="syncNow()" class="flex-1 py-2 text-sm font-medium text-blue-300" title="Sync now">☁ Sync</button>
      <button onclick="setView('history')" class="flex-1 py-2 text-sm font-medium ${state.view==='history'?'text-white border-b-2 border-amber-400':'text-blue-300'}">History</button>
    </div>
  </header>`;
}

function updateHeaderStatus() {
  const el = document.querySelector('header');
  if (el) el.outerHTML = renderHeader();
}

function renderWeekView() {
  if (!state.weekData) return '<div class="p-8 text-center text-gray-400">Loading…</div>';
  const summary = calcSummary(state.weekData);
  const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
  const totalOT = summary.reduce((s, r) => s + r.overtime, 0);

  const daysHtml = state.weekData.days.map((day, di) => renderDaySection(day, di)).join('');

  const summaryHtml = `
  <div class="mx-3 mb-4 bg-white rounded-2xl shadow-sm overflow-hidden">
    <button onclick="toggleSummary()" class="w-full flex items-center justify-between px-4 py-3 bg-blue-900 text-white">
      <span class="font-bold text-sm">Weekly Summary</span>
      <span class="text-blue-200 text-sm">
        <span class="font-mono">${totalOrd.toFixed(2)}</span> hrs &nbsp;
        <span class="font-mono text-amber-300">${totalOT.toFixed(2)}</span> OT
        <span class="ml-2">${state.showSummary ? '▲' : '▼'}</span>
      </span>
    </button>
    ${state.showSummary ? `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-gray-500 text-xs uppercase">
            <th class="px-3 py-2 text-left">Code</th>
            <th class="px-3 py-2 text-left">Description</th>
            <th class="px-3 py-2 text-right">Ord</th>
            <th class="px-3 py-2 text-right">OT</th>
          </tr>
        </thead>
        <tbody>
          ${summary.map((row, i) => `
          <tr class="${i%2===0?'bg-white':'bg-gray-50'} summary-row">
            <td class="px-3 py-2 font-mono text-xs text-blue-700 whitespace-nowrap">${row.code}</td>
            <td class="px-3 py-2 text-gray-700 text-xs">${row.description}</td>
            <td class="px-3 py-2 text-right font-semibold text-gray-900">${row.ordinary.toFixed(2)}</td>
            <td class="px-3 py-2 text-right font-semibold text-amber-600">${row.overtime > 0 ? row.overtime.toFixed(2) : '—'}</td>
          </tr>`).join('')}
          <tr class="bg-blue-50 font-bold text-sm">
            <td colspan="2" class="px-3 py-2 text-blue-900">TOTAL</td>
            <td class="px-3 py-2 text-right text-blue-900">${totalOrd.toFixed(2)}</td>
            <td class="px-3 py-2 text-right text-amber-600">${totalOT.toFixed(2)}</td>
          </tr>
        </tbody>
      </table>
    </div>` : ''}
  </div>`;

  return `<main class="pb-6 pt-2">${daysHtml}${summaryHtml}</main>`;
}

function calcDayTotals(day) {
  let ord = 0, ot = 0;
  day.activities.forEach(act => {
    ord += parseFloat(act.ordinary) || 0;
    ot += parseFloat(act.overtime) || 0;
  });
  return { ord, ot };
}

function renderDaySection(day, di) {
  const isWeekend = di === 1 || di === 2;
  const activitiesHtml = day.activities.map(act => renderActivity(act, di)).join('');
  const { ord, ot } = calcDayTotals(day);
  const hasHours = ord > 0 || ot > 0;
  return `
  <div class="mx-3 mb-3 bg-white rounded-2xl shadow-sm overflow-hidden day-card ${isWeekend ? 'day-weekend' : ''}">
    <div class="flex items-center justify-between px-4 py-2.5 ${isWeekend ? 'bg-gray-50' : 'bg-blue-50'}">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-bold text-sm ${isWeekend ? 'text-gray-500' : 'text-blue-900'}">${day.dayName}</span>
        <span class="text-xs text-gray-400">${formatDate(day.date)}</span>
        ${hasHours ? `<span class="text-xs font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded-full">${ord.toFixed(1)}h${ot > 0 ? ` <span class="text-amber-500">+${ot.toFixed(1)} OT</span>` : ''}</span>` : ''}
      </div>
      <button onclick="addActivity(${di})" class="text-blue-600 text-sm font-semibold flex items-center gap-1 py-1 px-2 rounded-lg bg-blue-100 active:bg-blue-200 flex-shrink-0">
        <span class="text-base leading-none">+</span> Add
      </button>
    </div>
    <div class="divide-y divide-gray-100" id="day-${di}-activities">
      ${activitiesHtml}
    </div>
  </div>`;
}

function renderActivity(act, di) {
  const numTasks = act.codes.length || 1;
  const ordinary = parseFloat(act.ordinary) || 0;
  const overtime = parseFloat(act.overtime) || 0;
  const hrsPerTask = ordinary > 0 ? (ordinary / numTasks).toFixed(2) : '—';
  const otPerTask  = overtime > 0 ? (overtime / numTasks).toFixed(2) : '—';
  const codesSection = act.codes.length
    ? `<div class="flex flex-wrap gap-1 mb-2 px-1">
        ${act.codes.map(c => `
          <span class="code-chip">
            ${c.d} <span class="font-mono">${c.c}</span>
            <button onclick="removeCode('${act.id}',${di},'${c.c}')" class="text-blue-400 hover:text-red-500 ml-1 text-xs leading-none">✕</button>
          </span>`).join('')}
       </div>`
    : '';

  return `
  <div class="p-3" data-act-id="${act.id}" data-day="${di}">
    <div class="flex gap-2 mb-2">
      <input type="text" placeholder="Description of work" value="${esc(act.description)}"
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:border-blue-400 outline-none"
        data-field="description" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      <button onclick="removeActivity('${act.id}', ${di})" class="text-gray-300 hover:text-red-500 px-2 text-lg leading-none flex-shrink-0">🗑</button>
    </div>
    <div class="flex gap-2 mb-2">
      <input type="text" placeholder="Location" value="${esc(act.location)}"
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:border-blue-400 outline-none"
        data-field="location" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      <input type="text" placeholder="Ticket #" value="${esc(act.ticket)}"
        class="w-28 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:border-blue-400 outline-none"
        data-field="ticket" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
    </div>
    ${codesSection}
    <button onclick="openCodeModal(${di},'${act.id}')"
      class="w-full text-left border border-dashed border-blue-300 rounded-xl px-3 py-2 mb-2 bg-blue-50 text-sm text-blue-600 font-medium">
      ${act.codes.length ? '✎ Edit codes' : '+ Tap to add code'}
    </button>
    <div class="grid grid-cols-2 gap-2 mb-1">
      <div class="bg-gray-50 rounded-xl p-2">
        <label class="text-xs text-gray-400 block mb-1">Ordinary Hrs</label>
        <input type="number" step="0.5" min="0" placeholder="0" value="${act.ordinary}"
          class="w-full text-center font-bold text-lg text-blue-900 bg-transparent outline-none border-b border-gray-200 focus:border-blue-400"
          data-field="ordinary" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      </div>
      <div class="bg-amber-50 rounded-xl p-2">
        <label class="text-xs text-amber-400 block mb-1">Overtime Hrs</label>
        <input type="number" step="0.5" min="0" placeholder="0" value="${act.overtime}"
          class="w-full text-center font-bold text-lg text-amber-600 bg-transparent outline-none border-b border-amber-200 focus:border-amber-400"
          data-field="overtime" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      </div>
    </div>
    <div class="grid grid-cols-3 gap-2">
      <div class="bg-gray-50 rounded-xl p-2">
        <label class="text-xs text-gray-400 block mb-1">Tasks</label>
        <div class="w-full text-center font-bold text-lg text-blue-900 border-b border-gray-200 py-0.5">${numTasks}</div>
      </div>
      <div class="bg-gray-50 rounded-xl p-2">
        <label class="text-xs text-gray-400 block mb-1">Hrs/Task</label>
        <div data-calc="hrsPerTask" data-act="${act.id}" class="w-full text-center font-semibold text-gray-700 border-b border-gray-200 py-0.5">${hrsPerTask}</div>
      </div>
      <div class="bg-amber-50 rounded-xl p-2">
        <label class="text-xs text-amber-300 block mb-1">OT/Task</label>
        <div data-calc="otPerTask" data-act="${act.id}" class="w-full text-center font-semibold text-amber-600 border-b border-amber-200 py-0.5">${otPerTask}</div>
      </div>
    </div>
  </div>`;
}

function renderHistoryView() {
  if (!state.historyWeeks.length) {
    return `<main class="p-6 text-center text-gray-400"><p class="text-4xl mb-3">📋</p><p>No past weeks yet</p></main>`;
  }
  const rows = state.historyWeeks.map(w => `
    <button onclick="loadWeek('${w.weekStart}');setView('week')"
      class="flex items-center justify-between px-4 py-3 hover:bg-blue-50 active:bg-blue-100 border-b border-gray-100 w-full text-left">
      <div>
        <div class="font-semibold text-gray-900 text-sm">${formatWeekRange(w.weekStart)}</div>
        <div class="text-xs text-gray-400 mt-0.5">Last updated: ${w.lastUpdated ? new Date(w.lastUpdated).toLocaleDateString('en-IE') : 'unknown'}</div>
      </div>
      <span class="text-blue-400 text-lg">›</span>
    </button>`).join('');
  return `<main class="pb-6"><div class="mx-3 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">${rows}</div></main>`;
}

function esc(s) {
  return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// ============================================================
// ACTIONS
// ============================================================
function updateField(el) {
  const { field, act: actId, day: di } = el.dataset;
  const day = state.weekData.days[parseInt(di)];
  const act = day.activities.find(a => a.id === actId);
  if (!act) return;
  act[field] = el.value;

  // Live-update calculated displays when hours change
  if (field === 'ordinary' || field === 'overtime') {
    const numTasks = act.codes.length || 1;
    const ord = parseFloat(act.ordinary) || 0;
    const ot  = parseFloat(act.overtime) || 0;
    const hrsEl = document.querySelector(`[data-calc="hrsPerTask"][data-act="${actId}"]`);
    const otEl  = document.querySelector(`[data-calc="otPerTask"][data-act="${actId}"]`);
    if (hrsEl) hrsEl.textContent = ord > 0 ? (ord / numTasks).toFixed(2) : '—';
    if (otEl)  otEl.textContent  = ot  > 0 ? (ot  / numTasks).toFixed(2) : '—';
    updateSummaryDisplay();
  }
  scheduleAutoSave();
}

function addActivity(di) {
  state.weekData.days[di].activities.push(createActivity());
  render();
}

function removeActivity(actId, di) {
  const day = state.weekData.days[di];
  if (day.activities.length <= 1) {
    day.activities = [createActivity()];
  } else {
    day.activities = day.activities.filter(a => a.id !== actId);
  }
  scheduleAutoSave();
  render();
}

function removeCode(actId, di, code) {
  const act = state.weekData.days[di].activities.find(a => a.id === actId);
  if (!act) return;
  act.codes = act.codes.filter(c => c.c !== code);
  scheduleAutoSave();
  render();
}

function updateSummaryDisplay() {
  // lightweight re-render of just the summary section
  const summary = calcSummary(state.weekData);
  const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
  const totalOT = summary.reduce((s, r) => s + r.overtime, 0);
  const btn = document.querySelector('button[onclick="toggleSummary()"] span.font-mono');
  if (btn) {
    btn.textContent = totalOrd.toFixed(2);
    const otEl = btn.parentElement.querySelector('.text-amber-300');
    if (otEl) otEl.textContent = totalOT.toFixed(2);
  }
}

function toggleSummary() {
  state.showSummary = !state.showSummary;
  render();
}

function prevWeek() {
  if (!state.weekStart) return;
  const d = strToDate(state.weekStart);
  d.setDate(d.getDate() - 7);
  loadWeek(dateToStr(d));
}

function nextWeek() {
  if (!state.weekStart) return;
  const d = strToDate(state.weekStart);
  d.setDate(d.getDate() + 7);
  loadWeek(dateToStr(d));
}

function setView(v) {
  state.view = v;
  if (v === 'history') loadHistory();
  else render();
}

async function loadHistory() {
  state.historyWeeks = [];
  render();
  // Load from local DB
  const all = await dbGetAll('weeks');
  state.historyWeeks = all.sort((a, b) => b.weekStart.localeCompare(a.weekStart));
  // Also try API
  if (navigator.onLine) {
    try {
      const remote = await apiGet('getWeeks');
      if (Array.isArray(remote)) {
        const local = new Set(state.historyWeeks.map(w => w.weekStart));
        remote.forEach(r => { if (!local.has(r.weekStart)) state.historyWeeks.push(r); });
        state.historyWeeks.sort((a, b) => b.weekStart.localeCompare(a.weekStart));
      }
    } catch (e) {}
  }
  render();
}

// ============================================================
// CODE MODAL
// ============================================================
let filteredCodes = [...WORK_CODES];

function openCodeModal(di, actId) {
  const act = state.weekData.days[di].activities.find(a => a.id === actId);
  codeModalCtx = { dayIndex: di, activityId: actId, selected: act ? [...act.codes] : [] };
  filteredCodes = [...WORK_CODES];
  document.getElementById('code-modal').classList.remove('hidden');
  document.getElementById('code-search').value = '';
  renderCodeList();
  setTimeout(() => document.getElementById('code-search').focus(), 100);
}

function closeCodeModal() {
  document.getElementById('code-modal').classList.add('hidden');
}

function confirmCodeSelection() {
  const { dayIndex: di, activityId: actId, selected } = codeModalCtx;
  const act = state.weekData.days[di].activities.find(a => a.id === actId);
  if (act) {
    act.codes = selected;
    // Auto-set tasks count
    if (selected.length > 1 && !act.tasks) act.tasks = String(selected.length);
    scheduleAutoSave();
    render();
  }
  closeCodeModal();
}

function filterCodes(q) {
  const ql = q.toLowerCase();
  filteredCodes = q ? WORK_CODES.filter(c => c.d.toLowerCase().includes(ql) || c.c.toLowerCase().includes(ql) || c.a.toLowerCase().includes(ql)) : [...WORK_CODES];
  renderCodeList();
}

function renderCodeList() {
  const el = document.getElementById('code-list');
  const selected = new Set(codeModalCtx.selected.map(c => c.c));

  // Group by activity
  const groups = {};
  filteredCodes.forEach(c => { (groups[c.a] = groups[c.a] || []).push(c); });

  el.innerHTML = Object.entries(groups).map(([grp, codes]) => `
    <div>
      <div class="px-4 py-2 bg-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wide sticky top-0">${grp}</div>
      ${codes.map(c => {
        const isSelected = selected.has(c.c);
        return `<button onclick="toggleCode('${c.c}','${esc(c.d)}','${esc(c.a)}')"
          class="w-full flex items-center gap-3 px-4 py-3 border-b border-gray-50 text-left active:bg-gray-100 ${isSelected ? 'bg-blue-50' : 'bg-white'}">
          <span class="flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center ${isSelected ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-300'}">
            ${isSelected ? '✓' : ''}
          </span>
          <span class="flex-1 min-w-0">
            <span class="block text-sm text-gray-900">${c.d}</span>
            <span class="text-xs font-mono text-blue-500">${c.c}</span>
          </span>
        </button>`;
      }).join('')}
    </div>`).join('');
}

function toggleCode(code, desc, activity) {
  const sel = codeModalCtx.selected;
  const idx = sel.findIndex(c => c.c === code);
  if (idx >= 0) sel.splice(idx, 1);
  else sel.push({ c: code, d: desc, a: activity });
  renderCodeList();
}

// ============================================================
// DATE MODAL
// ============================================================
function openDateModal() {
  document.getElementById('week-date-input').value = state.weekStart || '';
  document.getElementById('date-warning').classList.add('hidden');
  document.getElementById('date-modal').classList.remove('hidden');
}

function closeDateModal() {
  document.getElementById('date-modal').classList.add('hidden');
}

document.addEventListener('input', e => {
  if (e.target.id === 'week-date-input') {
    const val = e.target.value;
    if (!val) return;
    const d = strToDate(val);
    const isFri = d.getDay() === 5;
    document.getElementById('date-warning').classList.toggle('hidden', isFri);
  }
});

function confirmDateSelection() {
  const val = document.getElementById('week-date-input').value;
  if (!val) return;
  const friday = getNearestFriday(val);
  closeDateModal();
  loadWeek(friday);
}

// ============================================================
// CONFIRM MODAL
// ============================================================
let confirmCallback = null;

function showConfirm(title, msg, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = onOk;
  document.getElementById('confirm-modal').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.add('hidden');
  confirmCallback = null;
}

document.getElementById('confirm-ok').addEventListener('click', () => {
  if (confirmCallback) confirmCallback();
  closeConfirm();
});

// ============================================================
// EVENT DELEGATION
// ============================================================
function attachEvents() {
  // Handled via inline handlers — no additional setup needed
}

// Online / offline handling
window.addEventListener('online', () => {
  if (state.syncStatus === 'pending' || state.syncStatus === 'error') syncNow();
});

window.addEventListener('offline', () => {
  state.syncStatus = 'pending';
  updateHeaderStatus();
});

// ============================================================
// INIT
// ============================================================
async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  await initDB();

  const friday = getCurrentFriday();
  await loadWeek(dateToStr(friday));
}

init();
</script>
</body>
</html>
