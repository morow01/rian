<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a8a" id="meta-theme">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TimeSheet">
  <title>TimeSheet</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ===== THEME VARIABLES ===== */
    :root {
      --bg-page: #f1f5f9;
      --bg-card: #ffffff;
      --bg-card-alt: #f8fafc;
      --bg-input: #f9fafb;
      --bg-header: #1e3a8a;
      --bg-header-tab: #1e3078;
      --bg-day-header: #eff6ff;
      --bg-day-header-we: #f9fafb;
      --bg-hours: #f9fafb;
      --bg-ot: #fffbeb;
      --bg-code-btn: #eff6ff;
      --bg-modal: #ffffff;
      --bg-modal-search: #ffffff;
      --bg-code-group: #f3f4f6;
      --bg-code-item: #ffffff;
      --bg-code-item-sel: #eff6ff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --text-header: #ffffff;
      --text-header-sub: #93c5fd;
      --text-day: #1e3a8a;
      --text-day-we: #6b7280;
      --text-hours: #1e3a8a;
      --text-ot: #d97706;
      --accent: #4f46e5;
      --accent-light: #dbeafe;
      --accent-chip-bg: #dbeafe;
      --accent-chip-text: #1e40af;
      --border: #e2e8f0;
      --border-input: #e5e7eb;
      --border-day: #1e3a8a;
      --border-day-we: #9ca3af;
      --border-dashed: #e2e8f0;
      --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-card-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
      --act-number-bg: #1e3a8a;
      --act-number-text: #ffffff;
      --summary-even: #f9fafb;
      --tab-active: #fbbf24;
      --tab-inactive: #93c5fd;
      --btn-add-bg: #dbeafe;
      --btn-add-text: #2563eb;
      --overlay: rgba(0, 0, 0, 0.6);
    }

    [data-theme="dark"] {
      --bg-page: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.85);
      --bg-card-alt: rgba(30, 41, 59, 0.95);
      --bg-input: rgba(15, 23, 42, 0.6);
      --bg-header: #0c1425;
      --bg-header-tab: #0a1120;
      --bg-day-header: rgba(20, 30, 50, 0.9);
      --bg-day-header-we: rgba(30, 41, 59, 0.7);
      --bg-hours: rgba(15, 23, 42, 0.5);
      --bg-ot: rgba(120, 80, 0, 0.15);
      --bg-code-btn: rgba(20, 184, 166, 0.08);
      --bg-modal: #1e293b;
      --bg-modal-search: #1e293b;
      --bg-code-group: #0f172a;
      --bg-code-item: #1e293b;
      --bg-code-item-sel: rgba(20, 184, 166, 0.12);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-header: #e2e8f0;
      --text-header-sub: #5eead4;
      --text-day: #5eead4;
      --text-day-we: #64748b;
      --text-hours: #5eead4;
      --text-ot: #fbbf24;
      --accent: #14b8a6;
      --accent-light: rgba(20, 184, 166, 0.15);
      --accent-chip-bg: rgba(20, 184, 166, 0.18);
      --accent-chip-text: #5eead4;
      --border: #334155;
      --border-input: #334155;
      --border-day: #14b8a6;
      --border-day-we: #475569;
      --border-dashed: #334155;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-card-hover: 0 6px 20px rgba(0, 0, 0, 0.4);
      --act-number-bg: #14b8a6;
      --act-number-text: #0f172a;
      --summary-even: rgba(15, 23, 42, 0.4);
      --tab-active: #14b8a6;
      --tab-inactive: #5eead4;
      --btn-add-bg: rgba(20, 184, 166, 0.15);
      --btn-add-text: #14b8a6;
      --overlay: rgba(0, 0, 0, 0.75);
    }

    /* ===== BASE STYLES ===== */
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior: none;
      background: var(--bg-page);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    input,
    select,
    textarea {
      font-size: 16px !important;
      color: var(--text-primary);
      background: var(--bg-input);
      border-color: var(--border-input);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    /* ===== COMPONENT STYLES ===== */
    .code-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-chip-bg);
      color: var(--accent-chip-text);
      border-radius: 9999px;
      padding: 3px 10px;
      font-size: 12px;
      margin: 2px;
    }

    .day-card {
      border-left: 6px solid var(--border-day);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.2s ease, background 0.3s ease;
    }

    .day-card:hover {
      box-shadow: var(--shadow-card-hover);
    }

    .day-weekend {
      border-left-color: var(--border-day-we);
    }

    .day-header {
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 68px;
      z-index: 5;
      background: var(--bg-day-header);
    }

    .day-weekend .day-header {
      background: var(--bg-day-header-we);
    }

    .day-header .expand-arrow {
      transition: transform 0.3s ease;
      display: inline-block;
    }

    .day-header .expand-arrow.collapsed {
      transform: rotate(-90deg);
    }

    .day-activities {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }

    .day-activities.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }

    .day-activities.expanded {
      opacity: 1;
    }

    .activity-item {
      position: relative;
      background: var(--bg-card);
    }

    .activity-item:not(:last-child) {
      border-bottom: 2px dashed var(--border-dashed);
    }

    .activity-item:nth-child(even) {
      background: var(--bg-card-alt);
    }

    .activity-number {
      position: absolute;
      left: 8px;
      top: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--act-number-bg);
      color: var(--act-number-text);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spin {
      animation: spin 1s linear infinite;
    }

    .summary-row:nth-child(even) {
      background: var(--summary-even);
    }

    input[type=number]::-webkit-inner-spin-button {
      opacity: 1;
    }

    /* Dark glass effects */
    [data-theme="dark"] .day-card {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] .day-header {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Theme toggle button */
    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Stepper Buttons Refined (v0.8.2 optimized) */
    .stepper-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 500;
      border-radius: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      -webkit-user-select: none;
    }

    .stepper-btn:active {
      transform: scale(0.9);
      background: var(--accent);
      color: white;
    }

    .stepper-btn-minus {
      background: var(--bg-page);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .stepper-btn-plus {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    /* Hide Native Spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>

<body class="min-h-screen">

  <div id="app" class="max-w-2xl mx-auto"></div>

  <!-- ===== CODE SEARCH MODAL ===== -->
  <div id="code-modal" class="hidden fixed inset-0 z-50 flex flex-col" style="background:var(--bg-modal)">
    <div style="background:var(--bg-header)" class="text-white px-4 py-3 flex items-center gap-3 safe-top">
      <button onclick="closeCodeModal()" class="text-white p-1 text-xl leading-none">✕</button>
      <h2 class="text-base font-semibold flex-1">Select Code(s)</h2>
      <button onclick="confirmCodeSelection()"
        class="bg-amber-500 text-white px-4 py-1.5 rounded-full text-sm font-bold">Done</button>
    </div>
    <div class="p-3 sticky top-0 z-10" style="background:var(--bg-modal-search);border-bottom:1px solid var(--border)">
      <input id="code-search" type="text" placeholder="Search description or code..."
        class="w-full rounded-xl px-4 py-2.5 text-base"
        style="border:1px solid var(--border-input);background:var(--bg-input)" oninput="filterCodes(this.value)">
      <p class="text-xs mt-1.5 px-1" style="color:var(--text-secondary)">Tap to select. Multiple allowed for routines.
      </p>
    </div>
    <div id="code-list" class="flex-1 overflow-y-auto pb-6"></div>
  </div>

  <!-- ===== DATE PICKER MODAL ===== -->
  <div id="date-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background:var(--overlay)">
    <div class="rounded-2xl p-6 w-full max-w-sm shadow-2xl" style="background:var(--bg-modal)">
      <h2 class="text-lg font-bold mb-1" style="color:var(--text-primary)">Set Week Start</h2>
      <p class="text-sm mb-4" style="color:var(--text-secondary)">Pick the Friday that starts your week</p>
      <input id="week-date-input" type="date" class="w-full rounded-xl px-4 py-3 text-base mb-4 outline-none"
        style="border:2px solid var(--border-input);background:var(--bg-input)">
      <div id="date-warning" class="hidden text-amber-600 text-sm mb-3 bg-amber-50 px-3 py-2 rounded-lg">⚠️ That's not a
        Friday. The week will start from the Friday before that date.</div>
      <div class="flex gap-3">
        <button onclick="closeDateModal()" class="flex-1 py-3 rounded-xl font-medium"
          style="border:2px solid var(--border);color:var(--text-secondary)">Cancel</button>
        <button onclick="confirmDateSelection()" class="flex-1 py-3 text-white rounded-xl font-bold"
          style="background:var(--accent)">Set Week</button>
      </div>
    </div>
  </div>

  <!-- ===== CONFIRM MODAL ===== -->
  <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background:var(--overlay)">
    <div class="rounded-2xl p-6 w-full max-w-sm shadow-2xl" style="background:var(--bg-modal)">
      <h2 id="confirm-title" class="text-lg font-bold mb-2" style="color:var(--text-primary)"></h2>
      <p id="confirm-msg" class="mb-6 text-sm" style="color:var(--text-secondary)"></p>
      <div class="flex gap-3">
        <button onclick="closeConfirm()" class="flex-1 py-3 rounded-xl font-medium"
          style="border:2px solid var(--border);color:var(--text-secondary)">Cancel</button>
        <button id="confirm-ok" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const VERSION = '0.9';
    const API_URL = 'https://script.google.com/macros/s/AKfycbwHbuuctWpT1QWqQc8C1fINQyBJhssIIeh3duuQgAHiCpGBRUVnPEmUnDlEDu5mQbZk/exec';
    const DAY_NAMES = ['Friday', 'Saturday', 'Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday'];
    const DB_NAME = 'timesheet-db';
    const DB_VERSION = 2;

    // ============================================================
    // Dynamic work codes are now fetched from GAS and stored in IndexedDB.
    // The list is loaded into state.workCodes on init.

    // ============================================================
    // STATE
    // ============================================================
    let state = {
      view: 'week',         // 'week' | 'history'
      weekStart: null,      // 'YYYY-MM-DD'
      weekData: null,       // { weekStart, days: [...] }
      syncStatus: 'idle',   // 'idle' | 'pending' | 'syncing' | 'synced' | 'error'
      historyWeeks: [],
      showSummary: false,
      expandedDays: new Set(),  // track which day indices are expanded
      workCodes: [],           // dynamic work codes from server
    };

    let codeModalCtx = { dayIndex: null, activityId: null, selected: [] };
    let saveTimer = null;
    let syncTimer = null;
    let db = null;

    // ============================================================
    // INDEXEDDB
    // ============================================================
    function initDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('weeks')) d.createObjectStore('weeks', { keyPath: 'weekStart' });
          if (!d.objectStoreNames.contains('config')) d.createObjectStore('config', { keyPath: 'id' });
        };
        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror = rej;
      });
    }

    function dbPut(store, data) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).put(data);
        req.onsuccess = () => res();
        req.onerror = rej;
      });
    }

    function dbGet(store, key) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    function dbGetAll(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    function dbPut(store, val) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).put(val);
        req.onsuccess = res;
        req.onerror = rej;
      });
    }

    function dbGetAll(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    // ============================================================
    // API
    // ============================================================
    async function apiGet(action, params = {}) {
      const url = new URL(API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString(), { redirect: 'follow' });
      return res.json();
    }

    async function apiPost(body) {
      const res = await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify(body),
      });
      return res.json();
    }

    // ============================================================
    // DATE UTILS
    // ============================================================
    function dateToStr(d) {
      return d.toISOString().split('T')[0];
    }

    function strToDate(s) {
      return new Date(s + 'T00:00:00');
    }

    function getCurrentFriday() {
      const today = new Date();
      const day = today.getDay(); // 0=Sun..6=Sat
      const back = [2, 3, 4, 5, 6, 0, 1][day];
      const d = new Date(today);
      d.setDate(d.getDate() - back);
      return d;
    }

    function getNearestFriday(dateStr) {
      const d = strToDate(dateStr);
      const day = d.getDay();
      if (day === 5) return dateStr;
      const back = [2, 3, 4, 5, 6, 0, 1][day];
      const fri = new Date(d);
      fri.setDate(d.getDate() - back);
      return dateToStr(fri);
    }

    function formatDate(dateStr) {
      const d = strToDate(dateStr);
      return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' });
    }

    function formatWeekRange(weekStart) {
      const start = strToDate(weekStart);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      return `${formatDate(weekStart)} – ${formatDate(dateToStr(end))}`;
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ============================================================
    // WEEK DATA
    // ============================================================
    function createEmptyWeek(weekStart) {
      const days = DAY_NAMES.map((name, i) => {
        const d = new Date(weekStart + 'T00:00:00');
        d.setDate(d.getDate() + i);
        return { date: dateToStr(d), dayName: name, activities: [createActivity()] };
      });
      return { weekStart, days };
    }

    function autoExpandToday() {
      state.expandedDays.clear();
      if (!state.weekData) return;
      const today = dateToStr(new Date());
      const idx = state.weekData.days.findIndex(d => d.date === today);
      if (idx >= 0) {
        state.expandedDays.add(idx);
      } else {
        state.expandedDays.add(0); // default expand first day
      }
    }

    function createActivity() {
      return { id: uid(), ticket: '', description: '', location: '', codes: [], ordinary: '', overtime: '', tasks: '', timePerTask: '', otPerTask: '' };
    }

    function calcSummary(weekData) {
      const map = {};
      if (!weekData) return [];
      weekData.days.forEach(day => {
        day.activities.forEach(act => {
          if (!act.codes.length) return;
          const ordinary = parseFloat(act.ordinary) || 0;
          const overtime = parseFloat(act.overtime) || 0;
          const n = act.codes.length || 1;
          const timePerTask = parseFloat(act.timePerTask) || (n > 0 ? ordinary / n : 0);
          const otPerTask = parseFloat(act.otPerTask) || (n > 1 ? overtime / n : overtime);
          act.codes.forEach(code => {
            const key = code.c;
            if (!map[key]) map[key] = { code: code.c, description: code.d, ordinary: 0, overtime: 0 };
            if (n === 1) {
              map[key].ordinary += ordinary;
              map[key].overtime += overtime;
            } else {
              map[key].ordinary += timePerTask;
              map[key].overtime += otPerTask;
            }
          });
        });
      });
      return Object.values(map).sort((a, b) => b.ordinary - a.ordinary);
    }

    // ============================================================
    // LOAD / SAVE
    // ============================================================
    async function loadCodes() {
      const cached = await dbGet('config', 'workCodes');
      if (cached && Array.isArray(cached.data)) {
        state.workCodes = cached.data;
      }
    }

    async function fetchCodes() {
      if (!navigator.onLine) return;
      try {
        const codes = await apiGet('getCodes');
        if (Array.isArray(codes) && codes.length > 0) {
          state.workCodes = codes;
          await dbPut('config', { id: 'workCodes', data: codes, updated: Date.now() });
          render(); // Refresh modal if open
        }
      } catch (e) {
        console.warn('Failed to fetch codes:', e);
      }
    }

    async function loadWeek(weekStart) {
      state.weekStart = weekStart;
      state.syncStatus = 'idle';

      // Load from local DB
      const local = await dbGet('weeks', weekStart);
      state.weekData = local ? local.data : createEmptyWeek(weekStart);
      autoExpandToday();

      render();

      // Try to sync from API (non-blocking)
      if (navigator.onLine) {
        try {
          const remote = await apiGet('getWeek', { date: weekStart });
          if (remote && remote.days) {
            const localTime = local ? (local.updatedAt || 0) : 0;
            const remoteTime = remote._updatedAt || 0;
            if (!local || remoteTime > localTime) {
              state.weekData = remote;
              await dbPut('weeks', { weekStart, data: remote, updatedAt: remoteTime });
              render();
            }
          }
          state.syncStatus = 'synced';
        } catch (e) {
          state.syncStatus = 'error';
        }
      }
      updateHeaderStatus();
    }

    function scheduleAutoSave() {
      clearTimeout(saveTimer);
      clearTimeout(syncTimer);
      state.syncStatus = 'pending';
      updateHeaderStatus();
      saveTimer = setTimeout(async () => {
        await dbPut('weeks', { weekStart: state.weekStart, data: state.weekData, updatedAt: Date.now() });
        if (navigator.onLine) {
          syncTimer = setTimeout(syncNow, 3000);
        }
      }, 500);
    }

    async function syncNow() {
      if (!navigator.onLine) { state.syncStatus = 'pending'; updateHeaderStatus(); return; }
      state.syncStatus = 'syncing';
      updateHeaderStatus();
      try {
        const payload = { ...state.weekData, _updatedAt: Date.now() };
        await apiPost({ action: 'saveWeek', weekStart: state.weekStart, weekData: payload });
        state.syncStatus = 'synced';
      } catch (e) {
        state.syncStatus = 'error';
      }
      updateHeaderStatus();
    }

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = renderHeader() + (state.view === 'week' ? renderWeekView() : renderHistoryView());
      attachEvents();
    }

    function renderHeader() {
      const syncIcons = {
        idle: '',
        pending: '<span class="text-amber-300 text-xs">●</span>',
        syncing: '<span class="spin inline-block text-blue-300 text-xs">↻</span>',
        synced: '<span class="text-green-300 text-xs">✓</span>',
        error: '<span class="text-red-300 text-xs">✗</span>',
      };
      const syncTitles = { idle: '', pending: 'Unsaved changes', syncing: 'Syncing…', synced: 'Synced', error: 'Sync failed – tap to retry' };
      const themeIcon = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
      return `
  <header class="sticky top-0 z-10 shadow-lg" style="background:var(--bg-header);color:var(--text-header)">
    <div class="flex items-center px-4 py-3 gap-2">
      <button onclick="prevWeek()" style="color:var(--text-header-sub)" class="text-xl px-1 py-1 min-w-[36px]">‹</button>
      <div class="flex-1 text-center">
        <div class="font-bold text-base leading-tight">${state.weekStart ? formatWeekRange(state.weekStart) : '—'}</div>
        <div class="text-xs mt-0.5 flex items-center justify-center gap-2" style="color:var(--text-header-sub)">
          ${syncIcons[state.syncStatus] || ''}
          <span title="${syncTitles[state.syncStatus]}">${syncTitles[state.syncStatus]}</span>
          <span style="color:var(--text-muted)" class="text-xs">v${VERSION}</span>
        </div>
      </div>
      <button onclick="nextWeek()" style="color:var(--text-header-sub)" class="text-xl px-1 py-1 min-w-[36px]">›</button>
      <button onclick="openDateModal()" style="color:var(--text-header-sub);border-color:var(--border)" class="text-sm px-2 py-1 border rounded-lg ml-1">📅</button>
      <button onclick="toggleTheme()" class="theme-toggle" title="Toggle theme">${themeIcon}</button>
    </div>
    <div class="flex" style="border-top:1px solid var(--border)">
      <button onclick="setView('week')" class="flex-1 py-2 text-sm font-medium" style="color:${state.view === 'week' ? 'var(--text-header)' : 'var(--tab-inactive)'};${state.view === 'week' ? 'border-bottom:2px solid var(--tab-active)' : ''}">Week</button>
      <button onclick="syncNow()" class="flex-1 py-2 text-sm font-medium" style="color:var(--tab-inactive)" title="Sync now">☁ Sync</button>
      <button onclick="setView('history')" class="flex-1 py-2 text-sm font-medium" style="color:${state.view === 'history' ? 'var(--text-header)' : 'var(--tab-inactive)'};${state.view === 'history' ? 'border-bottom:2px solid var(--tab-active)' : ''}">History</button>
    </div>
  </header>`;
    }

    function updateHeaderStatus() {
      const el = document.querySelector('header');
      if (el) el.outerHTML = renderHeader();
    }

    function renderWeekView() {
      if (!state.weekData) return `<div class="p-8 text-center" style="color:var(--text-muted)">Loading…</div>`;
      const summary = calcSummary(state.weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);

      const daysHtml = state.weekData.days.map((day, di) => renderDaySection(day, di)).join('');

      const summaryHtml = `
  <div class="mx-3 mb-4 rounded-2xl shadow-sm overflow-hidden" style="background:var(--bg-card);border:1px solid var(--border)">
    <button onclick="toggleSummary()" class="w-full flex items-center justify-between px-4 py-3" style="background:var(--bg-header);color:var(--text-header)">
      <span class="font-bold text-sm">Weekly Summary</span>
      <span style="color:var(--text-header-sub)" class="text-sm">
        <span class="font-mono">${totalOrd.toFixed(2)}</span> hrs &nbsp;
        <span class="font-mono" style="color:var(--tab-active)">${totalOT.toFixed(2)}</span> OT
        <span class="ml-2">${state.showSummary ? '▲' : '▼'}</span>
      </span>
    </button>
    ${state.showSummary ? `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr style="background:var(--bg-card-alt);color:var(--text-secondary)" class="text-xs uppercase">
            <th class="px-3 py-2 text-left">Code</th>
            <th class="px-3 py-2 text-left">Description</th>
            <th class="px-3 py-2 text-right">Ord</th>
            <th class="px-3 py-2 text-right">OT</th>
          </tr>
        </thead>
        <tbody>
          ${summary.map((row, i) => `
          <tr class="summary-row" style="${i % 2 === 0 ? '' : 'background:var(--summary-even)'}">
            <td class="px-3 py-2 font-mono text-xs whitespace-nowrap" style="color:var(--accent)">${row.code}</td>
            <td class="px-3 py-2 text-xs" style="color:var(--text-secondary)">${row.description}</td>
            <td class="px-3 py-2 text-right font-semibold" style="color:var(--text-primary)">${row.ordinary.toFixed(2)}</td>
            <td class="px-3 py-2 text-right font-semibold" style="color:var(--text-ot)">${row.overtime > 0 ? row.overtime.toFixed(2) : '—'}</td>
          </tr>`).join('')}
          <tr class="font-bold text-sm" style="background:var(--bg-day-header)">
            <td colspan="2" class="px-3 py-2" style="color:var(--text-day)">TOTAL</td>
            <td class="px-3 py-2 text-right" style="color:var(--text-day)">${totalOrd.toFixed(2)}</td>
            <td class="px-3 py-2 text-right" style="color:var(--text-ot)">${totalOT.toFixed(2)}</td>
          </tr>
        </tbody>
      </table>
    </div>` : ''}
  </div>`;

      return `<main class="pb-6 pt-2">${daysHtml}${summaryHtml}</main>`;
    }

    function calcDayTotals(day) {
      let ord = 0, ot = 0;
      day.activities.forEach(act => {
        ord += parseFloat(act.ordinary) || 0;
        ot += parseFloat(act.overtime) || 0;
      });
      return { ord, ot };
    }

    function toggleDay(di) {
      if (state.expandedDays.has(di)) {
        state.expandedDays.delete(di);
      } else {
        state.expandedDays.add(di);
      }
      render();
    }

    function renderDaySection(day, di) {
      const isWeekend = di === 1 || di === 2;
      const isExpanded = state.expandedDays.has(di);
      const activitiesHtml = day.activities.map((act, ai) => renderActivity(act, di, ai, day.activities.length)).join('');
      const { ord, ot } = calcDayTotals(day);
      const hasHours = ord > 0 || ot > 0;
      const actCount = day.activities.filter(a => a.description || a.codes.length || parseFloat(a.ordinary) > 0).length;
      return `
  <div class="mx-3 mb-5 rounded-2xl shadow-sm overflow-visible day-card ${isWeekend ? 'day-weekend' : ''}">
    <div class="day-header flex items-center justify-between px-4 py-3 rounded-t-2xl" onclick="toggleDay(${di})">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="expand-arrow ${isExpanded ? '' : 'collapsed'} text-lg leading-none" style="color:var(--text-day)">▼</span>
        <span class="font-bold text-sm" style="color:var(--text-day)">${day.dayName}</span>
        <span class="text-xs" style="color:var(--text-muted)">${formatDate(day.date)}</span>
        ${hasHours ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:var(--accent-light);color:var(--accent)">${ord.toFixed(1)}h${ot > 0 ? ` <span style="color:var(--text-ot)">+${ot.toFixed(1)} OT</span>` : ''}</span>` : ''}
        ${!isExpanded && actCount > 0 ? `<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--bg-card-alt);color:var(--text-muted)">${actCount} task${actCount !== 1 ? 's' : ''}</span>` : ''}
      </div>
      ${isExpanded ? `<button onclick="event.stopPropagation(); addActivity(${di})" class="text-sm font-semibold flex items-center gap-1 py-1 px-2 rounded-lg flex-shrink-0" style="background:var(--btn-add-bg);color:var(--btn-add-text)">
        <span class="text-base leading-none">+</span> Add
      </button>` : ''}
    </div>
    <div class="day-activities ${isExpanded ? 'expanded' : 'collapsed'}" ${isExpanded ? '' : 'style="max-height:0"'} id="day-${di}-activities">
      ${activitiesHtml}
    </div>
  </div>`;
    }

    function renderActivity(act, di, actIndex, totalActivities) {
      const numTasks = act.codes.length || 1;
      const ordinary = parseFloat(act.ordinary) || 0;
      const overtime = parseFloat(act.overtime) || 0;
      const hrsPerTask = ordinary > 0 ? (ordinary / numTasks).toFixed(2) : '—';
      const otPerTask = overtime > 0 ? (overtime / numTasks).toFixed(2) : '—';
      const codesSection = act.codes.length
        ? `<div class="flex flex-wrap gap-1 mb-2 px-1">
        ${act.codes.map(c => `
          <span class="code-chip">
            ${c.d} <span class="font-mono" style="opacity:0.8">${c.c}</span>
            <button onclick="removeCode('${act.id}',${di},'${c.c}')" class="ml-1 text-xs leading-none" style="color:var(--text-muted)">✕</button>
          </span>`).join('')}
       </div>`
        : '';

      return `
  <div class="activity-item p-3 pl-8" data-act-id="${act.id}" data-day="${di}">
    <div class="activity-number">${actIndex + 1}</div>
    <div class="flex gap-2 mb-2">
      <input type="text" placeholder="Description of work" value="${esc(act.description)}"
        class="flex-1 rounded-lg px-3 py-2 text-sm outline-none" style="background:var(--bg-input);border:1px solid var(--border-input)"
        data-field="description" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      <button onclick="removeActivity('${act.id}', ${di})" class="px-2 text-lg leading-none flex-shrink-0" style="color:var(--text-muted)">🗑</button>
    </div>
    <div class="flex gap-2 mb-2">
      <input type="text" placeholder="Location" value="${esc(act.location)}"
        class="flex-1 rounded-lg px-3 py-2 text-sm outline-none" style="background:var(--bg-input);border:1px solid var(--border-input)"
        data-field="location" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      <input type="text" placeholder="Ticket #" value="${esc(act.ticket)}"
        class="w-28 rounded-lg px-3 py-2 text-sm outline-none" style="background:var(--bg-input);border:1px solid var(--border-input)"
        data-field="ticket" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
    </div>
    ${codesSection}
    <button onclick="openCodeModal(${di},'${act.id}')"
      class="w-full text-left border border-dashed rounded-xl px-3 py-2 mb-2 text-sm font-medium" style="background:var(--bg-code-btn);color:var(--accent);border-color:var(--accent)">
      ${act.codes.length ? '✎ Edit codes' : '+ Tap to add code'}
    </button>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-1">
      <div class="rounded-2xl p-2" style="background:var(--bg-hours);border:1px solid var(--border)">
        <label class="text-[10px] font-semibold block mb-2 uppercase tracking-tight" style="color:var(--text-muted);opacity:0.7">Ordinary Hrs</label>
        <div class="flex items-center bg-black/5 dark:bg-white/5 rounded-xl p-0.5 gap-1">
          <button onclick="adjHrs(this, -0.5)" class="stepper-btn stepper-btn-minus flex-none" data-target="ordinary" data-act="${act.id}" data-day="${di}">−</button>
          <input type="number" step="0.5" min="0" placeholder="0" value="${act.ordinary}"
            class="flex-1 text-center font-bold text-lg bg-transparent outline-none" style="color:var(--text-hours)"
            data-field="ordinary" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
          <button onclick="adjHrs(this, 0.5)" class="stepper-btn stepper-btn-plus flex-none" data-target="ordinary" data-act="${act.id}" data-day="${di}">+</button>
        </div>
      </div>
      <div class="rounded-2xl p-2" style="background:var(--bg-ot);border:1px solid var(--border)">
        <label class="text-[10px] font-semibold block mb-2 uppercase tracking-tight" style="color:var(--text-ot);opacity:0.7">Overtime Hrs</label>
        <div class="flex items-center bg-black/5 dark:bg-white/5 rounded-xl p-0.5 gap-1">
          <button onclick="adjHrs(this, -0.5)" class="stepper-btn stepper-btn-minus flex-none" data-target="overtime" data-act="${act.id}" data-day="${di}">−</button>
          <input type="number" step="0.5" min="0" placeholder="0" value="${act.overtime}"
            class="flex-1 text-center font-bold text-lg bg-transparent outline-none" style="color:var(--text-ot)"
            data-field="overtime" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
          <button onclick="adjHrs(this, 0.5)" class="stepper-btn stepper-btn-plus flex-none" data-target="overtime" data-act="${act.id}" data-day="${di}">+</button>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-3 px-1 pt-1 pb-0.5 text-xs" style="color:var(--text-muted)">
      <span>Tasks: <strong style="color:var(--text-secondary)">${numTasks}</strong></span>
      <span style="opacity:0.3">|</span>
      <span>Hrs/Task: <strong data-calc="hrsPerTask" data-act="${act.id}" style="color:var(--text-secondary)">${hrsPerTask}</strong></span>
      <span style="opacity:0.3">|</span>
      <span>OT/Task: <strong data-calc="otPerTask" data-act="${act.id}" style="color:var(--text-ot)">${otPerTask}</strong></span>
    </div>
  </div>`;
    }

    function renderHistoryView() {
      if (!state.historyWeeks.length) {
        return `<main class="p-6 text-center" style="color:var(--text-muted)"><p class="text-4xl mb-3">📋</p><p>No past weeks yet</p></main>`;
      }
      const rows = state.historyWeeks.map(w => `
    <button onclick="loadWeek('${w.weekStart}');setView('week')"
      class="flex items-center justify-between px-4 py-3 border-b w-full text-left" style="border-color:var(--border)">
      <div>
        <div class="font-semibold text-sm" style="color:var(--text-primary)">${formatWeekRange(w.weekStart)}</div>
        <div class="text-xs mt-0.5" style="color:var(--text-muted)">Last updated: ${w.lastUpdated ? new Date(w.lastUpdated).toLocaleDateString('en-IE') : 'unknown'}</div>
      </div>
      <span class="text-lg" style="color:var(--accent)">›</span>
    </button>`).join('');
      return `<main class="pb-6"><div class="mx-3 mt-3 rounded-2xl shadow-sm overflow-hidden" style="background:var(--bg-card);border:1px solid var(--border)">${rows}</div></main>`;
    }

    function esc(s) {
      return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function updateField(el) {
      const { field, act: actId, day: di } = el.dataset;
      const day = state.weekData.days[parseInt(di)];
      const act = day.activities.find(a => a.id === actId);
      if (!act) return;

      const val = el.value;
      act[field] = val;

      // Live-update calculated displays when hours change
      if (field === 'ordinary' || field === 'overtime') {
        const numTasks = act.codes.length || 1;
        const ord = parseFloat(act.ordinary) || 0;
        const ot = parseFloat(act.overtime) || 0;
        const hrsEl = document.querySelector(`[data-calc="hrsPerTask"][data-act="${actId}"]`);
        const otEl = document.querySelector(`[data-calc="otPerTask"][data-act="${actId}"]`);
        if (hrsEl) hrsEl.textContent = ord > 0 ? (ord / numTasks).toFixed(2) : '—';
        if (otEl) otEl.textContent = ot > 0 ? (ot / numTasks).toFixed(2) : '—';
        updateSummaryDisplay();
      }
      scheduleAutoSave();
    }

    function adjHrs(btn, delta) {
      const { target, act: actId, day: di } = btn.dataset;
      const input = document.querySelector(`input[data-field="${target}"][data-act="${actId}"][data-day="${di}"]`);
      if (!input) return;

      let val = parseFloat(input.value) || 0;
      val = Math.max(0, val + delta);
      input.value = val;
      updateField(input);
    }

    function addActivity(di) {
      state.weekData.days[di].activities.push(createActivity());
      state.expandedDays.add(di);
      render();
    }

    function removeActivity(actId, di) {
      const day = state.weekData.days[di];
      if (day.activities.length <= 1) {
        day.activities = [createActivity()];
      } else {
        day.activities = day.activities.filter(a => a.id !== actId);
      }
      scheduleAutoSave();
      render();
    }

    function removeCode(actId, di, code) {
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      if (!act) return;
      act.codes = act.codes.filter(c => c.c !== code);
      scheduleAutoSave();
      render();
    }

    function updateSummaryDisplay() {
      // lightweight re-render of just the summary section
      const summary = calcSummary(state.weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);
      const btn = document.querySelector('button[onclick="toggleSummary()"]');
      if (btn) {
        const ordEl = btn.querySelector('span.font-mono:first-of-type');
        const otEl = btn.querySelector('span.font-mono:last-of-type');
        if (ordEl) ordEl.textContent = totalOrd.toFixed(2);
        if (otEl) otEl.textContent = totalOT.toFixed(2);
      }
    }

    function toggleSummary() {
      state.showSummary = !state.showSummary;
      render();
    }

    function prevWeek() {
      if (!state.weekStart) return;
      const d = strToDate(state.weekStart);
      d.setDate(d.getDate() - 7);
      loadWeek(dateToStr(d));
    }

    function nextWeek() {
      if (!state.weekStart) return;
      const d = strToDate(state.weekStart);
      d.setDate(d.getDate() + 7);
      loadWeek(dateToStr(d));
    }

    function setView(v) {
      state.view = v;
      if (v === 'history') loadHistory();
      else render();
    }

    async function loadHistory() {
      state.historyWeeks = [];
      render();
      // Load from local DB
      const all = await dbGetAll('weeks');
      state.historyWeeks = all.sort((a, b) => b.weekStart.localeCompare(a.weekStart));
      // Also try API
      if (navigator.onLine) {
        try {
          const remote = await apiGet('getWeeks');
          if (Array.isArray(remote)) {
            const local = new Set(state.historyWeeks.map(w => w.weekStart));
            remote.forEach(r => { if (!local.has(r.weekStart)) state.historyWeeks.push(r); });
            state.historyWeeks.sort((a, b) => b.weekStart.localeCompare(a.weekStart));
          }
        } catch (e) { }
      }
      render();
    }

    // ============================================================
    // CODE MODAL
    // ============================================================
    let filteredCodes = [];

    function openCodeModal(di, actId) {
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      codeModalCtx = { dayIndex: di, activityId: actId, selected: act ? [...act.codes] : [] };
      filteredCodes = [...state.workCodes];
      document.getElementById('code-modal').classList.remove('hidden');
      document.getElementById('code-search').value = '';
      renderCodeList();
      setTimeout(() => document.getElementById('code-search').focus(), 100);
    }

    function closeCodeModal() {
      document.getElementById('code-modal').classList.add('hidden');
    }

    function confirmCodeSelection() {
      const { dayIndex: di, activityId: actId, selected } = codeModalCtx;
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      if (act) {
        act.codes = selected;
        // Auto-set tasks count
        if (selected.length > 1 && !act.tasks) act.tasks = String(selected.length);
        scheduleAutoSave();
        render();
      }
      closeCodeModal();
    }

    function filterCodes(q) {
      const ql = q.toLowerCase();
      filteredCodes = q ? state.workCodes.filter(c => c.d.toLowerCase().includes(ql) || c.c.toLowerCase().includes(ql) || (c.a && c.a.toLowerCase().includes(ql))) : [...state.workCodes];
      renderCodeList();
    }

    function renderCodeList() {
      const el = document.getElementById('code-list');
      const selected = new Set(codeModalCtx.selected.map(c => c.c));

      // Group by activity
      const groups = {};
      filteredCodes.forEach(c => { (groups[c.a] = groups[c.a] || []).push(c); });

      el.innerHTML = Object.entries(groups).map(([grp, codes]) => `
    <div>
      <div class="px-4 py-2 text-xs font-bold uppercase tracking-wide sticky top-0 z-10" style="background:var(--bg-code-group);color:var(--text-muted)">${grp}</div>
      ${codes.map(c => {
        const isSelected = selected.has(c.c);
        return `<button onclick="toggleCode('${c.c}','${esc(c.d)}','${esc(c.a)}')"
          class="w-full flex items-center gap-3 px-4 py-3 border-b text-left" style="background:${isSelected ? 'var(--bg-code-item-sel)' : 'var(--bg-code-item)'};border-color:var(--border)">
          <span class="flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center ${isSelected ? 'border-transparent text-white' : ''}" style="background:${isSelected ? 'var(--accent)' : 'transparent'};border-color:${isSelected ? 'var(--accent)' : 'var(--border-input)'}">
            ${isSelected ? '✓' : ''}
          </span>
          <span class="flex-1 min-w-0">
            <span class="block text-sm" style="color:var(--text-primary)">${c.d}</span>
            <span class="text-xs font-mono" style="color:var(--accent)">${c.c}</span>
          </span>
        </button>`;
      }).join('')}
    </div>`).join('');
    }

    function toggleCode(code, desc, activity) {
      const sel = codeModalCtx.selected;
      const idx = sel.findIndex(c => c.c === code);
      if (idx >= 0) sel.splice(idx, 1);
      else sel.push({ c: code, d: desc, a: activity });
      renderCodeList();
    }

    // ============================================================
    // DATE MODAL
    // ============================================================
    function openDateModal() {
      document.getElementById('week-date-input').value = state.weekStart || '';
      document.getElementById('date-warning').classList.add('hidden');
      document.getElementById('date-modal').classList.remove('hidden');
    }

    function closeDateModal() {
      document.getElementById('date-modal').classList.add('hidden');
    }

    document.addEventListener('input', e => {
      if (e.target.id === 'week-date-input') {
        const val = e.target.value;
        if (!val) return;
        const d = strToDate(val);
        const isFri = d.getDay() === 5;
        document.getElementById('date-warning').classList.toggle('hidden', isFri);
      }
    });

    function confirmDateSelection() {
      const val = document.getElementById('week-date-input').value;
      if (!val) return;
      const friday = getNearestFriday(val);
      closeDateModal();
      loadWeek(friday);
    }

    // ============================================================
    // CONFIRM MODAL
    // ============================================================
    let confirmCallback = null;

    function showConfirm(title, msg, onOk) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-msg').textContent = msg;
      confirmCallback = onOk;
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    function closeConfirm() {
      document.getElementById('confirm-modal').classList.add('hidden');
      confirmCallback = null;
    }

    document.getElementById('confirm-ok').addEventListener('click', () => {
      if (confirmCallback) confirmCallback();
      closeConfirm();
    });

    // ============================================================
    // EVENT DELEGATION
    // ============================================================
    function attachEvents() {
      // Handled via inline handlers — no additional setup needed
    }

    // Online / offline handling
    window.addEventListener('online', () => {
      if (state.syncStatus === 'pending' || state.syncStatus === 'error') syncNow();
    });

    window.addEventListener('offline', () => {
      state.syncStatus = 'pending';
      updateHeaderStatus();
    });

    // ============================================================
    // THEME LOGIC
    // ============================================================
    function initTheme() {
      const saved = localStorage.getItem('theme');
      const meta = document.getElementById('meta-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        if (meta) meta.setAttribute('content', saved === 'dark' ? '#0c1425' : '#1e3a8a');
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
        if (meta) meta.setAttribute('content', '#0c1425');
      }
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      const meta = document.getElementById('meta-theme');
      if (meta) meta.setAttribute('content', next === 'dark' ? '#0c1425' : '#1e3a8a');
      render(); // Refresh header icons
    }

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
      initTheme();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      }

      await initDB();
      await loadCodes();
      fetchCodes(); // Background fetch

      const friday = getCurrentFriday();
      await loadWeek(dateToStr(friday));
    }

    init();
  </script>
</body>

</html>
