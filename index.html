    /* Scale down — Press Start 2P renders visually large, override all sizes */
    [data-theme="gameboy"] body {
      font-size: 10px;
    }

    [data-theme="gameboy"] .field-label,
    [data-theme="gameboy"] .stepper-label {
      font-size: 7px;
      letter-spacing: 0.03em;
    }

    /* Override inline font-size:13px on textareas and text inputs */
    [data-theme="gameboy"] textarea,
    [data-theme="gameboy"] input[type="text"] {
      font-size: 10px !important;
    }

    /* Stepper number — override text-lg (18px) */
    [data-theme="gameboy"] input[type="number"] {
      font-size: 13px !important;
    }

    /* Buttons, chips, general small text */
    [data-theme="gameboy"] .text-sm,
    [data-theme="gameboy"] .text-xs {
      font-size: 9px !important;
    }

    [data-theme="gameboy"] .text-base {
      font-size: 10px !important;
    }

    [data-theme="gameboy"] .text-lg {
      font-size: 13px !important;
    }

    [data-theme="gameboy"] .text-xl {
      font-size: 14px !important;
    }

    [data-theme="gameboy"] .code-chip {
      font-size: 8px;
    }

    /* Placeholder text — use dark green so it's visible on the green inputs */
    [data-theme="gameboy"] ::placeholder {
      color: #306230 !important;
      opacity: 1;
    }

    /* Game Boy — no rounded corners */
    [data-theme="gameboy"] * {
      border-radius: 0 !important;
    }

    /* LCD — no rounded corners */
    [data-theme="lcd"] * {
      border-radius: 0 !important;
    }

    /* Windows 3.1 — kill all border-radius, add 3D raised/sunken effects */
    [data-theme="win31"] * {
      border-radius: 0 !important;
    }

    /* Raised panel (cards, buttons) */
    [data-theme="win31"] .day-card,
    [data-theme="win31"] .activity-item {
      box-shadow: inset -1px -1px 0 #000000, inset 1px 1px 0 #ffffff,
        inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf !important;
      border: none !important;
    }

    /* Sunken inset (inputs, textareas) */
    [data-theme="win31"] input[type="text"],
    [data-theme="win31"] input[type="number"],
    [data-theme="win31"] textarea {
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff,
        inset 2px 2px 0 #000000 !important;
      border: none !important;
      font-size: 11px !important;
    }

    /* Raised buttons */
    [data-theme="win31"] button:not(.stepper-btn):not(.hdr-icon-btn):not(.theme-menu-btn):not(.theme-option):not(.tab-btn) {
      box-shadow: inset -1px -1px 0 #000000, inset 1px 1px 0 #ffffff,
        inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf !important;
      border: none !important;
    }

    [data-theme="win31"] button:not(.stepper-btn):not(.hdr-icon-btn):not(.theme-menu-btn):not(.theme-option):not(.tab-btn):active {
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #dfdfdf !important;
    }

    /* Raised stepper pill */
    [data-theme="win31"] .stepper-row {
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff,
        inset 2px 2px 0 #000000 !important;
      border: none !important;
    }

    [data-theme="win31"] .stepper-btn {
      box-shadow: inset -1px -1px 0 #808080, inset 1px 1px 0 #ffffff !important;
    }

    [data-theme="win31"] .stepper-btn:active {
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff !important;
    }

    /* Code chips — navy selected look */
    [data-theme="win31"] .code-chip {
      font-size: 11px;
    }

    /* Placeholder */
    [data-theme="win31"] ::placeholder {
      color: #808080 !important;
      opacity: 1;
    }

    /* Field labels — MS Sans Serif looks fine at normal sizes, no need to shrink */
    [data-theme="win31"] .field-label,
    [data-theme="win31"] .stepper-label {
      font-size: 10px;
      letter-spacing: 0.05em;
    }

    /* ===== THEME DROPDOWN ===== */
    .theme-menu-wrap {

    .hdr-icon-btn {

      cursor: pointer;
      padding: 6px;
      border-radius: 8px;

      display: flex;

      gap: 3px;

    .theme-menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--text-header-sub);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 3px;

    .theme-dropdown {

      background: var(--bg-modal);

      border-radius: 12px;

      z-index: 100;
      min-width: 150px;
      display: none;

      display: block;

      align-items: center;
      gap: 10px;

      padding: 10px 14px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      text-align: left;
      transition: background 0.15s;

    }

    .theme-option.active {
      color: var(--accent);
      font-weight: 700;
    }

    .theme-swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;

    .confirm-box {

      border-radius: 16px;
      padding: 24px;

      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;

    .confirm-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .confirm-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .confirm-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
    }

    .confirm-cancel {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

    .confirm-delete {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--btn-danger-color, #ef4444);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

      box-sizing: border-box;

      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;

    select,
    textarea {
      font-size: 16px !important;
      color: var(--text-primary);
      background: var(--bg-input);
      border-color: var(--border-input);
    }

      color: var(--text-muted);

      padding: 3px 10px;
      font-size: 12px;
      margin: 2px;

      try {
        const res = await fetch('towns.json?v=' + VERSION);
        if (!res.ok) throw new Error('fetch failed');
        TOWNS = await res.json();
      } catch (_) {
        TOWNS = [];
      }
    }

    function townSearch(input) {
      const actId = input.dataset.act;
      const dd = document.getElementById('td-' + actId);
      if (!dd) return;
      const q = input.value.trim().toLowerCase();
      if (!q) { dd.style.display = 'none'; return; }

      const results = TOWNS.filter(t =>
        t.name.toLowerCase().includes(q) ||
        t.code.toLowerCase().startsWith(q)
      ).slice(0, 10);

      _townResults[actId] = results;

      if (!results.length) { dd.style.display = 'none'; return; }

      const di = input.dataset.day;
      dd.innerHTML = results.map((t, i) =>
        `<div class="town-option" onmousedown="selectTown('${actId}','${di}',${i})">
          <span>${esc(t.name)}</span>
          <span class="t-code">${esc(t.code)}</span>
        </div>`
      ).join('');
      dd.style.display = 'block';
    }

    function selectTown(actId, di, idx) {
      const t = (_townResults[actId] || [])[idx];
      if (!t) return;
      const input = document.querySelector(`input[data-field="location"][data-act="${actId}"]`);
      if (input) {
        input.value = t.name + ' (' + t.code + ')';
        updateField(input);
      }
      const dd = document.getElementById('td-' + actId);
      if (dd) dd.style.display = 'none';

    // ============================================================
    // INDEXEDDB
    // ============================================================
    function initDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('weeks')) d.createObjectStore('weeks', { keyPath: 'weekStart' });
        };
        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror = rej;
      });
    }

    function dbGet(store, key) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    function dbPut(store, val) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).put(val);
        req.onsuccess = res;
        req.onerror = rej;
      });
    }

    function dbGetAll(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }

    // ============================================================
    // API
    // ============================================================
    async function apiGet(action, params = {}) {
      const url = new URL(API_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString(), { redirect: 'follow' });
      return res.json();
    }

    async function apiPost(body) {
      const res = await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify(body),
      });
      return res.json();
    }

    // ============================================================
    // DATE UTILS
    // ============================================================
    function dateToStr(d) {
      return d.toISOString().split('T')[0];
    }

    function strToDate(s) {
      return new Date(s + 'T00:00:00');
    }

    function getCurrentFriday() {
      const today = new Date();
      const day = today.getDay(); // 0=Sun..6=Sat
      const back = [2, 3, 4, 5, 6, 0, 1][day];
      const d = new Date(today);
      d.setDate(d.getDate() - back);
      return d;
    }

    function getNearestFriday(dateStr) {
      const d = strToDate(dateStr);
      const day = d.getDay();
      if (day === 5) return dateStr;
      const back = [2, 3, 4, 5, 6, 0, 1][day];
      const fri = new Date(d);
      fri.setDate(d.getDate() - back);
      return dateToStr(fri);
    }

    function formatDate(dateStr) {
      const d = strToDate(dateStr);
      return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' });
    }

    function formatWeekRange(weekStart) {
      const start = strToDate(weekStart);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      return `${formatDate(weekStart)} – ${formatDate(dateToStr(end))}`;
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ============================================================
    // WEEK DATA
    // ============================================================
    function createEmptyWeek(weekStart) {
      const days = DAY_NAMES.map((name, i) => {
        const d = new Date(weekStart + 'T00:00:00');
        d.setDate(d.getDate() + i);
        return { date: dateToStr(d), dayName: name, activities: [createActivity()] };
      });
      return { weekStart, days };
    }

    function autoExpandToday() {
      state.expandedDays.clear();
      if (!state.weekData) return;
      const today = dateToStr(new Date());
      const idx = state.weekData.days.findIndex(d => d.date === today);
      if (idx >= 0) {
        state.expandedDays.add(idx);
      } else {
        state.expandedDays.add(0); // default expand first day
      }
    }

    function createActivity() {
      return { id: uid(), description: '', location: '', codes: [], ordinary: '', overtime: '', tasks: '', timePerTask: '', otPerTask: '', notes: '' };
    }

    function calcSummary(weekData) {
      const map = {};
      if (!weekData) return [];
      weekData.days.forEach(day => {
        day.activities.forEach(act => {
          if (!act.codes.length) return;
          const ordinary = parseFloat(act.ordinary) || 0;
          const overtime = parseFloat(act.overtime) || 0;
          const n = act.codes.length || 1;
          const timePerTask = parseFloat(act.timePerTask) || (n > 0 ? ordinary / n : 0);
          const otPerTask = parseFloat(act.otPerTask) || (n > 1 ? overtime / n : overtime);
          act.codes.forEach(code => {
            const key = code.c;
            if (!map[key]) map[key] = { code: code.c, description: code.d, ordinary: 0, overtime: 0 };
            if (n === 1) {
              map[key].ordinary += ordinary;
              map[key].overtime += overtime;
            } else {
              map[key].ordinary += timePerTask;
              map[key].overtime += otPerTask;
            }
          });
        });
      });
      return Object.values(map).sort((a, b) => b.ordinary - a.ordinary);
    }

    // ============================================================
    // LOAD / SAVE
    // ============================================================
    async function loadWeek(weekStart) {
      state.weekStart = weekStart;
      state.syncStatus = 'idle';

      // Load from local DB
      const local = await dbGet('weeks', weekStart);
      state.weekData = local ? local.data : createEmptyWeek(weekStart);
      autoExpandToday();

      render();

      // Try to sync from API (non-blocking)
      if (navigator.onLine) {
        try {
          const remote = await apiGet('getWeek', { date: weekStart });
          if (remote && remote.days) {
            const localTime = local ? (local.updatedAt || 0) : 0;
            const remoteTime = remote._updatedAt || 0;
            if (!local || remoteTime > localTime) {
              state.weekData = remote;
              await dbPut('weeks', { weekStart, data: remote, updatedAt: remoteTime });
              render();
            }
          }
          state.syncStatus = 'synced';
        } catch (e) {
          state.syncStatus = 'error';
        }
      }
      updateHeaderStatus();
    }

    function scheduleAutoSave() {
      clearTimeout(saveTimer);
      clearTimeout(syncTimer);
      state.syncStatus = 'pending';
      updateHeaderStatus();
      saveTimer = setTimeout(async () => {
        await dbPut('weeks', { weekStart: state.weekStart, data: state.weekData, updatedAt: Date.now() });
        if (navigator.onLine) {
          syncTimer = setTimeout(syncNow, 3000);
        }
      }, 500);
    }

    async function syncNow() {
      if (!navigator.onLine) { state.syncStatus = 'pending'; updateHeaderStatus(); return; }
      state.syncStatus = 'syncing';
      updateHeaderStatus();
      try {
        const payload = { ...state.weekData, _updatedAt: Date.now() };
        await apiPost({ action: 'saveWeek', weekStart: state.weekStart, weekData: payload });
        state.syncStatus = 'synced';
      } catch (e) {
        state.syncStatus = 'error';
      }
      updateHeaderStatus();
    }

    // ============================================================
    // EMAIL WEEKLY SUMMARY
    // ============================================================
    function buildEmailPlain(weekData) {
      if (!weekData) return 'No data for this week.';
      const range = formatWeekRange(weekData.weekStart);
      const summary = calcSummary(weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT  = summary.reduce((s, r) => s + r.overtime, 0);
      let lines = ['WEEKLY TIMESHEET SUMMARY', 'Week: ' + range, ''];
      weekData.days.forEach(day => {
        const acts = day.activities.filter(a => a.description || a.codes.length || parseFloat(a.ordinary) > 0);
        if (!acts.length) return;
        lines.push(day.dayName.toUpperCase() + ' ' + formatDate(day.date));
        acts.forEach((act, i) => {
          lines.push('  ' + (i+1) + '. ' + (act.description||'(no description)') + (act.location ? ' — '+act.location : ''));
          if (act.codes.length) lines.push('     Codes: ' + act.codes.map(c=>c.c).join(', '));
          lines.push('     Ordinary: '+(parseFloat(act.ordinary)||0).toFixed(2)+'h  |  OT: '+(parseFloat(act.overtime)||0).toFixed(2)+'h');
        });
        lines.push('');
      });
      lines.push('TOTALS', 'Ordinary: '+totalOrd.toFixed(2)+' hrs   Overtime: '+totalOT.toFixed(2)+' hrs');
      return lines.join('\n');
    }

    async function sendWeeklyEmail() {
      if (!state.weekData) { showToast('No week data to send.'); return; }
      showToast('Sending email…', 8000);
      try {
        const res = await apiPost({
          action:   'emailWeekly',
          to:       'morow01@gmail.com',
          subject:  'Weekly Timesheet — ' + formatWeekRange(state.weekStart),
          body:     buildEmailPlain(state.weekData),
          htmlBody: buildEmailHtml(state.weekData),
        });
        if (res && res.ok) {
          showToast('✓ Email sent!', 4000);
        } else {
          showToast('⚠ Email failed — see GAS logs', 5000);
        }
      } catch (e) {
        showToast('⚠ Email error: ' + e.message, 5000);
      }
    }

    function showToast(msg, duration = 2800) {
      let el = document.getElementById('toast-msg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'toast-msg';
        el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;z-index:9999;pointer-events:none;transition:opacity 0.3s';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.opacity = '1';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.style.opacity = '0'; }, duration);
    }

      const rowspan = activities.length + 1;

        html += `

    ${isFirst ? `<td class="tbl-day-cell" rowspan="${rowspan}">${day.dayName}</td><td class="tbl-date-cell" rowspan="${rowspan}">${dateStr}</td>` : ''}

          data-field="overtime" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
      </td>
      <td class="tbl-calc">${numTasks}</td>
      <td class="tbl-calc">${hrsPerTask}</td>
      <td class="tbl-calc">${otPerTask}</td>
      <td><input type="text" class="tbl-act-input" placeholder="Notes…" value="${esc(act.notes || '')}"
        data-field="notes" data-act="${act.id}" data-day="${di}" oninput="updateField(this)"></td>
      <td>
        <button class="tbl-del-btn" onclick="showConfirm('Delete activity?','${esc(act.description || 'Unnamed')}',()=>removeActivity('${act.id}',${di}))" title="Delete">✕</button>
      </td>`;
    }

    function initTableResize() {
      const table = document.querySelector('.timesheet-table');
      if (!table) return;
      table.querySelectorAll('.col-resize-handle').forEach(handle => {
        handle.addEventListener('mousedown', e => {
          e.preventDefault();
          const colIdx = parseInt(handle.dataset.col);
          const cols = table.querySelectorAll('col');
          const col = cols[colIdx];
          if (!col) return;
          const startX = e.clientX;
          const startW = parseInt(col.style.width) || col.offsetWidth;
          handle.classList.add('col-resizing');
          function onMove(e) {
            const newW = Math.max(40, startW + (e.clientX - startX));
            col.style.width = newW + 'px';
            const total = Array.from(cols).reduce((s, c) => s + (parseInt(c.style.width) || 0), 0);
            table.style.width = Math.max(1280, total) + 'px';
          }
          function onUp() {
            handle.classList.remove('col-resizing');
            const widths = Array.from(cols).map(c => parseInt(c.style.width) || 0);
            state.tableColWidths = widths;
            localStorage.setItem('tableColWidths', JSON.stringify(widths));
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });
    }

    function calcDayTotals(day) {
      let ord = 0, ot = 0;
      day.activities.forEach(act => {
        ord += parseFloat(act.ordinary) || 0;
        ot += parseFloat(act.overtime) || 0;
      });
      return { ord, ot };
    }

    function toggleDay(di) {
      if (state.expandedDays.has(di)) {
        state.expandedDays.delete(di);
      } else {
        state.expandedDays.add(di);
      }
      render();
    }

    function renderDaySection(day, di) {
      const isWeekend = di === 1 || di === 2;
      const isExpanded = state.expandedDays.has(di);
      const activitiesHtml = day.activities.map((act, ai) => renderActivity(act, di, ai, day.activities.length)).join('');
      const { ord, ot } = calcDayTotals(day);
      const hasHours = ord > 0 || ot > 0;
      const actCount = day.activities.filter(a => a.description || a.codes.length || parseFloat(a.ordinary) > 0).length;
      return `
  <div class="mx-3 mb-5 rounded-2xl shadow-sm day-card ${isWeekend ? 'day-weekend' : ''}" data-day-idx="${di}">
    <div class="day-header flex items-center justify-between px-4 py-3 rounded-t-2xl" onclick="toggleDay(${di})">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="expand-arrow ${isExpanded ? '' : 'collapsed'} text-lg leading-none" style="color:var(--text-day)">▼</span>
        <span class="font-bold text-sm" style="color:var(--text-day)">${day.dayName}</span>
        <span class="text-xs" style="color:var(--text-muted)">${formatDate(day.date)}</span>
        ${hasHours ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:var(--accent-light);color:var(--accent)">${ord.toFixed(1)}h${ot > 0 ? ` <span style="color:var(--text-ot)">+${ot.toFixed(1)} OT</span>` : ''}</span>` : ''}
        ${!isExpanded && actCount > 0 ? `<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--bg-card-alt);color:var(--text-muted)">${actCount} task${actCount !== 1 ? 's' : ''}</span>` : ''}
      </div>
    </div>
    <div class="day-activities ${isExpanded ? 'expanded' : 'collapsed'}" ${isExpanded ? '' : 'style="max-height:0"'} id="day-${di}-activities">
      ${activitiesHtml}
      ${isExpanded ? `
      <div class="flex justify-center px-4 py-3">
        <button onclick="addActivity(${di})" class="flex items-center gap-2 text-sm font-semibold px-6 py-2 rounded-xl" style="background:var(--btn-add-bg);color:var(--btn-add-text)">
          <span class="text-lg leading-none">+</span> Add Activity
        </button>
      </div>` : ''}
    </div>
  </div>`;
    }

    function renderActivity(act, di, actIndex, totalActivities) {
      const numTasks = act.codes.length || 1;
      const ordinary = parseFloat(act.ordinary) || 0;
      const overtime = parseFloat(act.overtime) || 0;
      const hrsPerTask = ordinary > 0 ? (ordinary / numTasks).toFixed(2) : '—';
      const otPerTask = overtime > 0 ? (overtime / numTasks).toFixed(2) : '—';
      const codesSection = act.codes.length
        ? `<div class="flex flex-wrap gap-1 mb-2 px-1">
        ${act.codes.map(c => `
          <span class="code-chip">
            ${c.d} <span class="font-mono" style="opacity:0.8">${c.c}</span>
            <button onclick="removeCode('${act.id}',${di},'${c.c}')" class="ml-1 text-xs leading-none" style="color:var(--text-muted)">✕</button>
          </span>`).join('')}
       </div>`
        : '';

      return `
  <div class="activity-item p-3 pl-8" data-act-id="${act.id}" data-day="${di}">
    <div class="activity-number">${actIndex + 1}</div>
    <div class="mb-2">
      <span class="field-label">Description</span>
      <textarea placeholder="Description of work" rows="2"
        class="w-full rounded-lg px-3 py-2 outline-none" style="font-size:13px;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-input);resize:none;overflow:hidden;min-height:44px"
        data-field="description" data-act="${act.id}" data-day="${di}" oninput="updateField(this);autoGrow(this)">${esc(act.description)}</textarea>
    </div>
    <div class="mb-2">
      <span class="field-label">Location</span>
      <div class="location-wrap">
        <input type="text" placeholder="Town name or code…" value="${esc(act.location)}"
          class="w-full rounded-lg px-3 py-2 outline-none" style="font-size:13px;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-input)"
          data-field="location" data-act="${act.id}" data-day="${di}"
          autocomplete="off" spellcheck="false"
          oninput="updateField(this);townSearch(this)"
          onfocus="townSearch(this)"
          onblur="closeTownDd(this)">
        <div class="town-dropdown" id="td-${act.id}"></div>
      </div>
    </div>
    <span class="field-label">Work Codes</span>
    ${codesSection}
    <button onclick="openCodeModal(${di},'${act.id}')"
      class="w-full text-left border border-dashed rounded-xl px-3 py-2 mb-2 text-sm font-medium" style="background:var(--bg-code-btn);color:var(--accent);border-color:var(--accent)">
      ${act.codes.length ? '✎ Edit codes' : '+ Tap to add code'}
    </button>
    <div class="flex gap-3 mb-1">
      <div class="stepper-wrap">
        <span class="stepper-label" style="color:var(--text-muted)">Ordinary Hrs</span>
        <div class="stepper-row">
          <button onclick="adjHrs(this,-0.5)" class="stepper-btn" data-target="ordinary" data-act="${act.id}" data-day="${di}">−</button>
          <div class="stepper-divider"></div>
          <input type="number" step="0.5" min="0" placeholder="0" value="${act.ordinary}"
            class="flex-1 text-center font-bold text-lg bg-transparent outline-none" style="color:var(--text-hours);min-width:0"
            data-field="ordinary" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
          <div class="stepper-divider"></div>
          <button onclick="adjHrs(this,0.5)" class="stepper-btn" data-target="ordinary" data-act="${act.id}" data-day="${di}">+</button>
        </div>
      </div>
      <div class="stepper-wrap">
        <span class="stepper-label" style="color:var(--text-ot)">Overtime Hrs</span>
        <div class="stepper-row ot">
          <button onclick="adjHrs(this,-0.5)" class="stepper-btn ot-btn" data-target="overtime" data-act="${act.id}" data-day="${di}">−</button>
          <div class="stepper-divider"></div>
          <input type="number" step="0.5" min="0" placeholder="0" value="${act.overtime}"
            class="flex-1 text-center font-bold text-lg bg-transparent outline-none" style="color:var(--text-ot);min-width:0"
            data-field="overtime" data-act="${act.id}" data-day="${di}" oninput="updateField(this)">
          <div class="stepper-divider"></div>
          <button onclick="adjHrs(this,0.5)" class="stepper-btn ot-btn" data-target="overtime" data-act="${act.id}" data-day="${di}">+</button>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-3 px-1 pt-1 pb-2 text-xs" style="color:var(--text-muted)">
      <span>Tasks: <strong style="color:var(--text-secondary)">${numTasks}</strong></span>
      <span style="opacity:0.3">|</span>
      <span>Hrs/Task: <strong data-calc="hrsPerTask" data-act="${act.id}" style="color:var(--text-secondary)">${hrsPerTask}</strong></span>
      <span style="opacity:0.3">|</span>
      <span>OT/Task: <strong data-calc="otPerTask" data-act="${act.id}" style="color:var(--text-ot)">${otPerTask}</strong></span>
    </div>
    <span class="field-label">Notes</span>
    <textarea placeholder="Notes…" rows="2"
      class="w-full rounded-lg px-3 py-2 outline-none" style="font-size:13px;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-input);resize:none;overflow:hidden;min-height:60px"
      data-field="notes" data-act="${act.id}" data-day="${di}" oninput="updateField(this);autoGrow(this)">${esc(act.notes || '')}</textarea>
    <div class="flex justify-end pt-2">
      <button onclick="showConfirm('Delete activity?','${esc(act.description || 'Unnamed')}${act.location ? ' — ' + esc(act.location) : ''}',()=>removeActivity('${act.id}',${di}))"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
        style="color:var(--btn-danger-color,#ef4444);background:var(--btn-danger-bg,rgba(239,68,68,0.08));border:1px solid var(--btn-danger-border,rgba(239,68,68,0.22))">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Delete activity
      </button>
    </div>
  </div>`;
    }

    function renderHistoryView() {
      if (!state.historyWeeks.length) {
        return `<main class="p-6 text-center" style="color:var(--text-muted)"><p class="text-4xl mb-3">📋</p><p>No past weeks yet</p></main>`;
      }
      const rows = state.historyWeeks.map(w => `
    <button onclick="loadWeek('${w.weekStart}');setView('week')"
      class="flex items-center justify-between px-4 py-3 border-b w-full text-left" style="border-color:var(--border)">
      <div>
        <div class="font-semibold text-sm" style="color:var(--text-primary)">${formatWeekRange(w.weekStart)}</div>
        <div class="text-xs mt-0.5" style="color:var(--text-muted)">Last updated: ${w.lastUpdated ? new Date(w.lastUpdated).toLocaleDateString('en-IE') : 'unknown'}</div>
      </div>
      <span class="text-lg" style="color:var(--accent)">›</span>
    </button>`).join('');
      return `<main class="pb-6"><div class="mx-3 mt-3 rounded-2xl shadow-sm overflow-hidden" style="background:var(--bg-card);border:1px solid var(--border)">${rows}</div></main>`;
    }

    function esc(s) {
      return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function updateField(el) {
      const { field, act: actId, day: di } = el.dataset;
      const day = state.weekData.days[parseInt(di)];
      const act = day.activities.find(a => a.id === actId);
      if (!act) return;

      const val = el.value;
      act[field] = val;

      // Live-update calculated displays when hours change
      if (field === 'ordinary' || field === 'overtime') {
        const numTasks = act.codes.length || 1;
        const ord = parseFloat(act.ordinary) || 0;
        const ot = parseFloat(act.overtime) || 0;
        const hrsEl = document.querySelector(`[data-calc="hrsPerTask"][data-act="${actId}"]`);
        const otEl = document.querySelector(`[data-calc="otPerTask"][data-act="${actId}"]`);
        if (hrsEl) hrsEl.textContent = ord > 0 ? (ord / numTasks).toFixed(2) : '—';
        if (otEl) otEl.textContent = ot > 0 ? (ot / numTasks).toFixed(2) : '—';
        updateSummaryDisplay();
      }
      scheduleAutoSave();
    }

    function adjHrs(btn, delta) {
      const { target, act: actId, day: di } = btn.dataset;
      const input = document.querySelector(`input[data-field="${target}"][data-act="${actId}"][data-day="${di}"]`);
      if (!input) return;

      let val = parseFloat(input.value) || 0;
      val = Math.max(0, val + delta);
      input.value = val;
      updateField(input);
    }

    function addActivity(di) {
      state.weekData.days[di].activities.push(createActivity());
      state.expandedDays.add(di);
      render();
    }

    function removeActivity(actId, di) {
      const day = state.weekData.days[di];
      if (day.activities.length <= 1) {
        day.activities = [createActivity()];
      } else {
        day.activities = day.activities.filter(a => a.id !== actId);
      }
      scheduleAutoSave();
      render();
    }

    function removeCode(actId, di, code) {
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      if (!act) return;
      act.codes = act.codes.filter(c => c.c !== code);
      scheduleAutoSave();
      render();
    }

    function updateSummaryDisplay() {
      // lightweight re-render of just the summary section
      const summary = calcSummary(state.weekData);
      const totalOrd = summary.reduce((s, r) => s + r.ordinary, 0);
      const totalOT = summary.reduce((s, r) => s + r.overtime, 0);
      const btn = document.querySelector('button[onclick="toggleSummary()"]');
      if (btn) {
        const ordEl = btn.querySelector('span.font-mono:first-of-type');
        const otEl = btn.querySelector('span.font-mono:last-of-type');
        if (ordEl) ordEl.textContent = totalOrd.toFixed(2);
        if (otEl) otEl.textContent = totalOT.toFixed(2);
      }
    }

    function toggleSummary() {
      state.showSummary = !state.showSummary;
      render();
    }

    function toggleLayoutMode() {
      state.layoutMode = state.layoutMode === 'table' ? 'card' : 'table';
      localStorage.setItem('layoutMode', state.layoutMode);
      render();
    }

    function prevWeek() {
      if (!state.weekStart) return;
      const d = strToDate(state.weekStart);
      d.setDate(d.getDate() - 7);
      loadWeek(dateToStr(d));
    }

    function nextWeek() {
      if (!state.weekStart) return;
      const d = strToDate(state.weekStart);
      d.setDate(d.getDate() + 7);
      loadWeek(dateToStr(d));
    }

    function setView(v) {
      state.view = v;
      if (v === 'history') loadHistory();
      else render();
    }

    async function loadHistory() {
      state.historyWeeks = [];
      render();
      // Load from local DB
      const all = await dbGetAll('weeks');
      state.historyWeeks = all.sort((a, b) => b.weekStart.localeCompare(a.weekStart));
      // Also try API
      if (navigator.onLine) {
        try {
          const remote = await apiGet('getWeeks');
          if (Array.isArray(remote)) {
            const local = new Set(state.historyWeeks.map(w => w.weekStart));
            remote.forEach(r => { if (!local.has(r.weekStart)) state.historyWeeks.push(r); });
            state.historyWeeks.sort((a, b) => b.weekStart.localeCompare(a.weekStart));
          }
        } catch (e) { }
      }
      render();
    }

    // ============================================================
    // CODE MODAL
    // ============================================================
    let filteredCodes = [...WORK_CODES];

    function openCodeModal(di, actId) {
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      codeModalCtx = { dayIndex: di, activityId: actId, selected: act ? [...act.codes] : [] };
      filteredCodes = [...WORK_CODES];
      document.getElementById('code-modal').classList.remove('hidden');
      document.getElementById('code-search').value = '';
      renderCodeList();
      setTimeout(() => document.getElementById('code-search').focus(), 100);
    }

    function closeCodeModal() {
      document.getElementById('code-modal').classList.add('hidden');
    }

    function confirmCodeSelection() {
      const { dayIndex: di, activityId: actId, selected } = codeModalCtx;
      const act = state.weekData.days[di].activities.find(a => a.id === actId);
      if (act) {
        act.codes = selected;
        // Auto-set tasks count
        if (selected.length > 1 && !act.tasks) act.tasks = String(selected.length);
        scheduleAutoSave();
        render();
      }
      closeCodeModal();
    }

    function filterCodes(q) {
      const ql = q.toLowerCase();
      filteredCodes = q ? WORK_CODES.filter(c => c.d.toLowerCase().includes(ql) || c.c.toLowerCase().includes(ql) || c.a.toLowerCase().includes(ql)) : [...WORK_CODES];
      renderCodeList();
    }

    function renderCodeList() {
      const el = document.getElementById('code-list');
      const selected = new Set(codeModalCtx.selected.map(c => c.c));

      // Group by activity
      const groups = {};
      filteredCodes.forEach(c => { (groups[c.a] = groups[c.a] || []).push(c); });

      el.innerHTML = Object.entries(groups).map(([grp, codes]) => `
    <div>
      <div class="px-4 py-2 text-xs font-bold uppercase tracking-wide sticky top-0 z-10" style="background:var(--bg-code-group);color:var(--text-muted)">${grp}</div>
      ${codes.map(c => {
        const isSelected = selected.has(c.c);
        return `<button onclick="toggleCode('${c.c}','${esc(c.d)}','${esc(c.a)}')"
          class="w-full flex items-center gap-3 px-4 py-3 border-b text-left" style="background:${isSelected ? 'var(--bg-code-item-sel)' : 'var(--bg-code-item)'};border-color:var(--border)">
          <span class="flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center ${isSelected ? 'border-transparent text-white' : ''}" style="background:${isSelected ? 'var(--accent)' : 'transparent'};border-color:${isSelected ? 'var(--accent)' : 'var(--border-input)'}">
            ${isSelected ? '✓' : ''}
          </span>
          <span class="flex-1 min-w-0">
            <span class="block text-sm" style="color:var(--text-primary)">${c.d}</span>
            <span class="text-xs font-mono" style="color:var(--accent)">${c.c}</span>
          </span>
        </button>`;
      }).join('')}
    </div>`).join('');
    }

    function toggleCode(code, desc, activity) {
      const sel = codeModalCtx.selected;
      const idx = sel.findIndex(c => c.c === code);
      if (idx >= 0) sel.splice(idx, 1);
      else sel.push({ c: code, d: desc, a: activity });
      renderCodeList();
    }

    // ============================================================
    // DATE MODAL
    // ============================================================
    function openDateModal() {
      document.getElementById('week-date-input').value = state.weekStart || '';
      document.getElementById('date-warning').classList.add('hidden');
      document.getElementById('date-modal').classList.remove('hidden');
    }

    function closeDateModal() {
      document.getElementById('date-modal').classList.add('hidden');
    }

    document.addEventListener('input', e => {
      if (e.target.id === 'week-date-input') {
        const val = e.target.value;
        if (!val) return;
        const d = strToDate(val);
        const isFri = d.getDay() === 5;
        document.getElementById('date-warning').classList.toggle('hidden', isFri);
      }
    });

    function confirmDateSelection() {
      const val = document.getElementById('week-date-input').value;
      if (!val) return;
      const friday = getNearestFriday(val);
      closeDateModal();
      loadWeek(friday);
    }

    // ============================================================
    // CONFIRM MODAL
    // ============================================================
    let confirmCallback = null;

    function showConfirm(title, msg, onOk) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-msg').textContent = msg;
      confirmCallback = onOk;
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    function closeConfirm() {
      document.getElementById('confirm-modal').classList.add('hidden');
      confirmCallback = null;
    }

    document.getElementById('confirm-ok').addEventListener('click', () => {
      if (confirmCallback) confirmCallback();
      closeConfirm();
    });

    // ============================================================
    // EVENT DELEGATION
    // ============================================================
    function attachEvents() {
      if (state.view === 'week' && state.layoutMode === 'table') {
        initTableResize();
      }
    }

    // Online / offline handling
    window.addEventListener('online', () => {
      if (state.syncStatus === 'pending' || state.syncStatus === 'error') syncNow();
    });

    window.addEventListener('offline', () => {
      state.syncStatus = 'pending';
      updateHeaderStatus();
    });

    // ============================================================
    // THEME LOGIC
    // ============================================================
    const THEME_META = { light: '#1e3a8a', dark: '#0c1425', slate: '#1a2535', lcd: '#0f380f', 'slate-dark': '#0a1018', gameboy: '#0F380F', win31: '#000080', gray: '#222222', spectrum: '#0000D7', apple: '#1D1D1F', retro: '#000000' };

    function initTheme() {
      const saved = localStorage.getItem('theme');
      const meta = document.getElementById('meta-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (meta) meta.setAttribute('content', THEME_META[theme] || '#1e3a8a');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const meta = document.getElementById('meta-theme');
      if (meta) meta.setAttribute('content', THEME_META[theme] || '#1e3a8a');
      closeThemeMenu();
      render();
    }

    function toggleThemeMenu(e) {
      e.stopPropagation();
      const dd = document.getElementById('theme-dropdown');
      if (dd) dd.classList.toggle('open');
    }

    function closeThemeMenu() {
      const dd = document.getElementById('theme-dropdown');
      if (dd) dd.classList.remove('open');
    }

    document.addEventListener('click', closeThemeMenu);

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
      initTheme();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      }

      await Promise.all([initDB(), loadCodes(), loadTowns()]);

      const friday = getCurrentFriday();
      await loadWeek(dateToStr(friday));
    }

    init();
  </script>

</body>

</html>
