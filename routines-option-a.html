<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option A — Two-Panel Layout</title>
<style>
  :root {
    --bg-page: #F0F4F8;
    --bg-card: #fff;
    --bg-card-alt: #F4F7FA;
    --bg-input: #F4F7FA;
    --bg-header: #0f1624;
    --border: #E2E8F0;
    --border-subtle: #F1F5F9;
    --accent: #2D6BE4;
    --accent-rgb: 45, 107, 228;
    --accent-light: rgba(45, 107, 228, 0.08);
    --text-primary: #1E293B;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); }

  .top-nav { display:flex; justify-content:center; gap:40px; padding:12px 0; background:var(--bg-header); border-bottom:1px solid var(--border); }
  .top-nav button { background:none; border:none; color:#64748b; font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; padding:6px 12px; font-family:var(--font-body); }
  .top-nav button.active { color:#4d94ff; }

  .col-hdr { padding:10px 14px 8px; font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; border-bottom:1px solid var(--border); line-height:1.4; background:var(--bg-page); }

  .wrap { display:flex; height:calc(100vh - 45px); }

  /* Left panel — site list */
  .left { width:320px; min-width:320px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg-page); }
  .left-search { padding:10px 14px; border-bottom:1px solid var(--border); }
  .left-search input { width:100%; padding:8px 12px 8px 32px; border:1px solid var(--border); border-radius:8px; font-size:12px; background:var(--bg-input); outline:none; font-family:var(--font-body); color:var(--text-primary); }
  .left-scroll { flex:1; overflow-y:auto; }

  .site-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border-subtle); cursor:pointer; transition:background 0.1s; }
  .site-row:hover { background:rgba(45,107,228,0.04); }
  .site-row.active { background:linear-gradient(to right, rgba(45,107,228,0.10), rgba(45,107,228,0.03)); border-left:3px solid var(--accent); }

  .site-icon { width:36px; height:36px; border-radius:9px; background:rgba(45,107,228,0.08); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--accent); font-size:16px; }
  .site-info { flex:1; min-width:0; }
  .site-name { font-size:14px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .site-meta { font-size:11px; color:var(--text-muted); margin-top:2px; display:flex; gap:8px; }

  .site-bar-wrap { width:48px; flex-shrink:0; }
  .site-bar { height:4px; border-radius:2px; background:var(--border); }
  .site-bar-fill { height:100%; border-radius:2px; background:#22c55e; }
  .site-visits { font-size:10px; color:var(--text-muted); text-align:right; margin-top:2px; }

  /* Right panel — grid */
  .right { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .right-top { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--bg-card); border-bottom:1px solid var(--border); }
  .year-nav { display:flex; align-items:center; gap:10px; }
  .year-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:16px; padding:4px 8px; border-radius:6px; }
  .year-btn:hover { background:var(--accent-light); }
  .year-label { font-size:16px; font-weight:700; }
  .edit-btn { background:var(--accent-light); color:var(--accent); border:none; border-radius:10px; padding:7px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-body); }

  .stats-row { display:flex; gap:8px; padding:12px 20px; background:var(--bg-page); }
  .stat { flex:1; background:var(--bg-card); border-radius:10px; padding:10px 8px; text-align:center; border:1px solid var(--border); }
  .stat-val { font-size:18px; font-weight:800; }
  .stat-lbl { font-size:10px; color:var(--text-muted); font-weight:500; margin-top:1px; }

  .grid-scroll { flex:1; overflow:auto; }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }
  th { padding:10px 4px; font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--border); text-align:center; }
  th:first-child { text-align:left; padding-left:20px; width:160px; min-width:160px; }
  th.cur { color:var(--accent); }
  td { text-align:center; padding:6px 4px; border-bottom:1px solid var(--border-subtle); height:60px; vertical-align:middle; }
  td:first-child { text-align:left; padding-left:20px; font-size:13px; font-weight:600; background:var(--bg-card); }
  td.cur-col { background:rgba(45,107,228,0.04); }

  .cell { width:48px; height:48px; border-radius:10px; border:none; cursor:pointer; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; background:rgba(45,107,228,0.03); transition:all 0.12s; }
  .cell:hover { background:rgba(45,107,228,0.1); transform:scale(1.08); }
  .cell.v { background:rgba(34,197,94,0.12); }
  .cell.v:hover { background:rgba(34,197,94,0.22); }
  .cell .dot { width:6px; height:6px; border-radius:50%; background:var(--text-muted); opacity:0.2; }
  .cell .day { font-size:14px; font-weight:700; color:#15803d; line-height:1; }
  .cell .auto { font-size:7px; font-weight:800; color:#15803d; opacity:0.7; }

  /* totals row */
  tr.totals td { background:var(--bg-card-alt); font-weight:700; font-size:12px; color:var(--text-secondary); border-top:2px solid var(--border); }
</style>
</head>
<body>
<div class="top-nav">
  <button>Timesheet</button><button>Notes</button><button>Journal</button>
  <button class="active">Routines</button><button>Finder</button>
</div>
<div class="wrap">
  <!-- LEFT PANEL: Site list -->
  <div class="left">
    <div class="col-hdr">Sites</div>
    <div class="left-search"><input placeholder="Search sites..." /></div>
    <div class="left-scroll" id="site-list"></div>
  </div>

  <!-- RIGHT PANEL: Grid -->
  <div class="right">
    <div class="right-top">
      <div class="year-nav">
        <button class="year-btn">&lsaquo;</button>
        <span class="year-label">2026</span>
        <button class="year-btn">&rsaquo;</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="edit-btn">&#x21bb; Refresh</button>
        <button class="edit-btn">Edit Sites</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" style="color:var(--accent)">30</div><div class="stat-lbl">Sites</div></div>
      <div class="stat"><div class="stat-val" style="color:#15803d">37</div><div class="stat-lbl">Visits</div></div>
      <div class="stat"><div class="stat-val" style="color:#D97706">10%</div><div class="stat-lbl">Coverage</div></div>
      <div class="stat"><div class="stat-val" style="color:#8B5CF6">Apr</div><div class="stat-lbl">Current Month</div></div>
    </div>
    <div class="col-hdr">Schedule</div>
    <div class="grid-scroll">
      <table>
        <thead><tr>
          <th>Site</th><th>Jan</th><th>Feb</th><th>Mar</th><th class="cur">Apr</th>
          <th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
        </tr></thead>
        <tbody id="grid-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const sites=["Ballinagar","Ballinakill","Ballycumber","Ballydaly","Clara","Clonaslee","Clonygowan","Collins Lane","Daingean","Dunmurry Hill","Five Alley","Geashill","Gracefield","Horseleap","Kilbeggan","Kilcormac","Kildare","Killeigh","Killenard","Kinnity","Leabeg","Mount Bolus","Mountmellick","Mucklagh","Pollagh","Portarlington","Rahan","Rosenallis","Tullamore","Walsh Island"];
const auto={"Horseleap__1":12,"Mountmellick__1":14,"Walsh Island__1":18,"Dunmurry Hill__2":3,"Kilbeggan__2":5,"Kildare__2":9,"Ballinakill__2":11,"Tullamore__2":14,"Portarlington__2":20,"Clonaslee__2":24,"Daingean__3":2,"Portarlington__3":4,"Kilcormac__3":31,"Tullamore__3":8,"Five Alley__3":11,"Kinnity__3":11,"Ballinakill__3":12,"Rahan__3":18,"Geashill__3":30,"Killeigh__3":18,"Mount Bolus__3":18,"Mountmellick__3":19,"Mucklagh__3":20,"Ballinagar__3":30,"Gracefield__4":1,"Kilbeggan__4":1,"Ballydaly__4":2,"Clara__4":2,"Clonygowan__4":8,"Killenard__4":8,"Rosenallis__4":9,"Ballycumber__4":13,"Horseleap__4":13,"Kildare__4":16,"Pollagh__4":10,"Collins Lane__4":20};
const manual={"Clara__1":15};

function countVisits(site){let c=0;for(let m=1;m<=12;m++){if(auto[site+'__'+m]||manual[site+'__'+m])c++;}return c;}

// Site list
const sl=document.getElementById('site-list');
sites.forEach((s,i)=>{
  const v=countVisits(s);
  const pct=Math.round(v/12*100);
  sl.innerHTML+=`<div class="site-row${i===0?' active':''}" onclick="this.parentElement.querySelectorAll('.site-row').forEach(r=>r.classList.remove('active'));this.classList.add('active')">
    <div class="site-icon">📍</div>
    <div class="site-info"><div class="site-name">${s}</div><div class="site-meta"><span>${v}/12 months</span></div></div>
    <div class="site-bar-wrap"><div class="site-bar"><div class="site-bar-fill" style="width:${pct}%"></div></div><div class="site-visits">${pct}%</div></div>
  </div>`;
});

// Grid
const gb=document.getElementById('grid-body');
let totals=new Array(12).fill(0);
sites.forEach(s=>{
  let cells=`<td>${s} 📍</td>`;
  for(let m=1;m<=12;m++){
    const isCur=m===4;
    const mk=s+'__'+m;
    const d=manual[mk]||auto[mk];
    const isAuto=!manual[mk]&&!!auto[mk];
    if(d){totals[m-1]++;}
    let inner=d?`<span class="day">${d}</span>${isAuto?'<span class="auto">AUTO</span>':''}`:`<span class="dot"></span>`;
    cells+=`<td${isCur?' class="cur-col"':''}><button class="cell${d?' v':''}">${inner}</button></td>`;
  }
  gb.innerHTML+=`<tr>${cells}</tr>`;
});
// Totals row
let tc=`<td style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)">Total</td>`;
totals.forEach((t,i)=>{tc+=`<td class="${i===3?'cur-col':''}" style="font-weight:700;font-size:13px;color:${t>0?'#15803d':'var(--text-muted)'}">${t}</td>`;});
gb.innerHTML+=`<tr class="totals">${tc}</tr>`;
</script>
</body>
</html>
