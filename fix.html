<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rian – Fix</title>
<style>body{font-family:system-ui;padding:20px;background:#f0f4f8;color:#1e293b}
.msg{padding:14px;border-radius:12px;margin:10px 0;font-size:14px;font-weight:600}
.ok{background:#d1fae5;color:#065f46}.err{background:#fee2e2;color:#991b1b}.info{background:#dbeafe;color:#1e40af}
button{padding:16px;width:100%;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;margin:8px 0;font-family:inherit;background:#2563eb;color:#fff}</style>
</head><body>
<h2>Rian Fix – Clear Cache</h2>
<div id="log"></div>
<button onclick="doFix()">Fix Blank Screen</button>
<script>
const log = document.getElementById('log');
function msg(t,c){log.innerHTML+=`<div class="msg ${c}">${t}</div>`}

async function doFix(){
  msg('Unregistering service workers...','info');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for(const r of regs){ await r.unregister(); msg('Unregistered: '+r.scope,'ok'); }
    if(regs.length===0) msg('No service workers found','info');
  } catch(e){ msg('SW error: '+e.message,'err'); }

  msg('Clearing caches...','info');
  try {
    const keys = await caches.keys();
    for(const k of keys){ await caches.delete(k); msg('Deleted cache: '+k,'ok'); }
    if(keys.length===0) msg('No caches found','info');
  } catch(e){ msg('Cache error: '+e.message,'err'); }

  msg('Done! Redirecting to app in 2 seconds...','ok');
  setTimeout(()=>{ window.location.href='app.html'; },2000);
}
</script>
</body></html>
