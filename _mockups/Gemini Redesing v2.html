<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Timesheet App</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Lucide Icon Component for Browser
        const Icon = ({ name, size = 18, className = "", fill = "none" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: 2.5, fill }}></i>;
        };

        // --- GEMINI API CONFIGURATION ---
        const apiKey = ""; // <--- PASTE YOUR GOOGLE PRO API KEY HERE
        const GEN_MODEL = "gemini-2.5-flash-preview-09-2025";

        async function callGemini(prompt, systemInstruction = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEN_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        const App = () => {
            const [expandedDays, setExpandedDays] = useState({ 'Friday': true, 'Monday': true });
            const [expandedTasks, setExpandedTasks] = useState({ 'Monday-1': true });
            
            // AI States
            const [isSummarizing, setIsSummarizing] = useState(false);
            const [weeklySummary, setWeeklySummary] = useState("");
            const [quickLogInput, setQuickLogInput] = useState("");
            const [isQuickLogging, setIsQuickLogging] = useState(false);

            const toggleDay = (dayName) => setExpandedDays(prev => ({ ...prev, [dayName]: !prev[dayName] }));
            const toggleTask = (dayName, taskId) => {
                const key = `${dayName}-${taskId}`;
                setExpandedTasks(prev => ({ ...prev, [key]: !prev[key] }));
            };

            // ✨ FEATURE: AI Weekly Summary
            const generateWeeklySummary = async () => {
                setIsSummarizing(true);
                const allTasks = days.flatMap(d => d.tasks.map(t => `${t.title} at ${t.location} (${t.hours}h)`)).join(', ');
                const prompt = `Based on these timesheet entries, write a concise, professional 2-sentence summary of work completed this week: ${allTasks}`;
                try {
                    const result = await callGemini(prompt, "You are a professional project manager. Summarize work records elegantly.");
                    setWeeklySummary(result);
                } catch (err) {
                    setWeeklySummary("Check your API key or internet connection.");
                } finally {
                    setIsSummarizing(false);
                }
            };

            // ✨ FEATURE: AI Quick Log
            const handleQuickLog = async () => {
                if (!quickLogInput.trim()) return;
                setIsQuickLogging(true);
                try {
                    const prompt = `Convert this natural language log into a JSON object with title, location, and hours: "${quickLogInput}"`;
                    const result = await callGemini(prompt, "Return ONLY valid JSON with keys: title, location, hours. Be precise.");
                    const cleanJson = result.replace(/```json|```/g, "").trim();
                    const parsed = JSON.parse(cleanJson);
                    
                    // Show a toast-like notification (mocked as alert)
                    alert(`AI Parsed Entry:\n\nTask: ${parsed.title}\nLocation: ${parsed.location}\nHours: ${parsed.hours}\n\nThis entry can now be added to your Monday log.`);
                    setQuickLogInput("");
                } catch (err) { 
                    console.error(err); 
                    alert("AI couldn't parse that. Try something like '2 hours in Naas fixing van'");
                } finally { 
                    setIsQuickLogging(false); 
                }
            };

            const days = [
                {
                    name: 'Friday', date: '6 MAR', totalHours: '7h', taskCount: 3,
                    tasks: [
                        { id: 1, title: 'General Admin', location: 'NAAS (NAS)', hours: 2 },
                        { id: 2, title: 'Van', location: 'SALLINS (SLS)', hours: 2 },
                        { id: 3, title: 'Collecting the van - make ticket', location: 'CARLOW (CRW)', hours: 3 },
                    ]
                },
                { name: 'Monday', date: '9 MAR', totalHours: '8h', taskCount: 2,
                    tasks: [
                        { id: 1, title: 'Breakdown', location: 'SALLINS (SLS)', hours: 3, note: 'Flat tyre' },
                        { id: 2, title: 'Healys Garage', location: 'NAAS (NAS)', hours: 5 },
                    ]
                }
            ];

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-[#1A2533] text-white p-4 pt-8 shadow-xl">
                        <div className="max-w-md mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <button className="p-2 bg-slate-700/50 rounded-lg hover:bg-slate-600 active:scale-95 transition-all"><Icon name="chevron-left" /></button>
                                <div className="text-center">
                                    <h1 className="text-sm font-bold flex items-center justify-center gap-1 cursor-pointer hover:text-orange-400">6 Mar – 12 Mar <Icon name="chevron-down" size={14} /></h1>
                                    <p className="text-[10px] text-emerald-400 flex items-center justify-center gap-1 mt-1 font-medium"><Icon name="check-circle-2" size={10} /> Synced v3.7.3</p>
                                </div>
                                <div className="flex gap-2">
                                    <button className="p-2 bg-slate-700/50 rounded-lg hover:bg-slate-600 active:scale-95 transition-all"><Icon name="play" fill="white" size={18} /></button>
                                    <button className="p-2 bg-slate-700/50 rounded-lg hover:bg-slate-600 active:scale-95 transition-all"><Icon name="menu" size={18} /></button>
                                </div>
                            </div>
                            <div className="grid grid-cols-3 gap-3 mb-4">
                                <StatCard label="ORD HRS" value="23" />
                                <StatCard label="OVERTIME" value="0" orange />
                                <StatCard label="TASKS" value="7" />
                            </div>
                        </div>
                    </header>

                    <nav className="bg-[#1A2533] border-t border-slate-700 sticky top-0 z-40">
                        <div className="max-w-md mx-auto flex">
                            {['TIMESHEET', 'NOTES', 'FINDER'].map((tab, i) => (
                                <button key={tab} className={`flex-1 py-3 text-[10px] font-bold tracking-wider transition-all ${i === 0 ? 'text-orange-400 border-b-2 border-orange-400' : 'text-slate-400 hover:text-white'}`}>{tab}</button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-3 mt-4">
                        {/* ✨ AI Quick Log Input Section */}
                        <div className="mb-6 bg-gradient-to-r from-indigo-600 to-indigo-700 rounded-3xl p-4 shadow-lg shadow-indigo-200">
                            <label className="text-white/70 text-[10px] font-bold uppercase tracking-widest mb-2 block ml-1">✨ AI Smart Entry</label>
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="e.g. 3 hours fixing van in Sallins" 
                                    value={quickLogInput} 
                                    onChange={(e) => setQuickLogInput(e.target.value)} 
                                    onKeyPress={(e) => e.key === 'Enter' && handleQuickLog()}
                                    className="w-full bg-white/10 border border-white/20 rounded-2xl py-3 px-4 text-white placeholder-white/30 text-sm outline-none focus:bg-white/20 transition-all pr-12 shadow-inner" 
                                />
                                <button 
                                    onClick={handleQuickLog} 
                                    disabled={isQuickLogging} 
                                    className="absolute right-1.5 top-1.5 bottom-1.5 aspect-square bg-white rounded-xl flex items-center justify-center text-indigo-600 shadow-md active:scale-90 transition-all disabled:opacity-50"
                                >
                                    {isQuickLogging ? <Icon name="loader-2" className="animate-spin" size={18} /> : <Icon name="send" size={18} />}
                                </button>
                            </div>
                        </div>

                        <div className="space-y-4">
                            {days.map((day) => {
                                const dayExpanded = expandedDays[day.name];
                                return (
                                    <div key={day.name} className={`rounded-[24px] transition-all duration-300 ${dayExpanded ? 'bg-indigo-50/20 pb-4' : 'bg-transparent'}`}>
                                        <button 
                                            onClick={() => toggleDay(day.name)} 
                                            className={`relative z-10 w-full flex items-center justify-between p-4 rounded-3xl bg-white shadow-sm border border-slate-200 text-left transition-all active:scale-[0.99] ${dayExpanded ? 'ring-1 ring-indigo-100' : ''}`}
                                        >
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm transition-transform duration-300">
                                                    <Icon name={dayExpanded ? "chevron-down" : "chevron-right"} className="text-slate-400" size={20} />
                                                </div>
                                                <div>
                                                    <h2 className="font-black text-xl text-slate-900 leading-none">{day.name}</h2>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 block">{day.date}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <div className="text-right">
                                                    <div className="text-sm font-black text-indigo-600">{day.totalHours}</div>
                                                    <div className="text-[9px] font-bold text-slate-400 uppercase">{day.taskCount} tasks</div>
                                                </div>
                                                <Icon name="chevron-down" size={16} className={`text-slate-200 transition-transform ${dayExpanded ? 'rotate-0 opacity-40' : '-rotate-90 opacity-20'}`} />
                                            </div>
                                        </button>

                                        {dayExpanded && (
                                            <div className="relative ml-[39px] mr-2 space-y-4 pt-6 animate-in">
                                                {day.tasks.map((task, idx) => {
                                                    const isFirst = idx === 0;
                                                    const isLast = idx === day.tasks.length - 1;
                                                    const taskExpanded = expandedTasks[`${day.name}-${task.id}`];
                                                    return (
                                                        <div key={task.id} className="relative group">
                                                            {/* Vertical Line Logic: Pixel-Perfect Connections */}
                                                            {isFirst ? (
                                                                <div className="absolute left-[-19px] top-[-40px] h-[64px] w-0.5 bg-indigo-200"></div>
                                                            ) : (
                                                                <div className="absolute left-[-19px] top-[-16px] h-[40px] w-0.5 bg-indigo-200"></div>
                                                            )}
                                                            {!isLast && (
                                                                <div className="absolute left-[-19px] top-[24px] bottom-[-20px] w-0.5 bg-indigo-200"></div>
                                                            )}
                                                            {/* Horizontal Branch - Touching task box */}
                                                            <div className="absolute -left-[19px] top-[24px] w-[19px] h-0.5 bg-indigo-200 rounded-full"></div>
                                                            {/* Node Dot - Centered on the timeline */}
                                                            <div className={`absolute left-[-24.5px] top-[18px] w-3 h-3 rounded-full bg-white border-2 border-indigo-500 shadow-sm z-10 transition-transform ${taskExpanded ? 'scale-125' : ''}`}></div>
                                                            
                                                            <div className={`bg-white rounded-2xl transition-all duration-200 border ${taskExpanded ? 'shadow-lg border-indigo-200 ring-1 ring-indigo-100' : 'shadow-sm border-slate-100 hover:border-slate-200'}`}>
                                                                <button onClick={() => toggleTask(day.name, task.id)} className="w-full p-4 flex items-center gap-4 text-left active:bg-slate-50 transition-colors rounded-t-2xl">
                                                                    <div className="w-8 h-8 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center text-[12px] font-black text-slate-400 transition-colors group-hover:text-indigo-600">{idx + 1}</div>
                                                                    <div className="flex-1 truncate">
                                                                        <h3 className="font-bold text-base text-slate-700 truncate leading-snug">{task.title}</h3>
                                                                        {!taskExpanded && <div className="flex items-center gap-1 mt-1 text-[10px] text-slate-400 font-bold uppercase tracking-tight"><Icon name="map-pin" size={10} className="text-red-400" /> {task.location}</div>}
                                                                    </div>
                                                                    <div className="flex items-center gap-3">
                                                                        <div className="bg-slate-50 px-3 py-1.5 rounded-lg text-xs font-black text-slate-600">{task.hours}h</div>
                                                                        <Icon name="chevron-right" size={16} className={`text-slate-300 transition-transform ${taskExpanded ? 'rotate-90' : ''}`} />
                                                                    </div>
                                                                </button>
                                                                {taskExpanded && <TaskEditContent task={task} callGemini={callGemini} />}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                                <button className="w-full py-4 bg-white/40 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 flex items-center justify-center gap-2 hover:bg-white hover:border-indigo-300 hover:text-indigo-600 transition-all font-bold text-[11px] uppercase tracking-widest ml-1 active:scale-95 shadow-sm">
                                                    <Icon name="plus" size={16} /> Add Task
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* ✨ AI Weekly Recap Section */}
                        <div className="mt-12 bg-white rounded-3xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-black text-slate-900 uppercase tracking-wider text-xs">✨ AI Weekly Recap</h3>
                                <button onClick={generateWeeklySummary} disabled={isSummarizing} className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-indigo-600 hover:text-indigo-700 disabled:opacity-50 transition-colors">
                                    {isSummarizing ? <Icon name="loader-2" className="animate-spin" size={14} /> : <Icon name="sparkles" size={14} />}
                                    Generate Report
                                </button>
                            </div>
                            {weeklySummary ? (
                                <p className="text-sm text-slate-600 leading-relaxed italic animate-in">"{weeklySummary}"</p>
                            ) : (
                                <p className="text-xs text-slate-400 italic">Analyze your logged tasks to draft a professional weekly accomplishment summary.</p>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const TaskEditContent = ({ task, callGemini }) => {
            const [description, setDescription] = useState(task.title);
            const [isImproving, setIsImproving] = useState(false);

            const improveDescription = async () => {
                if (!description.trim()) return;
                setIsImproving(true);
                try {
                    const res = await callGemini(`Rewrite this timesheet description to be professional, concise, and ready for a manager: "${description}"`, "You are a professional corporate assistant.");
                    setDescription(res);
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsImproving(false);
                }
            };

            return (
                <div className="p-4 pt-0 border-t border-slate-50 mt-2 animate-in">
                    <div className="space-y-4 pt-4">
                        <div>
                            <div className="flex justify-between items-end mb-1.5">
                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block ml-1">Description</label>
                                <button 
                                    onClick={improveDescription} 
                                    disabled={isImproving} 
                                    className="flex items-center gap-1 text-[9px] font-black text-indigo-600 uppercase transition-all hover:text-indigo-800 disabled:opacity-50"
                                >
                                    {isImproving ? <Icon name="loader-2" size={10} className="animate-spin" /> : <Icon name="sparkles" size={10} />} ✨ Enhance
                                </button>
                            </div>
                            <input 
                                type="text" 
                                value={description} 
                                onChange={(e) => setDescription(e.target.value)} 
                                className="w-full border border-slate-200 rounded-xl p-3 text-sm focus:border-indigo-400 outline-none transition-all shadow-sm" 
                            />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1 ml-1">Ord Hrs</label>
                                <div className="flex justify-between bg-white rounded-xl p-1 border border-slate-200 items-center">
                                    <button className="p-2 text-slate-300 hover:text-indigo-400 transition-colors active:scale-90"><Icon name="minus" size={14} /></button>
                                    <span className="font-black text-slate-700">{task.hours}</span>
                                    <button className="p-2 text-slate-300 hover:text-indigo-400 transition-colors active:scale-90"><Icon name="plus" size={14} /></button>
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1 ml-1">OT Hrs</label>
                                <div className="flex justify-between bg-white rounded-xl p-1 border border-slate-200 items-center">
                                    <button className="p-2 text-slate-300 hover:text-indigo-400 transition-colors active:scale-90"><Icon name="minus" size={14} /></button>
                                    <span className="font-black text-slate-300">0</span>
                                    <button className="p-2 text-slate-300 hover:text-indigo-400 transition-colors active:scale-90"><Icon name="plus" size={14} /></button>
                                </div>
                            </div>
                        </div>
                        <button className="w-full py-3.5 bg-red-50 text-red-600 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-red-100 transition-all active:scale-95 border border-red-100"><Icon name="trash-2" size={14} /> Delete task</button>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, orange = false }) => (
            <div className="bg-slate-800/40 border border-slate-700/50 p-3 rounded-xl">
                <div className="text-lg font-black leading-none flex items-center gap-1.5">
                    {orange && <div className="w-3 h-3 rounded-full border-2 border-orange-400 flex items-center justify-center"><div className="w-1 h-1 bg-orange-400 rounded-full"></div></div>}
                    {value}
                </div>
                <div className="text-[9px] font-bold text-slate-400 tracking-wider mt-1 uppercase">{label}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
