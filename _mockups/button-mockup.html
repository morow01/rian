<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8edf5; padding: 24px; margin: 0; }
  h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin: 0 0 10px 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 760px; }
  .card {
    background: white; border-radius: 18px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    border-left: 5px solid #3b5fc0;
  }
  .card-inner { padding: 16px 16px 0; }
  .notes-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 9px 12px; border-radius: 10px; border: 1px dashed #cbd5e1;
    background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .notes-btn svg { flex-shrink: 0; }
  .notes-btn span.preview { font-size: 11px; font-weight: 400; font-style: italic; opacity: 0.5; }
  .notes-btn .chev { margin-left: auto; }
  .btn-area { padding: 12px 16px 16px; }
  .label { font-size: 10px; color: #94a3b8; margin-bottom: 8px; }

  /* Shared SVGs */
  .ic-trash { display:inline-block; }
  .ic-plus { display:inline-block; }

  /* ---- CURRENT (reference) ---- */
  .cur-del {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
    color: #ef4444; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.22);
    cursor: pointer; margin-left: auto;
  }
  .cur-add {
    display: flex; align-items: center; gap: 6px; justify-content: center;
    padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 700;
    color: #3b5fc0; background: #dde8fb; border: none; cursor: pointer; width: 100%;
  }

  /* ---- OPTION A: Side by side ---- */
  .a-row { display: flex; gap: 8px; }
  .a-del {
    display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center;
    padding: 9px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
    color: #ef4444; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2);
    cursor: pointer;
  }
  .a-add {
    display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center;
    padding: 9px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
    color: #3b5fc0; background: #dde8fb; border: none; cursor: pointer;
  }

  /* ---- OPTION B: Both outline ---- */
  .b-row { display: flex; gap: 8px; }
  .b-del {
    display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center;
    padding: 9px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
    color: #ef4444; background: transparent; border: 1.5px solid rgba(239,68,68,0.45);
    cursor: pointer;
  }
  .b-add {
    display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center;
    padding: 9px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
    color: #3b5fc0; background: transparent; border: 1.5px solid rgba(59,95,192,0.45);
    cursor: pointer;
  }

  /* ---- OPTION C: Both minimal text links ---- */
  .c-row { display: flex; justify-content: space-between; align-items: center; }
  .c-del {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 8px; border-radius: 8px; font-size: 12px; font-weight: 500;
    color: #ef4444; background: none; border: none; cursor: pointer; opacity: 0.7;
  }
  .c-add {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 8px; border-radius: 8px; font-size: 12px; font-weight: 600;
    color: #3b5fc0; background: none; border: none; cursor: pointer;
  }

  /* ---- OPTION D: Normalised, right-aligned ---- */
  .d-row { display: flex; justify-content: flex-end; gap: 8px; }
  .d-del {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
    color: #ef4444; background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.22);
    cursor: pointer;
  }
  .d-add {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
    color: #3b5fc0; background: #dde8fb; border: none; cursor: pointer;
  }
  .divider { height: 1px; background: #e8edf5; margin: 12px 0; }
</style>
</head>
<body>

<div class="grid">

  <!-- CURRENT -->
  <div class="card">
    <div class="card-inner">
      <h2>Current (reference)</h2>
      <button class="notes-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Notes <span class="preview">Add a note…</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="btn-area">
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
        <button class="cur-del">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete activity
        </button>
      </div>
      <div style="border-top:1px dashed #e2e8f0;padding-top:12px;">
        <button class="cur-add">+ Add Activity</button>
      </div>
    </div>
  </div>

  <!-- OPTION A -->
  <div class="card">
    <div class="card-inner">
      <h2>A — Side by side, bottom row</h2>
      <button class="notes-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Notes <span class="preview">Add a note…</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="btn-area">
      <div class="a-row">
        <button class="a-del">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
        <button class="a-add">
          + Add Activity
        </button>
      </div>
    </div>
  </div>

  <!-- OPTION B -->
  <div class="card">
    <div class="card-inner">
      <h2>B — Both outlined, no fill</h2>
      <button class="notes-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Notes <span class="preview">Add a note…</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="btn-area">
      <div class="b-row">
        <button class="b-del">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
        <button class="b-add">
          + Add Activity
        </button>
      </div>
    </div>
  </div>

  <!-- OPTION C -->
  <div class="card">
    <div class="card-inner">
      <h2>C — Both minimal text links</h2>
      <button class="notes-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Notes <span class="preview">Add a note…</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="btn-area">
      <div class="c-row">
        <button class="c-del">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
        <button class="c-add">
          + Add Activity
        </button>
      </div>
    </div>
  </div>

  <!-- OPTION D -->
  <div class="card" style="grid-column:1/-1;max-width:360px;">
    <div class="card-inner">
      <h2>D — Same size, right-aligned pair</h2>
      <button class="notes-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Notes <span class="preview">Add a note…</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="btn-area">
      <div class="d-row">
        <button class="d-del">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
        <button class="d-add">
          + Add Activity
        </button>
      </div>
    </div>
  </div>

</div>
</body>
</html>
