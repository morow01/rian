<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rian – Notes Recovery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; padding: 20px; color: #1e293b; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .status { padding: 14px; border-radius: 12px; margin: 12px 0; font-size: 14px; font-weight: 600; }
  .status.info { background: #dbeafe; color: #1e40af; }
  .status.success { background: #d1fae5; color: #065f46; }
  .status.error { background: #fee2e2; color: #991b1b; }
  .status.warning { background: #fef3c7; color: #92400e; }
  .note-card { background: #fff; border-radius: 12px; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; }
  .note-desc { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .note-loc { font-size: 12px; color: #64748b; }
  .note-meta { font-size: 11px; color: #94a3b8; margin-top: 6px; }
  button { padding: 14px 24px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin: 8px 0; font-family: inherit; }
  .btn-restore { background: #2563eb; color: #fff; }
  .btn-restore:disabled { background: #94a3b8; }
  .btn-copy { background: #059669; color: #fff; }
  #notes-list { margin: 16px 0; }
  .count { font-size: 28px; font-weight: 900; color: #2563eb; }
  .warning-box { background: #fef3c7; border: 2px solid #f59e0b; border-radius: 12px; padding: 14px; margin: 12px 0; font-size: 13px; color: #92400e; line-height: 1.5; }
</style>
</head>
<body>
<h1>Rian Notes Recovery</h1>
<p style="font-size:13px;color:#64748b;margin-bottom:12px;">This page reads your notes from the local browser cache without triggering any sync.</p>

<div id="output"></div>
<div id="notes-list"></div>
<div id="actions"></div>

<script>
  // Firebase config (same as main app)
  const firebaseConfig = {
    apiKey: "AIzaSyBq-AMqqUwGgDZGk6F9TndyZaZZui8gPBY",
    authDomain: "eir-fieldlog.firebaseapp.com",
    projectId: "eir-fieldlog"
  };

  const output = document.getElementById('output');
  const notesList = document.getElementById('notes-list');
  const actions = document.getElementById('actions');
  let recoveredNotes = null;

  function status(msg, type) {
    output.innerHTML += `<div class="status ${type}">${msg}</div>`;
  }

  async function readIDB() {
    return new Promise((resolve, reject) => {
      // Try version 2 first (current), then try without version (latest)
      const req = indexedDB.open('timesheet-db', 2);
      req.onupgradeneeded = () => {
        // If upgrade is needed, the DB didn't exist at version 2 — abort
        req.transaction.abort();
        reject(new Error('No existing database found'));
      };
      req.onsuccess = e => {
        const db = e.target.result;
        try {
          const tx = db.transaction('notes', 'readonly');
          const store = tx.objectStore('notes');
          const getReq = store.get('notes_all');
          getReq.onsuccess = () => resolve(getReq.result);
          getReq.onerror = () => reject(new Error('Failed to read notes store'));
        } catch (e) {
          reject(new Error('Notes store not found: ' + e.message));
        }
      };
      req.onerror = () => reject(new Error('Cannot open database'));
      req.onblocked = () => reject(new Error('Database is blocked by another tab. Close all Rian tabs and try again.'));
    });
  }

  async function init() {
    status('Reading local IndexedDB...', 'info');

    try {
      let notes = null;
      let source = '';

      // Try 1: local IndexedDB
      const stored = await readIDB().catch(() => null);
      if (stored && stored.data && Array.isArray(stored.data) && stored.data.length > 0) {
        notes = stored.data;
        source = 'local cache';
      }

      // Try 2: Firestore backup document (if local is empty)
      if (!notes || notes.length === 0) {
        status('Local cache empty. Checking Firestore backup...', 'warning');
        try {
          await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
          await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js');
          await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');
          if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
          const auth = firebase.auth();
          const provider = new firebase.auth.GoogleAuthProvider();
          status('Sign in to check Firestore backup...', 'info');
          const result = await auth.signInWithPopup(provider);
          const uid = result.user.uid;
          const db = firebase.firestore();
          const backupSnap = await db.doc('users/' + uid + '/data/notes_backup').get();
          if (backupSnap.exists && backupSnap.data().notes && backupSnap.data().notes.length > 0) {
            notes = backupSnap.data().notes;
            source = 'Firestore backup';
          }
        } catch (e) { status('Firestore backup check failed: ' + e.message, 'error'); }
      }

      if (!notes || notes.length === 0) {
        status('No notes found in local cache or Firestore backup.', 'error');
        return;
      }

      const openNotes = notes.filter(n => n.status === 'open');
      const doneNotes = notes.filter(n => n.status === 'done');

      recoveredNotes = notes;
      status(`Found <span class="count">${notes.length}</span> notes from ${source}! (${openNotes.length} open, ${doneNotes.length} done)`, 'success');

      // Display notes
      notesList.innerHTML = '<h2 style="font-size:16px;margin:12px 0 8px;">Your Notes:</h2>';
      notes.forEach((n, i) => {
        const statusColor = n.status === 'done' ? '#059669' : '#dc2626';
        const statusDot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusColor};margin-right:6px;"></span>`;
        notesList.innerHTML += `<div class="note-card">
          <div class="note-desc">${statusDot}${escHtml(n.description || 'Unnamed')}</div>
          ${n.location ? '<div class="note-loc">📍 ' + escHtml(n.location) + '</div>' : ''}
          ${n.noteContent ? '<div class="note-meta">Has note content</div>' : ''}
          <div class="note-meta">${n.priority || 'medium'} priority · ${n.date || 'no date'}</div>
        </div>`;
      });

      // Show restore button
      actions.innerHTML = `
        <div class="warning-box">
          <strong>⚠️ Important:</strong> Click "Restore to Firestore" to push these notes back to the server.
          This will restore them on ALL your devices. Only do this if your notes are currently missing.
        </div>
        <button class="btn-restore" id="btn-restore" onclick="restoreToFirestore()">Restore ${notes.length} Notes to Firestore</button>
        <button class="btn-copy" onclick="copyToClipboard()">Copy Notes as JSON (backup)</button>
      `;

    } catch (e) {
      status('Error: ' + e.message, 'error');
    }
  }

  async function restoreToFirestore() {
    if (!recoveredNotes || recoveredNotes.length === 0) return;
    const btn = document.getElementById('btn-restore');
    btn.disabled = true;
    btn.textContent = 'Restoring...';

    try {
      // Load Firebase
      status('Loading Firebase...', 'info');
      await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      status('Signing in with Google...', 'info');
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await auth.signInWithPopup(provider);
      const uid = result.user.uid;

      status('Pushing ' + recoveredNotes.length + ' notes to Firestore...', 'info');
      const ref = db.doc(`users/${uid}/data/notes`);
      await ref.set({ notes: recoveredNotes, _updatedAt: Date.now() });

      // Also update local IDB
      const idbReq = indexedDB.open('timesheet-db', 2);
      idbReq.onsuccess = e => {
        const idb = e.target.result;
        const tx = idb.transaction('notes', 'readwrite');
        tx.objectStore('notes').put({
          id: 'notes_all',
          userId: uid,
          data: recoveredNotes,
          updatedAt: Date.now()
        });
      };

      status(`✅ Successfully restored ${recoveredNotes.length} notes! You can now open the Rian app normally.`, 'success');
      btn.textContent = 'Restored!';

    } catch (e) {
      status('Restore failed: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Try Again';
    }
  }

  function copyToClipboard() {
    if (!recoveredNotes) return;
    const json = JSON.stringify(recoveredNotes, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      status('Copied to clipboard!', 'success');
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = json;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      status('Copied to clipboard!', 'success');
    });
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  init();
</script>
</body>
</html>
